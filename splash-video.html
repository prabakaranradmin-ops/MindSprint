<!DOCTYPE html>

<style>
  @font-face { font-family:'Fredoka'; font-weight:500; font-display:swap; src:url('assets/fonts/fredoka-variable.woff2') format('woff2'); }
  @font-face { font-family:'Fredoka'; font-weight:600; font-display:swap; src:url('assets/fonts/fredoka-variable.woff2') format('woff2'); }
  @font-face { font-family:'Fredoka'; font-weight:700; font-display:swap; src:url('assets/fonts/fredoka-variable.woff2') format('woff2'); }

  #root { width: 100vw; height: 100vh; }

  /* Pip mascot — inlined small subset of styles */

  .pip > div { position: absolute; }

  .pip .leaf-blade { left: 56%; top: -2%; width: 18%; height: 12%; background: var(--pip-body); border-radius: 0 80% 0 80%; transform: rotate(20deg); }
  .pip .body { inset: 12% 0 0 0; background: var(--pip-body); border-radius: 50% 50% 46% 46% / 55% 55% 45% 45%; box-shadow: inset 0 -10% 0 rgba(0,0,0,0.07); }
  .pip .belly { left: 22%; top: 38%; width: 56%; height: 50%; background: #FFF6E0; border-radius: 50%; }
  .pip .eye { width: 14%; height: 18%; background: #3D2818; border-radius: 50%; top: 35%; }
  .pip .eye.left { left: 28%; } .pip .eye.right { right: 28%; }
  .pip .eye::after { content: ""; position: absolute; width: 38%; height: 38%; background: #fff; border-radius: 50%; top: 18%; left: 18%; }
  .pip .cheek { width: 12%; height: 7%; background: #F58FA8; opacity: 0.7; border-radius: 50%; top: 53%; }
  .pip .cheek.left { left: 22%; } .pip .cheek.right { right: 22%; }
  .pip .mouth { left: 50%; top: 55%; transform: translateX(-50%); width: 16%; height: 14%; border-bottom: 5px solid #3D2818; border-radius: 0 0 50% 50%; }
  .pip .foot { width: 22%; height: 10%; background: var(--pip-shadow); border-radius: 50%; bottom: -3%; }
  .pip .foot.left { left: 18%; } .pip .foot.right { right: 18%; }
  .pip .arm-wave { width: 18%; height: 26%; background: var(--pip-body); border-radius: 50%; top: 24%; right: -6%; transform: rotate(-50deg); transform-origin: bottom left; filter: brightness(0.92); }

  .cloud { background: #fff; border-radius: 50%; box-shadow: 22px 4px 0 -2px #fff, -22px 4px 0 -2px #fff, 0 -14px 0 -4px #fff; opacity: 0.88; }
  .ground { background: linear-gradient(180deg, transparent, #C8E6A4); }

<body>
<div id="root"></div>

<script src="vendor-mocks/react.development.js"></script>
<script src="vendor-mocks/react-dom.development.js"></script>
<script src="vendor-mocks/babel.min.js"></script>

<script type="text/babel">

// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook.
//
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },

  // Elastic
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

// ── Core interpolation helpers ──────────────────────────────────────────────

// Clamp a value to [min, max]
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// interpolate([0, 0.5, 1], [0, 100, 50], ease?) -> fn(t)
// Popmotion-style: linearly maps t across input keyframes to output values,
// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

// animate({from, to, start, end, ease})(t) — simpler single-segment tween.
// Returns `from` before `start`, `to` after `end`.
function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ────────────────────────────────────────────────────────

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });

const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ──────────────────────────────────────────────────────────────────
// Renders children only when the playhead is inside [start, end]. Provides
// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>
//
// Or as a plain wrapper — children can call useSprite() themselves.

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Sample sprite components ────────────────────────────────────────────────

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.
// Props: text, x, y, size, color, font, entryDur, exitDur, align
function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

// ImageSprite: scales + fades in; optional Ken Burns drift during hold.
function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null, // {label: string} for striped placeholder
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

// RectSprite: simple rectangle that animates position/size/color via props.
// Useful demo primitive — takes a `render` fn for per-frame customization.
function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}


function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  // Persist playhead
  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  // Auto-scale to fit viewport
  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44; // playback bar height
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  // Animation loop
  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  // Keyboard: space = play/pause, ← → = seek
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: '#0a0a0a',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      {/* Canvas area — vertically centered in remaining space */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      {/* Playback bar — stacked below canvas, never overlapping */}
      <PlaybackBar
        time={displayTime}
        actualTime={time}
        duration={duration}
        playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => { setTime(0); }}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

// ── Playback bar ────────────────────────────────────────────────────────────
// Play/pause, return-to-begin, scrub track, time display.
// Uses fixed-width time fields so layout doesn't thrash.

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',

      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>

      {/* Current time: fixed width so it doesn't thrash */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right',
        color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>

      {/* Scrub track */}
      <div
        ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1,
          height: 22,
          position: 'relative',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute',
          left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: `${pct}%`, top: '50%',
          width: 12, height: 12,
          marginLeft: -6, marginTop: -6,
          background: '#fff',
          borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>

      {/* Duration: fixed width */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left',
        color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 28, height: 28,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: 6,
        color: '#f6f4ef',
        cursor: 'pointer',
        padding: 0,
        transition: 'background 120ms',
      }}
    >
      {children}
    </button>
  );
}


Object.assign(window, {
  Easing, interpolate, animate, clamp,
  TimelineContext, useTime, useTimeline,
  Sprite, SpriteContext, useSprite,
  TextSprite, ImageSprite, RectSprite,
  Stage, PlaybackBar,
});


</script>

<script type="text/babel">
function Pip({ size = 220, mood = 'happy', wave = false, style }) {
  return (
    <div className="pip" style={{ width: size, height: size, ...style }}>
      <div className="foot left" />
      <div className="foot right" />
      <div className="sprout" />
      <div className="leaf-blade" />
      <div className="body" />
      <div className="belly" />
      {wave && <div className="arm-wave" />}
      <div className="eye left" />
      <div className="eye right" />
      <div className="cheek left" />
      <div className="cheek right" />
      <div className="mouth" />
    </div>
  );
}

function Sun({ size = 140, style }) {
  return (
    <div style={{ width: size, height: size, position: 'relative', ...style }}>
      <div style={{
        position: 'absolute', inset: '18%', borderRadius: '50%',
        background: '#FFCE52', boxShadow: 'inset 0 -10px 0 #E2A41B',
      }}/>
      {Array.from({ length: 8 }).map((_, i) => (
        <div key={i} style={{
          position: 'absolute', left: '47%', top: '2%', width: '6%', height: '18%',
          background: '#E2A41B', borderRadius: 6,
          transform: `rotate(${i * 45}deg)`, transformOrigin: '50% 240%',
        }}/>
      ))}
    </div>
  );
}

// Time-aware bg gradient that warms up over the first second
function Background() {
  const time = useTime();
  const fade = clamp(time, 0, 1);
  return (
    <>
      <div style={{
        position: 'absolute', inset: 0,
        background: 'linear-gradient(180deg, #DCEFFB 0%, #FFE9B8 60%, #FDE3BE 100%)',
        opacity: fade,
      }}/>
      <div style={{
        position: 'absolute', inset: 0,
        background: 'radial-gradient(ellipse 80% 60% at 50% 30%, #FFE9B8 0%, transparent 60%)',
        opacity: fade * 0.9,
      }}/>
      {/* ground */}
      <div className="ground" style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, height: 120,
        opacity: fade,
      }}/>
    </>
  );
}

function Cloud({ start, x, y, w }) {
  return (
    <Sprite start={start} end={Infinity} keepMounted>
      {(() => {
        const { progress } = useSprite();
        const t = useTime();
        const drift = (t - start) * 8; // gentle drift right
        const entry = Math.min(1, progress * 5);
        return (
          <div className="cloud" style={{
            position: 'absolute',
            left: x + drift, top: y,
            width: w, height: w,
            opacity: entry * 0.88,
            transform: `scale(${0.7 + entry * 0.3})`,
          }}/>
        );
      })()}
    </Sprite>
  );
}

function AnimatedSun() {
  return (
    <Sprite start={0.3} end={Infinity}>
      {(() => {
        const { localTime, progress } = useSprite();
        const entry = Math.min(1, progress * 6);
        const e = Easing.easeOutBack(entry);
        const spin = localTime * 8;
        return (
          <div style={{
            position: 'absolute', top: 70, right: 90,
            transform: `scale(${e}) rotate(${spin}deg)`,
            opacity: entry,
          }}>
            <Sun size={130} />
          </div>
        );
      })()}
    </Sprite>
  );
}

function BouncingPip() {
  return (
    <Sprite start={0.8} end={Infinity}>
      {(() => {
        const { localTime } = useSprite();
        // jump-in over 0.9s with Back easing, then idle bob
        const jumpProgress = Math.min(1, localTime / 0.9);
        const jumpY = (1 - Easing.easeOutBack(jumpProgress)) * 500;
        const idleTime = Math.max(0, localTime - 0.9);
        const bob = Math.sin(idleTime * 3) * 8;
        const squash = jumpProgress < 1
          ? (1 + (1 - jumpProgress) * 0.2)
          : 1 + Math.sin(idleTime * 3) * 0.03;

        // Pip waves starting at t=3.5s (localTime = 2.7s)
        const wave = localTime > 2.7;

        return (
          <div style={{
            position: 'absolute',
            left: '50%', bottom: 110,
            transform: `translateX(-50%) translateY(${jumpY - bob}px) scaleY(${squash}) scaleX(${2 - squash})`,
            transformOrigin: 'bottom center',
          }}>
            <Pip size={260} wave={wave} />
          </div>
        );
      })()}
    </Sprite>
  );
}

function LogoLetter({ ch, delay, x }) {
  return (
    <Sprite start={1.6 + delay} end={Infinity}>
      {(() => {
        const { localTime } = useSprite();
        const p = Math.min(1, localTime / 0.5);
        const e = Easing.easeOutBack(p);
        const dropY = (1 - e) * -200;
        const idleTime = Math.max(0, localTime - 0.5);
        const bob = Math.sin(idleTime * 2.5 + delay * 4) * 4;
        return (
          <span style={{
            display: 'inline-block',
            transform: `translateY(${dropY + bob}px) rotate(${(1 - e) * -20}deg)`,
            opacity: p,
            color: '#FF8A4C',
            textShadow: '0 8px 0 #E15F1F, 0 18px 30px rgba(225,95,31,0.3)',
          }}>{ch}</span>
        );
      })()}
    </Sprite>
  );
}

function AcademyTag() {
  return (
    <Sprite start={2.9} end={Infinity}>
      {(() => {
        const { localTime } = useSprite();
        const p = Math.min(1, localTime / 0.55);
        const e = Easing.easeOutQuart(p);
        return (
          <div style={{
            fontFamily: 'Fredoka', fontWeight: 600,
            fontSize: 44, color: '#3D9E50',
            letterSpacing: '0.18em', textAlign: 'center', marginTop: 4,
            transform: `translateY(${(1 - e) * 30}px) scaleX(${0.7 + e * 0.3})`,
            opacity: p,
          }}>ACADEMY</div>
        );
      })()}
    </Sprite>
  );
}

function PlayButton() {
  return (
    <Sprite start={4.3} end={Infinity}>
      {(() => {
        const { localTime } = useSprite();
        const p = Math.min(1, localTime / 0.5);
        const e = Easing.easeOutBack(p);
        const idleTime = Math.max(0, localTime - 0.5);
        const pulse = 1 + Math.sin(idleTime * 4) * 0.04;
        return (
          <div style={{
            position: 'absolute', left: '50%', bottom: 70,
            transform: `translateX(-50%) translateY(${(1 - e) * 60}px) scale(${e * pulse})`,
            opacity: p,
          }}>
            <button style={{
              background: '#6FCB7F', color: '#fff',
              border: 'none', borderRadius: 999,
              padding: '20px 56px',
              fontFamily: 'Fredoka', fontWeight: 600, fontSize: 32,
              boxShadow: '0 8px 0 #3D9E50, 0 18px 28px -10px rgba(61,158,80,0.5)',
              cursor: 'pointer',
              display: 'flex', alignItems: 'center', gap: 14,
            }}>
              <span style={{
                display: 'inline-block', width: 0, height: 0,
                borderLeft: '18px solid #fff',
                borderTop: '12px solid transparent',
                borderBottom: '12px solid transparent',
              }}/>
              Tap to Play
            </button>
          </div>
        );
      })()}
    </Sprite>
  );
}

function Sparkles() {
  // Burst around logo at 1.6s
  return (
    <Sprite start={1.55} end={2.6}>
      {(() => {
        const { localTime } = useSprite();
        const p = Math.min(1, localTime / 0.7);
        return (
          <>
            {[
              [40, 0],    [-40, -10], [60, -30], [-60, -20],
              [20, -50],  [-20, -55], [80, 10],  [-80, 5],
              [100, -30], [-100, -25],
            ].map(([dx, dy], i) => {
              const dist = 30 + p * 80;
              const opacity = (1 - p) * 1;
              return (
                <div key={i} style={{
                  position: 'absolute',
                  left: '50%', top: 220,
                  width: 14, height: 14,
                  background: i % 2 ? '#FFCE52' : '#FF8A4C',
                  borderRadius: 4,
                  transform: `translate(${dx * dist / 50}px, ${dy * dist / 50}px) rotate(${i * 36}deg)`,
                  opacity,
                }}/>
              );
            })}
          </>
        );
      })()}
    </Sprite>
  );
}

function Scene() {
  const time = useTime();
  return (
    <div data-screen-label={`t=${time.toFixed(1)}s`} style={{ position: 'absolute', inset: 0 }}>
      <Background />
      <Cloud start={0.0} x={120}  y={130} w={70} />
      <Cloud start={0.2} x={780}  y={90}  w={90} />
      <Cloud start={0.4} x={460}  y={70}  w={56} />
      <AnimatedSun />
      <Sparkles />

      {/* Logo */}
      <div style={{
        position: 'absolute', top: 170, left: 0, right: 0,
        textAlign: 'center',
        fontFamily: 'Fredoka', fontWeight: 700, fontSize: 140,
        letterSpacing: '-0.02em', lineHeight: 1,
      }}>
        <LogoLetter ch="B" delay={0.0} />
        <LogoLetter ch="l" delay={0.08} />
        <LogoLetter ch="o" delay={0.16} />
        <LogoLetter ch="o" delay={0.24} />
        <LogoLetter ch="m" delay={0.32} />
        <AcademyTag />
      </div>

      <BouncingPip />
      <PlayButton />
    </div>
  );
}

function App() {
  return (
    <Stage width={1280} height={720} duration={7} background="#1a120a">
      <Scene />
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
