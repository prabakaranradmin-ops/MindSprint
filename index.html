// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel">
// ui-kit.jsx — shared building blocks for Bopplebee screens
// Components: TabletFrame, StatusBar, Pip (mascot), Star row, Bubble, Sticker,
// Btn, IconBtn, Chip, MediaSlot, ProgressBar, TopBar.

function TabletFrame({ children, label, screenBg, screenLabel }) {
  return (
    <div
      data-screen-label={screenLabel || label}
      style={{
        width: '100%',
        height: '100%',
        boxSizing: 'border-box',
        background: '#2A1E14',
        borderRadius: 38,
        padding: 14,
        boxShadow:
          'inset 0 0 0 2px rgba(255,255,255,0.06), 0 30px 60px -20px rgba(40,25,10,0.35)',
        position: 'relative',
      }}
    >
      {/* camera dot */}
      <div
        style={{
          position: 'absolute', top: 22, left: '50%', transform: 'translateX(-50%)',
          width: 8, height: 8, borderRadius: '50%',
          background: '#0d0703', boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.08)',
        }}
      />
      <div
        className="tablet"
        style={{ borderRadius: 26, background: screenBg || 'var(--cream-50)' }}
      >
        {children}
      </div>
    </div>
  );
}

function StatusBar({ time = '9:41', tone = 'ink-soft' }) {
  return (
    <div className="statusbar" style={{ color: 'var(--ink-soft)' }}>
      <span>{time}</span>
      <span style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <span style={{ fontSize: 11 }}>100%</span>
        <span style={{
          width: 26, height: 12, borderRadius: 3,
          border: '1.5px solid currentColor', position: 'relative',
        }}>
          <i style={{
            position: 'absolute', inset: 1.5, background: 'currentColor', borderRadius: 1.5,
          }}/>
        </span>
      </span>
    </div>
  );
}

function Pip({ size = 180, color = 'leaf', mood = 'happy', wave, arms, feet = true, style }) {
  // color: leaf | berry | sky | coral | sun
  const bodyMap = {
    leaf:  ['var(--leaf)',  'var(--leaf-dark)'],
    berry: ['var(--berry)', 'var(--berry-dark)'],
    sky:   ['var(--sky)',   'var(--sky-dark)'],
    coral: ['var(--coral)', 'var(--coral-dark)'],
    sun:   ['var(--sun)',   'var(--sun-dark)'],
  };
  const [body] = bodyMap[color] || bodyMap.leaf;
  return (
    <div
      className={`pip ${mood} ${wave ? 'wave' : ''}`}
      style={{ '--pip-size': size + 'px', '--pip-body': body, ...style }}
    >
      {feet && <div className="foot left" />}
      {feet && <div className="foot right" />}
      <div className="sprout" />
      <div className="leaf-blade" />
      <div className="body" />
      <div className="belly" />
      {arms && !wave && <div className="arm left" />}
      {(arms || wave) && <div className="arm right" />}
      <div className="eye left" />
      <div className="eye right" />
      <div className="cheek left" />
      <div className="cheek right" />
      <div className="mouth" />
    </div>
  );
}

function Stars({ count = 3, total = 3, size = 60 }) {
  return (
    <div style={{ display: 'flex', gap: 12 }}>
      {Array.from({ length: total }, (_, i) => (
        <span
          key={i}
          className={'star' + (i < count ? '' : ' empty')}
          style={{ width: size, height: size }}
        />
      ))}
    </div>
  );
}

function Bubble({ children, style }) {
  return <div className="bubble" style={style}>{children}</div>;
}

function Btn({ children, color = 'coral', size = 'md', style, ...rest }) {
  const cls = `btn ${color !== 'coral' ? color : ''} ${size === 'big' ? 'big' : ''}`;
  return <button className={cls.trim()} style={style} {...rest}>{children}</button>;
}

function IconBtn({ children, style, ...rest }) {
  return <button className="icon-btn" style={style} {...rest}>{children}</button>;
}

function Chip({ icon = 'coin', value, style }) {
  return (
    <div className="chip" style={style}>
      <span className={icon} />
      <span>{value}</span>
    </div>
  );
}

function MediaSlot({ w, h, label, style, radius = 'var(--r-md)' }) {
  return (
    <div
      className="media-slot"
      style={{
        width: w, height: h, borderRadius: radius, ...style,
      }}
    >
      {label}
    </div>
  );
}

function ProgressBar({ value = 0.5, style }) {
  return (
    <div className="bar" style={style}>
      <i style={{ width: (value * 100) + '%' }} />
    </div>
  );
}

function TopBar({ left, center, right, style }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '14px 24px 0 24px', ...style,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>{left}</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>{center}</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>{right}</div>
    </div>
  );
}

// Tiny decorative shapes
function Sun({ size = 80, style }) {

<script type="text/babel">
// audio-manager — Web Audio API sound effects for prototype
// All sounds are synthesized (no audio files needed).
// Exposes window.AudioMgr; also patches Btn to play tap on every click.
const AudioMgr = (() => {
  let ctx = null;
  let muted = false;

  function _ctx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }
  async function _resume() {
    const c = _ctx();
    if (c.state === 'suspended') await c.resume();
  }
  function _tone(freq, { type = 'sine', dur = 0.18, gain = 0.35, start = 0 } = {}) {
    const c = _ctx(), t = c.currentTime + start;
    const osc = c.createOscillator(), env = c.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, t);
    env.gain.setValueAtTime(gain, t);
    env.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(env); env.connect(c.destination);
    osc.start(t); osc.stop(t + dur + 0.01);
  }
  function _noise(dur = 0.06, gain = 0.08) {
    const c = _ctx(), buf = c.createBuffer(1, Math.ceil(c.sampleRate * dur), c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource(), env = c.createGain();
    src.buffer = buf; env.gain.setValueAtTime(gain, c.currentTime);
    env.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    src.connect(env); env.connect(c.destination);
    src.start(); src.stop(c.currentTime + dur + 0.01);
  }

  async function tap()        { if (muted) return; await _resume(); _tone(480, { type: 'triangle', dur: 0.08, gain: 0.22 }); }
  async function correct()    { if (muted) return; await _resume(); [523.25, 659.25, 783.99].forEach((f, i) => _tone(f, { dur: 0.25, gain: 0.32, start: i * 0.12 })); }
  async function retry()      { if (muted) return; await _resume(); _tone(392, { type: 'triangle', dur: 0.28, gain: 0.25 }); _tone(329.63, { type: 'triangle', dur: 0.32, gain: 0.20, start: 0.18 }); }
  async function starPop()    { if (muted) return; await _resume(); _tone(880, { dur: 0.12, gain: 0.38 }); _tone(1174.66, { dur: 0.18, gain: 0.28, start: 0.06 }); _noise(0.04, 0.06); }
  async function coin()       { if (muted) return; await _resume(); _tone(1046.5, { dur: 0.14, gain: 0.30 }); _tone(1318.5, { dur: 0.10, gain: 0.22, start: 0.05 }); }
  async function stageClear() { if (muted) return; await _resume(); [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => _tone(f, { type: 'triangle', dur: 0.28, gain: 0.34, start: i * 0.16 })); }
  async function phonics()    { if (muted) return; await _resume(); _noise(0.12, 0.12); _tone(200, { type: 'sawtooth', dur: 0.10, gain: 0.08, start: 0.04 }); }

  function setMute(val) { muted = !!val; }
  function isMuted()    { return muted; }
  return { tap, correct, retry, starPop, coin, stageClear, phonics, setMute, isMuted };
})();

// Patch Btn so every button click plays a tap sound automatically
(function patchBtnAudio() {
  const _Btn = window.Btn;
  if (!_Btn) return;
  window.Btn = function Btn({ children, color = 'coral', size = 'md', style, onClick, ...rest }) {
    const handleClick = (e) => { AudioMgr.tap(); if (onClick) onClick(e); };
    const cls = `btn ${color !== 'coral' ? color : ''} ${size === 'big' ? 'big' : ''}`;
    return React.createElement('button', { className: cls.trim(), style, onClick: handleClick, ...rest }, children);
  };
})();

Object.assign(window, { AudioMgr });

</script>

          }

            leaf:  ['var(--leaf)',  'var(--leaf-dark)'],
            coral: ['var(--coral)', 'var(--coral-dark)'],
          };
          const [bg, sh] = palette[c.color] || palette.coral;
          return (

              <div style={{ fontSize: 80 }}>{c.face}</div>
              <div className="display" style={{ fontSize: 22, color: 'var(--ink)' }}>{c.word}</div>
            </div>
          );
        })}
      </div>
    </TabletFrame>
  );
}

Object.assign(window, { DragDropScreen, TracingScreen, MatchingScreen });

</script>

function SRing({ value = 0.7, size = 120, stroke = 12, label, sub }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={stroke} />
        <defs>
          <linearGradient id={'sr' + size} x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#2ED3C6" />
            <stop offset="100%" stopColor="#6C7BFF" />
          </linearGradient>
        </defs>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={`url(#sr${size})`} strokeWidth={stroke}
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - value)} />
      </svg>
      <div style={{
        position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center', gap: 2,
      }}>
        <div className="s-display" style={{ fontSize: size * 0.26, color: 'var(--s-text)' }}>{label}</div>
        {sub && <div style={{ fontSize: 12, fontWeight: 800, color: 'var(--s-text-quiet)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>{sub}</div>}
      </div>
    </div>
  );
}

function SPip({ size = 44 }) {

}

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": ["#FF8A4C", "#6FCB7F", "#5EB7E8", "#B587E0"],
  "screenBg": "#FFF7E8",
  "displayFont": "Fredoka",
  "bodyFont": "Nunito",
  "tiltCards": true
}/*EDITMODE-END*/;

const PALETTES = {
  "Bloom (default)":  ["#FF8A4C", "#6FCB7F", "#5EB7E8", "#B587E0"],
  "Berry orchard":    ["#E15F8B", "#B587E0", "#FFB347", "#6FCB7F"],
  "Ocean garden":     ["#4DB2C7", "#6FCB7F", "#FFCE52", "#F58FA8"],
  "Forest friends":   ["#3D9E50", "#A67D5A", "#FFCE52", "#E66A2C"],
  "Cotton candy":     ["#F58FA8", "#B587E0", "#5EB7E8", "#FFCE52"],
};

function applyPalette(arr) {
  const root = document.documentElement;
  root.style.setProperty('--coral',       arr[0]);
  root.style.setProperty('--coral-dark',  shade(arr[0], -25));
  root.style.setProperty('--leaf',        arr[1]);
  root.style.setProperty('--leaf-dark',   shade(arr[1], -25));
  root.style.setProperty('--sky',         arr[2]);
  root.style.setProperty('--sky-dark',    shade(arr[2], -25));
  root.style.setProperty('--berry',       arr[3]);
  root.style.setProperty('--berry-dark',  shade(arr[3], -25));
}
function shade(hex, pct) {
  const num = parseInt(hex.slice(1), 16);
  const r = (num >> 16) & 0xff, g = (num >> 8) & 0xff, b = num & 0xff;
  const f = (1 + pct / 100);
  const cl = (v) => Math.max(0, Math.min(255, Math.round(v * f)));
  return '#' + [cl(r), cl(g), cl(b)].map(v => v.toString(16).padStart(2, '0')).join('');
}

const FONT_OPTIONS = {
  display: [
    { label: 'Fredoka', value: 'Fredoka' },
    { label: 'Baloo 2', value: 'Baloo 2' },
    { label: 'Bubblegum Sans', value: 'Bubblegum Sans' },

  body: [
    { label: 'Nunito', value: 'Nunito' },
    { label: 'Quicksand', value: 'Quicksand' },
    { label: 'Rubik', value: 'Rubik' },
  ],
};

function ensureFont(family) {
  const id = 'gf-' + family.replace(/\s+/g, '-').toLowerCase();
  if (document.getElementById(id)) return;
  const link = document.createElement('link');
  link.id = id;
  link.rel = 'stylesheet';
  link.href = `https://fonts.googleapis.com/css2?family=${family.replace(/ /g, '+')}:wght@400;500;600;700;800;900&display=swap`;
  document.head.appendChild(link);
}

  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => { applyPalette(t.palette); }, [t.palette]);
  React.useEffect(() => {
    ensureFont(t.displayFont);
    ensureFont(t.bodyFont);
    document.documentElement.style.setProperty('--display-font', `'${t.displayFont}', system-ui, sans-serif`);

    document.body.style.fontFamily = `'${t.bodyFont}', system-ui, sans-serif`;

// ── Prototype Walkthrough ─────────────────────────────────────────────────────
// Full-screen overlay walking through the core kid-flow.
// Open: floating "▶ Play through" button (top-right).  Navigate: ← → keys or buttons.  Close: Esc.

const WALKTHROUGH_FLOW = [
  { id:'splash',   label:'Splash',          Screen:()=><SplashScreen />,          hint:'Tap to Play ▶',       note:'Entry point — returning users skip onboarding' },
  { id:'welcome',  label:'Welcome',          Screen:()=><WelcomeScreen />,          hint:'Hi, Pip! →',           note:'Name + age — first-run only' },
  { id:'avatar',   label:'Pick buddy',       Screen:()=><AvatarScreen />,           hint:'Looks great! →',       note:'Color + accessory — saved to profile' },
  { id:'plan',     label:'Learning plan',    Screen:()=><LearningPlanScreen />,     hint:"Let's go! 🌱",         note:'Pick ≥ 2 subjects — editable later' },
  { id:'map',      label:'World map',        Screen:()=><HomeMapScreen />,          hint:'Tap current node',     note:'Node-on-path progression — locked nodes at 55% opacity' },
  { id:'intro',    label:'Lesson intro',     Screen:()=><LessonIntroScreen />,      hint:'Start ▶',              note:'Pip + speech bubble + 3-star objective card' },
  { id:'math',     label:'Math activity',    Screen:()=><MathActivityScreen />,     hint:'Answer a question',    note:'5 questions/stage · buttons disable during feedback' },
  { id:'correct',  label:'Correct! ✓',       Screen:()=><CorrectFeedbackScreen />,  hint:'Next question →',      note:'Never blocks > 1 tap · +1 star · +5 coins' },
  { id:'retry',    label:'Try again',        Screen:()=><TryAgainFeedbackScreen />, hint:'Try again',            note:'No red · no ✗ · hearts cosmetic · 2nd wrong → Show me' },
  { id:'reward',   label:'Stage cleared 🎉', Screen:()=><RewardScreen />,           hint:'Next Stage →',         note:'+25 coins · badge · next map node unlocks' },
  { id:'subjects', label:'Pick subject',     Screen:()=><SubjectsScreen />,         hint:'Tap a subject',        note:'Accessible from map header · locked at 55% opacity' },
  { id:'shop',     label:"Pip's shop",       Screen:()=><ShopScreen />,             hint:'Browse items',         note:'Sun price = affordable · dim = too expensive' },
  { id:'settings', label:'Settings',         Screen:()=><SettingsScreen />,         hint:'Try the parent gate',  note:'Answer 28 → unlocks dashboard + daily-limit control' },
];

function PrototypeWalkthrough({ onClose }) {
  const [idx, setIdx] = React.useState(0);
  const total = WALKTHROUGH_FLOW.length;
  const step  = WALKTHROUGH_FLOW[idx];

  const prev = () => { if (idx > 0)           { setIdx(idx - 1); if (window.AudioMgr) window.AudioMgr.tap(); } };
  const next = () => { if (idx < total - 1)   { setIdx(idx + 1); if (window.AudioMgr) window.AudioMgr.tap(); } };

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prev();
      if (e.key === 'Escape') onClose();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [idx]);

  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const calc = () => {
      const vw = window.innerWidth  - 120;
      const vh = window.innerHeight - 148;
      setScale(Math.min(vw / 1024, vh / 720, 1));
    };
    calc();
    window.addEventListener('resize', calc);
    return () => window.removeEventListener('resize', calc);
  }, []);

  const pct = Math.round((idx / (total - 1)) * 100);
  const Screen = step.Screen;

  return ReactDOM.createPortal(
    <div style={{ position:'fixed', inset:0, zIndex:99999, background:'rgba(20,12,4,0.97)', display:'flex', flexDirection:'column', alignItems:'center', backdropFilter:'blur(6px)', fontFamily:"'Nunito', system-ui, sans-serif" }}>

      {/* top bar */}
      <div style={{ width:'100%', maxWidth:1100, display:'flex', alignItems:'center', gap:14, padding:'14px 24px', flexShrink:0 }}>
        <div style={{ fontFamily:"'Fredoka', system-ui, sans-serif", fontWeight:700, fontSize:18, color:'#FF8A4C', padding:'4px 14px', borderRadius:999, background:'rgba(255,138,76,0.12)', border:'1px solid rgba(255,138,76,0.25)', flexShrink:0 }}>Bopplebee</div>
        <div style={{ flex:1, height:6, borderRadius:999, background:'rgba(255,255,255,0.10)', overflow:'hidden' }}>
          <div style={{ height:'100%', borderRadius:999, background:'linear-gradient(90deg,#FF8A4C,#6FCB7F)', width:pct+'%', transition:'width 0.25s ease' }}/>
        </div>
        <div style={{ fontSize:13, fontWeight:800, color:'rgba(255,255,255,0.45)', flexShrink:0 }}>{idx+1} / {total}</div>
        <button onClick={onClose} title="Close (Esc)" style={{ width:36, height:36, borderRadius:'50%', border:'1px solid rgba(255,255,255,0.15)', background:'rgba(255,255,255,0.08)', color:'rgba(255,255,255,0.6)', fontSize:20, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', lineHeight:1, flexShrink:0 }}>×</button>
      </div>

      {/* screen + side arrows */}
      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', width:'100%', overflow:'hidden', position:'relative' }}>
        <button onClick={prev} disabled={idx===0} style={{ position:'absolute', left:16, zIndex:2, width:52, height:52, borderRadius:'50%', border:'1px solid rgba(255,255,255,0.15)', background:idx===0?'rgba(255,255,255,0.03)':'rgba(255,255,255,0.10)', color:idx===0?'rgba(255,255,255,0.2)':'#fff', fontSize:22, cursor:idx===0?'default':'pointer', display:'flex', alignItems:'center', justifyContent:'center' }} title="Previous (←)">←</button>

        <div style={{ width:1024, height:720, transform:`scale(${scale})`, transformOrigin:'center center', borderRadius:18, boxShadow:'0 0 0 1px rgba(255,255,255,0.08),0 40px 80px rgba(0,0,0,0.6)', overflow:'hidden', flexShrink:0 }}>
          <Screen />
        </div>

        <button onClick={next} disabled={idx===total-1} style={{ position:'absolute', right:16, zIndex:2, width:52, height:52, borderRadius:'50%', border:'1px solid rgba(255,255,255,0.15)', background:idx===total-1?'rgba(255,255,255,0.03)':'rgba(255,138,76,0.25)', color:idx===total-1?'rgba(255,255,255,0.2)':'#FF8A4C', fontSize:22, cursor:idx===total-1?'default':'pointer', display:'flex', alignItems:'center', justifyContent:'center' }} title="Next (→)">→</button>
      </div>

      {/* bottom bar */}
      <div style={{ width:'100%', maxWidth:1100, padding:'12px 24px 8px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <div style={{ fontFamily:"'Fredoka',system-ui,sans-serif", fontWeight:700, fontSize:20, color:'#fff' }}>{step.label}</div>
          <div style={{ fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.38)', maxWidth:420, lineHeight:1.4 }}>{step.note}</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 16px', borderRadius:999, background:'rgba(111,203,127,0.15)', border:'1px solid rgba(111,203,127,0.25)', fontSize:13, fontWeight:800, color:'#6FCB7F', flexShrink:0 }}>
          <span style={{ opacity:0.65 }}>CTA:</span> {step.hint}
        </div>
      </div>

      {/* step dots */}
      <div style={{ display:'flex', gap:6, paddingBottom:14, flexShrink:0 }}>
        {WALKTHROUGH_FLOW.map((s, i) => (
          <div key={s.id} onClick={() => { setIdx(i); if (window.AudioMgr) window.AudioMgr.tap(); }} title={s.label}
            style={{ width:i===idx?28:8, height:8, borderRadius:999, background:i===idx?'#FF8A4C':i<idx?'#6FCB7F':'rgba(255,255,255,0.18)', cursor:'pointer', transition:'all 0.2s' }}/>
        ))}
      </div>
    </div>,
    document.body,
  );
}

function AppWithWalkthrough() {
  const [showWalkthrough, setShowWalkthrough] = React.useState(false);
  return (
    <>
      <App />
      {!showWalkthrough && (
        <button
          onClick={() => { setShowWalkthrough(true); if (window.AudioMgr) window.AudioMgr.tap(); }}
          style={{ position:'fixed', top:16, right:16, zIndex:9999, display:'flex', alignItems:'center', gap:8, padding:'10px 20px', borderRadius:999, border:'none', background:'#FF8A4C', boxShadow:'0 4px 0 #E15F1F,0 10px 24px rgba(225,95,31,0.35)', fontFamily:"'Fredoka',system-ui,sans-serif", fontWeight:700, fontSize:16, color:'#fff', cursor:'pointer' }}
          title="Walk through the core user flow"
        >▶ Play through</button>
      )}
      {showWalkthrough && <PrototypeWalkthrough onClose={() => setShowWalkthrough(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppWithWalkthrough />);
</script>
