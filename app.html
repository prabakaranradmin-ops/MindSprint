const SHOP_ITEMS = C.shopItems;   // §14/§19.1: config, not code — content.js
const shopIcon = id => (SHOP_ITEMS.find(x => x.id === id) || {}).icon;

const shopPillBtn = { border:'none', cursor:'pointer', display:'flex', alignItems:'center',
  gap:7, padding:'8px 18px', borderRadius:999, fontFamily:'Fredoka', fontWeight:600,
  fontSize:15, color:'var(--ink)' };

function ShopScreen({ dispatch, profile }) {
  const owned = profile.owned || [];
  const wearing = profile.avatarAccessory;
  const wornIcon = shopIcon(wearing);
  useEffect(()=>{ speak("Welcome to Pip's Shop! Spend your coins on something fun."); },[]);

  /* §14 affordability celebration: the first time the balance crosses an
     item's price, Pip points it out once — never a nag, never repeated. */
  const noticed = profile.affordNoticed || [];
  const [celebrate, setCelebrate] = useState(null);
  useEffect(()=>{
    const item = SHOP_ITEMS.find(it => !owned.includes(it.id) && !noticed.includes(it.id)
      && profile.coins >= it.price);
    if (!item) return;
    dispatch({type:'AFFORD_NOTICED',id:item.id});
    setCelebrate(item);
    SFX('coin'); speak(`You have enough for the ${item.name}!`);
    const t = setTimeout(()=>setCelebrate(null), 3200);
    return ()=>clearTimeout(t);
  },[profile.coins]);
  return (
    <div className="screen">
      <div style={{position:'absolute',inset:0,
        background:'radial-gradient(ellipse 70% 50% at 50% 0%, #FFE9B8 0%, transparent 55%), var(--cream-50)'}}/>

      {/* top bar */}
      <div style={{position:'absolute',top:18,left:0,right:0,padding:'0 24px',
        display:'flex',justifyContent:'space-between',alignItems:'center',zIndex:5}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <IconBtn onClick={()=>dispatch({type:'NAV',screen:'map'})}>←</IconBtn>
          <div className="display" style={{fontSize:26,color:'var(--ink)'}}>Pip's Shop</div>
        </div>
        <Chip icon="coin" value={profile.coins}/>
      </div>

      {/* Pip modeling the worn outfit */}
      <div style={{position:'absolute',left:50,top:110,width:300,
        display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
        <div style={{width:280,height:320,background:'#fff',borderRadius:32,
          boxShadow:'0 8px 0 rgba(61,40,24,0.08)',display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',gap:8}}>
          <div style={{position:'relative'}}>
            <Pip size={190} color={profile.avatarColor||'leaf'} mood="happy"/>
            {wornIcon&&<div style={{position:'absolute',top:-34,left:'50%',
              transform:'translateX(-50%) rotate(-6deg)',fontSize:56}}>{wornIcon}</div>}
          </div>
          <div style={{fontFamily:'Fredoka',fontWeight:600,fontSize:20,color:'var(--ink)'}}>
            {wornIcon?'Looking good!':'Pick something fun!'}
          </div>
        </div>
        <div style={{padding:'10px 20px',borderRadius:999,
          background:owned.length===SHOP_ITEMS.length?'var(--sun)':'var(--cream-100)',
          fontSize:14,fontWeight:800,color:'var(--ink-soft)',textAlign:'center'}}>
          {owned.length===SHOP_ITEMS.length
            ? 'You own everything! 🎉 What a collection!'
            : 'Earn coins by finishing stages ⭐'}
        </div>
      </div>

      {/* item grid — owned/wearing, affordable, too-expensive (55% opacity) */}
      <div style={{position:'absolute',left:380,right:44,top:110,bottom:40,
        display:'grid',gridTemplateColumns:'repeat(4,1fr)',gridTemplateRows:'repeat(2,1fr)',gap:18}}>
        {SHOP_ITEMS.map(it=>{
          const isOwned = owned.includes(it.id);
          const isWearing = wearing===it.id;
          const affordable = profile.coins>=it.price;
          return (
            <div key={it.id} className="shop-item" style={{
              background:'#fff',borderRadius:24,padding:16,
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'space-between',
              boxShadow:isWearing?'0 0 0 3px var(--leaf), 0 5px 0 var(--leaf-dark)':'0 5px 0 rgba(61,40,24,0.08)',
              opacity:!isOwned&&!affordable?0.55:1,position:'relative'}}>
              {isWearing&&<div style={{position:'absolute',top:-9,right:-9,width:30,height:30,
                borderRadius:'50%',background:'var(--leaf)',display:'flex',alignItems:'center',
                justifyContent:'center',color:'#fff',fontWeight:900,fontSize:15,
                boxShadow:'0 2px 0 var(--leaf-dark)'}}>✓</div>}
              <div style={{fontSize:52,marginTop:8}}>{it.icon}</div>
              <div style={{fontFamily:'Fredoka',fontWeight:600,fontSize:16,color:'var(--ink)'}}>{it.name}</div>
              {isWearing?(
                <div onClick={()=>dispatch({type:'SHOP_WEAR',id:'none'})} style={{cursor:'pointer',
                  padding:'7px 18px',borderRadius:999,background:'var(--cream-100)',
                  fontFamily:'Fredoka',fontWeight:600,fontSize:14,color:'var(--ink-soft)'}}>Wearing</div>
              ):isOwned?(
                <button onClick={()=>dispatch({type:'SHOP_WEAR',id:it.id})}
                  style={{...shopPillBtn,background:'var(--leaf)',
                    boxShadow:'0 3px 0 var(--leaf-dark)',color:'#fff'}}>Wear</button>
              ):(
                <button onClick={()=>{ if(affordable){ dispatch({type:'SHOP_BUY',id:it.id});
                    SFX('coin'); HAPTIC(15); speak(`The ${it.name} looks great on you!`); } }}
                  style={{...shopPillBtn,background:affordable?'var(--sun)':'var(--cream-200)',
                    boxShadow:affordable?'0 3px 0 var(--sun-dark)':'none',
                    cursor:affordable?'pointer':'not-allowed'}}>
                  <span style={{width:16,height:16,borderRadius:'50%',
                    background:affordable?'#fff':'var(--sun)',
                    boxShadow:'inset 0 -2px 0 var(--sun-dark)'}}/>
                  {it.price}
                </button>
              )}
            </div>
          );
        })}
      </div>

      {celebrate&&(
        <div className="pop-in" style={{position:'absolute',top:110,left:'50%',transform:'translateX(-50%)',
          zIndex:20,background:'#fff',borderRadius:22,padding:'14px 24px',display:'flex',
          alignItems:'center',gap:12,boxShadow:'0 8px 0 var(--sun-dark),0 20px 40px -10px rgba(61,40,24,.3)'}}>
          <Pip size={44} color={profile.avatarColor||'leaf'} mood="happy"/>
          <div style={{fontFamily:'Fredoka',fontWeight:700,fontSize:17,color:'var(--ink)'}}>
            You have enough for the {celebrate.name}! {celebrate.icon}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   PARENT GATE
═══════════════════════════════════════════════════════ */
const GATE_QS = [
  { q:'What is 7 × 4?', opts:[24,28,32], ans:28 },
  { q:'What is 6 × 6?', opts:[34,36,38], ans:36 },
  { q:'What is 8 × 3?', opts:[22,24,26], ans:24 },
  { q:'What is 5 × 7?', opts:[30,35,40], ans:35 },
];

function ParentGateModal({ dispatch }) {
  const [gq] = useState(() => pick(GATE_QS));
  const [chosen, setChosen] = useState(null);

  const pick2 = (v) => {
    setChosen(v);
    if (v === gq.ans) {
      setTimeout(()=>dispatch({type:'PARENT_DASH',v:true}), 600);
    }
  };

  return (
    <div className="modal-overlay" onClick={()=>dispatch({type:'PARENT_GATE',v:false})}>
      <div className="modal-card" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:42}}>🔐</div>
        <div className="display" style={{fontSize:26,color:'var(--ink)'}}>Grown-ups only</div>
        <div style={{fontSize:17,color:'var(--ink-soft)',fontWeight:700,lineHeight:1.4,maxWidth:380}}>
          {gq.q}
        </div>
        <div style={{display:'flex',gap:16,marginTop:8}}>
          {gq.opts.map(o=>(
            <button key={o} onClick={()=>pick2(o)}
              style={{
                width:80,height:80,borderRadius:22,border:'3px solid',
                fontFamily:'Fredoka',fontWeight:700,fontSize:28,cursor:'pointer',
                borderColor: chosen===null?'var(--cream-200)': o===gq.ans?'var(--leaf)': chosen===o?'var(--rose)':'var(--cream-200)',
                background: chosen===null?'#fff': o===gq.ans?'var(--leaf)': chosen===o?'var(--rose)':'#fff',
                color: (chosen!==null&&(o===gq.ans||chosen===o))?'#fff':'var(--ink)',
                transition:'all .2s',
              }}>{o}</button>
          ))}
        </div>
        <div style={{fontSize:13,color:'var(--ink-quiet)',fontWeight:700,marginTop:4}}>
          No ads · No chat · COPPA compliant
        </div>
        <button onClick={()=>dispatch({type:'PARENT_GATE',v:false})}
          style={{background:'none',border:'none',color:'var(--ink-quiet)',cursor:'pointer',fontWeight:800,fontSize:15,marginTop:4}}>
          ← Back to game
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   PARENT DASHBOARD
═══════════════════════════════════════════════════════ */
/* Progress arrives worlds-wrapped (v3); flatten for stats. */
const nodesOf = p => p?.worlds ? p.worlds.flatMap(w => w.nodes) : (p?.nodes || []);

function ParentDashboard({ dispatch, profile, progress, settings, skills, events, roster }) {
  const fileRef = useRef(null);
  const [postcardWorld, setPostcardWorld] = useState(null); // §13.4: world picked for the print postcard
  const printPostcard = (world) => { setShowClassroom(false); setPostcardWorld(world); setTimeout(()=>window.print(), 50); };
  const [renamingId, setRenamingId] = useState(null);   // §12: profile id currently being renamed inline
  const [renameDraft, setRenameDraft] = useState('');
  const [agingId, setAgingId] = useState(null);   // §26: profile id whose age is being changed inline
  const [ageDraft, setAgeDraft] = useState(6);
  const [deletingId, setDeletingId] = useState(null);   // §12: profile id pending gentle-deletion confirmation
  const [resettingId, setResettingId] = useState(null);  // §11.2: profile id pending progress-reset confirmation
  const startRename = (p) => { setRenamingId(p.id); setRenameDraft(p.profile.name||''); };
  const confirmRename = () => {
    const name = finalizeName(renameDraft);
    dispatch({type:'RENAME_PROFILE', id:renamingId, name});
    setRenamingId(null);
  };
  const startAging = (p) => { setAgingId(p.id); setAgeDraft(p.profile.age||6); };
  const confirmAging = () => {
    dispatch({type:'SET_PROFILE_AGE', id:agingId, age:ageDraft});
    setAgingId(null);
  };
  useEffect(() => {
    const clear = () => { setPostcardWorld(null); setShowClassroom(false); };
    window.addEventListener('afterprint', clear);
    return () => window.removeEventListener('afterprint', clear);
  }, []);

  /* §22.2 corrupted-save diagnostics: surfaces the stashed corrupt blob (if
     any) so a parent knows recovery happened and can dismiss the notice —
     never shown to the child, informational only, nothing to "fix" here
     since the app already recovered on its own. */
  const [corruptInfo, setCorruptInfo] = useState(() => {
    try { return JSON.parse(localStorage.getItem('bloom-v3-corrupt') || 'null'); } catch { return null; }
  });
  const dismissCorruptNotice = () => {
    try { localStorage.removeItem('bloom-v3-corrupt'); } catch {}
    setCorruptInfo(null);
  };

  const exportSave = () => {
    const data = localStorage.getItem('bloom-v3') || localStorage.getItem('bloom-v2') || '{}';
    const blob = new Blob([data], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bloom-backup-' + todayStr() + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
  };
  const importSave = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data && data.profiles && data.profiles.length) {          // v3 backup
          localStorage.setItem('bloom-v3', JSON.stringify(data));
        } else if (data && data.profile && data.progress) {           // v2 backup
          localStorage.setItem('bloom-v2', JSON.stringify(data));
          localStorage.removeItem('bloom-v3');                        // let migration re-run
        } else throw new Error('bad file');
        location.reload();
      } catch { alert("That file doesn't look like a Bloom backup."); }
    };
    reader.readAsText(file);
  };

  /* Real play data from the local event log (§13.1): stage_complete durations
     summed per local calendar day, last 7 days ending today. */
  const dayKey = ts => { const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
  const secsByDay = {};
  (events||[]).forEach(e => {
    if (e.t === 'stage_complete') secsByDay[dayKey(e.ts)] = (secsByDay[dayKey(e.ts)]||0) + (e.durationSec||0);
  });
  const week = Array.from({length:7},(_,i)=>new Date(Date.now()-(6-i)*86400000));
  const days = week.map(d=>['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]);
  const playMins = week.map(d=>{ const s = secsByDay[dayKey(d.getTime())]||0;
    return s ? Math.max(1, Math.round(s/60)) : 0; });
  const maxMins = Math.max(...playMins, 1);

  /* Per-skill accuracy (§9.1) + practice-next recommendation (§9.3) */
  const skillRows = Object.entries(skills||{})
    .map(([id,s])=>({ id, label:SKILL_LABELS[id]||id, attempts:s.attempts,
      acc:s.attempts?Math.round(s.correct/s.attempts*100):0 }))
    .sort((a,b)=>a.acc-b.acc);
  const weakSkill = skillRows.find(r=>r.attempts>=5&&r.acc<70);

  // Progress per subject
  const subjectProgress = SUBJECTS.filter(s=>!s.locked).map(s=>{
    const nodes = nodesOf(progress[s.id]);
    const done = nodes.filter(n=>n.status==='done').length;
    return { ...s, pct: Math.round(done/NODE_COUNT*100) };
  });

  /* §13.4 / P3_CLOUD_DESIGN.md §4.2 Classroom mode — local-only slice: an
     aggregate, export-only report across every profile on THIS device.
     No cloud, no DPA needed (§4.1's consent/DPA requirement only applies
     once data would leave the device — this never does). Class-level
     patterns only: no per-child ranking, no comparison framing between
     children, matching the same anti-stress posture as the rest of the
     product (§14) applied to how a teacher sees the data too. */
  const classroomStats = useMemo(() => {
    if (!roster || roster.length < 2) return null;   // needs 2+ profiles to be a "class," not just backup noise
    const perSubject = {};
    for (const s of SUBJECTS.filter(x=>!x.locked)) {
      const pcts = roster.map(p => {
        const nodes = nodesOf((p.progress||{})[s.id]);
        return nodes.length ? Math.round(nodes.filter(n=>n.status==='done').length/NODE_COUNT*100) : 0;
      });
      perSubject[s.id] = { label:s.label, avgPct: Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length) };
    }
    const skillAgg = {};
    for (const p of roster) {
      for (const [id, sk] of Object.entries(p.skills||{})) {
        const a = (skillAgg[id] = skillAgg[id] || { attempts:0, correct:0 });
        a.attempts += sk.attempts||0; a.correct += sk.correct||0;
      }
    }
    const classSkillRows = Object.entries(skillAgg)
      .map(([id,a])=>({ id, label:SKILL_LABELS[id]||id, attempts:a.attempts,
        acc: a.attempts?Math.round(a.correct/a.attempts*100):0 }))
      .filter(r=>r.attempts>=3)     // enough class-wide attempts to mean something
      .sort((a,b)=>a.acc-b.acc);
    const totalStars = roster.reduce((a,p)=>a+((p.profile||{}).stars||0), 0);
    const avgStreak = Math.round(roster.reduce((a,p)=>a+((p.profile||{}).streak||0), 0) / roster.length);
    return { childCount: roster.length, perSubject, classSkillRows, totalStars, avgStreak };
  }, [roster, skills]);
  const [showClassroom, setShowClassroom] = useState(false);
  const printClassroom = () => { setPostcardWorld(null); setShowClassroom(true); setTimeout(()=>window.print(), 50); };

  return (
    <div className="screen" style={{background:'#F7F3EE'}}>
      {/* header */}
      <div style={{background:'#fff',borderBottom:'2px solid var(--cream-100)',
        padding:'18px 32px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:44,height:44,borderRadius:'50%',background:`var(--${profile.avatarColor||'leaf'})`,
            display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Pip size={34} color={profile.avatarColor||'leaf'} feet={false}/>
          </div>
          <div>
            <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:20,color:'var(--ink)'}}>
              {profile.name||'Your child'}'s Progress
            </div>
            <div style={{fontSize:13,color:'var(--ink-quiet)',fontWeight:700}}>Parent Dashboard</div>
          </div>
        </div>
        <div style={{display:'flex',gap:14,alignItems:'center'}}>
          <div style={{fontSize:13,color:'var(--ink-soft)',fontWeight:800}}>🔒 Secure area</div>
          <Btn color="ghost" onClick={()=>dispatch({type:'PARENT_DASH',v:false})}>← Back to Game</Btn>
        </div>
      </div>

      <div style={{padding:'24px 32px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:24,height:'calc(100% - 82px)',overflow:'auto'}}>
        {/* §22.2 corrupted-save diagnostics notice — only ever appears after
            the app has already silently recovered from a corrupted save.
            Calm, informational, dismissible; never blocks anything. */}
        {corruptInfo && (
          <div className="pd-card" style={{gridColumn:'1/-1',background:'var(--cream-50)',
            border:'1px solid var(--sun)',display:'flex',alignItems:'center',gap:14}}>
            <div style={{fontSize:26}}>🛟</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:800,fontSize:14,color:'var(--ink)'}}>We found and recovered from a save file problem</div>
              <div style={{fontSize:12,color:'var(--ink-quiet)',fontWeight:700,marginTop:2}}>
                On {new Date(corruptInfo.ts).toLocaleDateString()}, the app couldn't read its usual save file and switched to a backup automatically — nothing was lost, and no action is needed. This is just a record for your own peace of mind.
              </div>
            </div>
            <button onClick={dismissCorruptNotice} style={{border:'none',cursor:'pointer',
              padding:'8px 16px',borderRadius:999,background:'var(--cream-200)',
              color:'var(--ink-soft)',fontFamily:'Fredoka',fontWeight:700,fontSize:13,flexShrink:0}}>Got it</button>
          </div>
        )}
        {/* Stats row */}
        <div style={{gridColumn:'1/-1',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
          {[
            {icon:'⏱',label:'Today',value:playMins[6]+' min'},
            {icon:'⭐',label:'Total Stars',value:profile.stars},
            {icon:'🏆',label:'Stages Done',value: Object.values(progress).flatMap(nodesOf).filter(n=>n.status==='done').length},
            {icon:'🔥',label:'Streak',value:profile.streak+' days'},
          ].map((s,i)=>(
            <div key={i} className="stat-card">
              <div style={{fontSize:28}}>{s.icon}</div>
              <div style={{fontFamily:'Fredoka',fontWeight:700,fontSize:30,color:'var(--ink)',marginTop:4}}>{s.value}</div>
              <div style={{fontSize:12,color:'var(--ink-quiet)',fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',marginTop:2}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Weekly chart */}
        <div className="pd-card">
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:16}}>📅 Weekly Play Time</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:10,height:100}}>
            {days.map((d,i)=>(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{width:'100%',background: i===6?'var(--coral)':'var(--sky)',
                  height: (playMins[i]/maxMins*80)+'px',borderRadius:'6px 6px 0 0',
                  boxShadow:i===6?'0 3px 0 var(--coral-dark)':'0 3px 0 var(--sky-dark)',
                  minHeight:4,transition:'height .6s ease'}}/>
                <div style={{fontSize:11,fontWeight:800,color:'var(--ink-soft)'}}>{d}</div>
                <div style={{fontSize:10,color:'var(--ink-quiet)',fontWeight:700}}>{playMins[i]?playMins[i]+'m':'-'}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Subject progress */}
        <div className="pd-card">
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:16}}>📊 Subject Progress</div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {subjectProgress.map(s=>(
              <div key={s.id}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                  <div style={{fontWeight:800,fontSize:15,color:'var(--ink)'}}>{s.icon} {s.label}</div>
                  <div style={{fontWeight:900,fontSize:15,color:'var(--ink-soft)'}}>{s.pct}%</div>
                </div>
                <div className="pd-bar-bg">
                  <div className="pd-bar-fill" style={{width:s.pct+'%',background:s.color}}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Settings */}
        <div className="pd-card" style={{gridColumn:'1/-1'}}>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:16}}>⚙️ Settings</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            {[
              {label:'Daily Time Limit (30 min)', sub:'Pip suggests a break after 30 minutes of play', state:!!settings.dailyLimit, set:v=>dispatch({type:'SET_SETTING',key:'dailyLimit',v}), color:'var(--coral)'},
              {label:'Read Aloud', sub:'Speaks instructions to your child', state:settings.readAloud, set:v=>dispatch({type:'SET_SETTING',key:'readAloud',v}), color:'var(--sky)'},
              {label:'Sound Effects', sub:'In-game audio feedback', state:settings.sfx, set:v=>dispatch({type:'SET_SETTING',key:'sfx',v}), color:'var(--leaf)'},
            ].map((s,i)=>(
              <div key={i} className="pd-toggle-row" style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                background:'var(--cream-50)',borderRadius:16,padding:'16px 20px'}}>
                <div>
                  <div style={{fontWeight:800,fontSize:15,color:'var(--ink)'}}>{s.label}</div>
                  <div style={{fontSize:12,color:'var(--ink-quiet)',fontWeight:700,marginTop:2}}>{s.sub}</div>
                </div>
                <div className="pd-toggle" onClick={()=>s.set(!s.state)} style={{
                  width:56,height:32,borderRadius:999,cursor:'pointer',
                  background:s.state?s.color:'var(--cream-200)',transition:'background .2s',
                  position:'relative',flexShrink:0,
                }}>
                  <div style={{position:'absolute',top:4,width:24,height:24,borderRadius:'50%',
                    background:'#fff',boxShadow:'0 2px 4px rgba(0,0,0,.2)',
                    left:s.state?28:4,transition:'left .2s'}}/>
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:14,padding:'12px 16px',background:'var(--cream-50)',borderRadius:14,
            fontSize:13,color:'var(--ink-soft)',fontWeight:700,lineHeight:1.6}}>
            🛡️ No ads · No chat with strangers · All data stays on this device · COPPA compliant
          </div>
        </div>

        {/* Skills & recommendation (§9.1 / §9.3) */}
        <div className="pd-card" style={{gridColumn:'1/-1'}}>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:12}}>🎯 Skills</div>
          <div style={{marginBottom:14,padding:'10px 16px',borderRadius:14,
            background:weakSkill?'rgba(255,206,82,.25)':'rgba(111,203,127,.18)',
            fontWeight:800,fontSize:14,color:'var(--ink)'}}>
            {weakSkill
              ? `🎯 Practice next: ${weakSkill.label} — short, gentle sessions help most`
              : skillRows.length
                ? '🌟 All practiced skills look strong — keep exploring!'
                : '🌱 Play a stage to start tracking skills!'}
            {/* §13.4 real-world activity suggestion: additive, screen-only text tied to the same skill id */}
            {weakSkill && REALWORLD_TIPS[weakSkill.id] && (
              <div style={{marginTop:8,fontWeight:700,fontSize:13,color:'var(--ink-soft)',lineHeight:1.5}}>
                💡 Away from the screen: {REALWORLD_TIPS[weakSkill.id]}
              </div>
            )}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px 24px'}}>
            {skillRows.slice(0,8).map(r=>(
              <div key={r.id}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <div style={{fontWeight:800,fontSize:13,color:'var(--ink)'}}>{r.label}</div>
                  <div style={{fontWeight:900,fontSize:13,color:'var(--ink-soft)'}}>{r.acc}% · {r.attempts} tries</div>
                </div>
                <div className="pd-bar-bg">
                  <div className="pd-bar-fill" style={{width:r.acc+'%',
                    background:r.acc>=70?'var(--leaf)':'var(--sun)'}}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Manage subjects (§11.2): pause/resume — no lock icon, no shame framing */}
        <div className="pd-card">
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:6}}>🗺️ Manage Subjects</div>
          <div style={{fontSize:12,color:'var(--ink-quiet)',fontWeight:700,marginBottom:12,lineHeight:1.5}}>
            Hide a subject from the map for now — progress is kept, and you can bring it back any time.
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {SUBJECTS.filter(s=>!subjLocked(s,profile)).map(s=>{
              const paused = (profile.pausedSubjects||[]).includes(s.id);
              return (
                <div key={s.id} className="pd-toggle-row" style={{display:'flex',alignItems:'center',
                  justifyContent:'space-between',background:'var(--cream-50)',borderRadius:14,padding:'10px 16px'}}>
                  <div style={{fontWeight:800,fontSize:14,color:'var(--ink)'}}>{s.icon} {s.label}</div>
                  <button onClick={()=>dispatch({type:'PAUSE_SUBJECT',id:s.id,v:!paused})}
                    style={{border:'none',cursor:'pointer',padding:'6px 14px',borderRadius:999,
                      background:paused?'var(--leaf)':'var(--cream-200)',
                      color:paused?'#fff':'var(--ink-soft)',fontFamily:'Fredoka',fontWeight:700,fontSize:13}}>
                    {paused?'Show again':'Hide for now'}
                  </button>
                </div>
              );
            })}
          </div>
        </div>

        {/* Manage children (§12): rename inline, or delete with a gentle two-step
            confirmation — no sad imagery, Pip just waves goodbye warmly. */}
        <div className="pd-card" style={{gridColumn:'1/-1'}}>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:6}}>👨‍👩‍👧 Manage Children</div>
          <div style={{fontSize:12,color:'var(--ink-quiet)',fontWeight:700,marginBottom:12,lineHeight:1.5}}>
            Rename a child's profile, clear their progress to start fresh, or remove one from this device.
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {roster.map(p=>(
              <div key={p.id} data-profile-row={p.id} style={{background:'var(--cream-50)',borderRadius:16,padding:'12px 16px'}}>
                {resettingId===p.id ? (
                  <div style={{display:'flex',alignItems:'center',gap:14}}>
                    <Pip size={54} color={p.profile.avatarColor||'leaf'} mood="thinking"/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:800,fontSize:14,color:'var(--ink)'}}>
                        Start {p.profile.name||'this child'} fresh?
                      </div>
                      <div style={{fontSize:12,color:'var(--ink-quiet)',fontWeight:700,marginTop:2}}>
                        Clears stars, coins, and map progress. Their name and avatar stay. Can't be undone.
                      </div>
                    </div>
                    <button onClick={()=>setResettingId(null)} style={{border:'none',cursor:'pointer',
                      padding:'8px 16px',borderRadius:999,background:'var(--cream-200)',
                      color:'var(--ink-soft)',fontFamily:'Fredoka',fontWeight:700,fontSize:13}}>Never mind</button>
                    <button onClick={()=>{ dispatch({type:'RESET_PROGRESS',id:p.id}); setResettingId(null); }}
                      style={{border:'none',cursor:'pointer',padding:'8px 16px',borderRadius:999,
                        background:'var(--sun)',color:'#fff',fontFamily:'Fredoka',fontWeight:700,fontSize:13}}>
                      Yes, start fresh
                    </button>
                  </div>
                ) : deletingId===p.id ? (
                  <div style={{display:'flex',alignItems:'center',gap:14}}>
                    <Pip size={54} color={p.profile.avatarColor||'leaf'} mood="happy" wave/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:800,fontSize:14,color:'var(--ink)'}}>
                        Say goodbye to {p.profile.name||'this profile'}?
                      </div>
                      <div style={{fontSize:12,color:'var(--ink-quiet)',fontWeight:700,marginTop:2}}>
                        This removes their progress from this device for good. It can't be undone.
                      </div>
                    </div>
                    <button onClick={()=>setDeletingId(null)} style={{border:'none',cursor:'pointer',
                      padding:'8px 16px',borderRadius:999,background:'var(--cream-200)',
                      color:'var(--ink-soft)',fontFamily:'Fredoka',fontWeight:700,fontSize:13}}>Keep them</button>
                    <button onClick={()=>{ dispatch({type:'DELETE_PROFILE',id:p.id}); setDeletingId(null); }}
                      style={{border:'none',cursor:'pointer',padding:'8px 16px',borderRadius:999,
                        background:'var(--rose)',color:'#fff',fontFamily:'Fredoka',fontWeight:700,fontSize:13}}>
                      Yes, say goodbye
                    </button>
                  </div>
                ) : renamingId===p.id ? (
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <input value={renameDraft} maxLength={12} autoFocus
                      onChange={e=>setRenameDraft(sanitizeNameInput(e.target.value))}
                      onKeyDown={e=>e.key==='Enter'&&confirmRename()}
                      style={{flex:1,padding:'8px 14px',borderRadius:12,border:'2px solid var(--coral)',
                        fontFamily:'Fredoka',fontWeight:600,fontSize:15,outline:'none'}}/>
                    <button onClick={confirmRename} style={{border:'none',cursor:'pointer',
                      padding:'8px 16px',borderRadius:999,background:'var(--leaf)',color:'#fff',
                      fontFamily:'Fredoka',fontWeight:700,fontSize:13}}>Save</button>
                    <button onClick={()=>setRenamingId(null)} style={{border:'none',cursor:'pointer',
                      padding:'8px 16px',borderRadius:999,background:'var(--cream-200)',
                      color:'var(--ink-soft)',fontFamily:'Fredoka',fontWeight:700,fontSize:13}}>Cancel</button>
                  </div>
                ) : agingId===p.id ? (
                  /* §26: age is the only input tierOf() reads, so changing it
                     here is a real tier change — lets a parent correct an
                     age, or jump a child into Middle/Senior to see/verify
                     that content without deleting and re-onboarding a fresh
                     profile (the only other way to reach those tiers). */
                  <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                    <div style={{display:'flex',gap:6}}>
                      {[5,6,7,8,9,10,11,12].map(n=>(
                        <div key={n} onClick={()=>setAgeDraft(n)} style={{
                          width:34,height:34,borderRadius:'50%',cursor:'pointer',
                          background:n===ageDraft?'var(--coral)':'#fff',color:n===ageDraft?'#fff':'var(--ink)',
                          display:'flex',alignItems:'center',justifyContent:'center',
                          fontFamily:'Fredoka',fontWeight:700,fontSize:14,
                          boxShadow:n===ageDraft?'0 3px 0 var(--coral-dark)':'0 2px 0 var(--cream-200),inset 0 0 0 2px var(--cream-200)',
                        }}>{n}</div>
                      ))}
                    </div>
                    <div style={{fontSize:12,fontWeight:800,color:'var(--ink-quiet)'}}>
                      → {tierOf(ageDraft)==='junior'?'Junior':tierOf(ageDraft)==='middle'?'Middle':'Senior'} tier
                    </div>
                    <button onClick={confirmAging} style={{border:'none',cursor:'pointer',
                      padding:'8px 16px',borderRadius:999,background:'var(--leaf)',color:'#fff',
                      fontFamily:'Fredoka',fontWeight:700,fontSize:13}}>Save</button>
                    <button onClick={()=>setAgingId(null)} style={{border:'none',cursor:'pointer',
                      padding:'8px 16px',borderRadius:999,background:'var(--cream-200)',
                      color:'var(--ink-soft)',fontFamily:'Fredoka',fontWeight:700,fontSize:13}}>Cancel</button>
                  </div>
                ) : (
                  <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                    <Pip size={40} color={p.profile.avatarColor||'leaf'} feet={false}/>
                    <div style={{flex:1,fontWeight:800,fontSize:14,color:'var(--ink)'}}>
                      {p.profile.name||'Friend'} <span style={{fontWeight:700,color:'var(--ink-quiet)',fontSize:12}}>
                        · Age {p.profile.age||6} · {tierOf(p.profile.age)==='junior'?'Junior':tierOf(p.profile.age)==='middle'?'Middle':'Senior'} · ⭐ {p.profile.stars||0}</span>
                    </div>
                    <button onClick={()=>startAging(p)} style={{border:'none',cursor:'pointer',
                      padding:'6px 14px',borderRadius:999,background:'var(--cream-200)',
                      color:'var(--ink-soft)',fontFamily:'Fredoka',fontWeight:700,fontSize:13}}>Change age</button>
                    <button onClick={()=>startRename(p)} style={{border:'none',cursor:'pointer',
                      padding:'6px 14px',borderRadius:999,background:'var(--cream-200)',
                      color:'var(--ink-soft)',fontFamily:'Fredoka',fontWeight:700,fontSize:13}}>Rename</button>
                    <button onClick={()=>setResettingId(p.id)} style={{border:'none',cursor:'pointer',
                      padding:'6px 14px',borderRadius:999,background:'var(--cream-200)',
                      color:'var(--ink-soft)',fontFamily:'Fredoka',fontWeight:700,fontSize:13}}>Reset progress</button>
                    <button onClick={()=>setDeletingId(p.id)} style={{border:'none',cursor:'pointer',
                      padding:'6px 14px',borderRadius:999,background:'var(--cream-200)',
                      color:'var(--ink-soft)',fontFamily:'Fredoka',fontWeight:700,fontSize:13}}>Remove</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>

        {/* Classroom mode (§13.4 / P3_CLOUD_DESIGN.md §4.2), local-only slice:
            an aggregate export across every profile on this device — for a
            teacher-owned tablet with a small roster of students, not a
            single-child household. Only appears with 2+ profiles. Class-level
            patterns only, no per-child ranking (§4.2's anti-comparison rule,
            same posture as §14 elsewhere). Never leaves the device — no DPA
            needed, since §4.1's consent requirement only applies once data
            would leave the device boundary. */}
        {classroomStats && (
          <div className="pd-card" style={{gridColumn:'1/-1'}}>
            <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:6}}>🏫 Classroom Report</div>
            <div style={{fontSize:12,color:'var(--ink-quiet)',fontWeight:700,marginBottom:12,lineHeight:1.5}}>
              A class-level summary across all {classroomStats.childCount} children on this device — patterns only, never a ranking of individual kids. Stays on this device; nothing is uploaded anywhere.
            </div>
            <Btn color="ghost" onClick={printClassroom}>🖨️ Print Classroom Report</Btn>
          </div>
        )}

        {/* Gift coins (§11.2 / §14): parent-granted bonus; stars are never editable here */}
        <div className="pd-card">
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:6}}>🎁 Gift Coins</div>
          <div style={{fontSize:12,color:'var(--ink-quiet)',fontWeight:700,marginBottom:12,lineHeight:1.5}}>
            Grant bonus coins for a special occasion. Stars can't be edited — they're {profile.name||'your child'}'s learning record.
          </div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            {[10,25,50].map(amt=>(
              <Btn key={amt} color="sun" onClick={()=>dispatch({type:'GIFT_COINS',amount:amt})}>+{amt} 🪙</Btn>
            ))}
          </div>
        </div>

        {/* Milestone postcards (§13.4 P2): a printable keepsake for each fully
            completed world. Only ever shows worlds that are actually 100%
            done (§14 no-broken-promises) — never a nag, never time-limited. */}
        {subjectProgress.some(s=>s.pct===100) && (
          <div className="pd-card" style={{gridColumn:'1/-1'}}>
            <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:6}}>🎉 Milestone Postcards</div>
            <div style={{fontSize:12,color:'var(--ink-quiet)',fontWeight:700,marginBottom:12,lineHeight:1.5}}>
              A printable keepsake for each world {profile.name||'your child'} has finished.
            </div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              {subjectProgress.filter(s=>s.pct===100).map(s=>(
                <Btn key={s.id} color="ghost" onClick={()=>printPostcard(s)}>🖨️ {s.label} World</Btn>
              ))}
            </div>
          </div>
        )}

        {/* Data & backup */}
        <div className="pd-card" style={{gridColumn:'1/-1'}}>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:6}}>💾 Data & Backup</div>
          <div style={{fontSize:13,color:'var(--ink-quiet)',fontWeight:700,marginBottom:14,lineHeight:1.5}}>
            Progress lives only on this device. Download a backup to move it to a new tablet or keep it safe.
          </div>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            <Btn color="sky" onClick={exportSave}>⬇ Download Backup</Btn>
            <Btn color="ghost" onClick={()=>fileRef.current&&fileRef.current.click()}>⬆ Restore Backup</Btn>
            <Btn color="ghost" onClick={()=>window.print()}>🖨️ Print Report</Btn>
            <input ref={fileRef} type="file" accept=".json,application/json" onChange={importSave} style={{display:'none'}}/>
          </div>
        </div>

        {/* Parent feedback prompt (§13.4 P2): occasional, one-tap, parent-area
            only, never shown to children, never repeats once answered. */}
        {!settings.feedbackGiven && (
          <div className="pd-card" style={{gridColumn:'1/-1'}}>
            <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:10}}>
              💬 How's Bopplebee working for your family?
            </div>
            <div style={{display:'flex',gap:14}}>
              {[['😕','not_great'],['🙂','okay'],['😄','great']].map(([e,val])=>(
                <button key={val} onClick={()=>dispatch({type:'PARENT_FEEDBACK',v:val})}
                  style={{border:'none',cursor:'pointer',background:'var(--cream-50)',
                    borderRadius:16,padding:'14px 22px',fontSize:32,
                    boxShadow:'0 3px 0 rgba(61,40,24,.08)'}}>{e}</button>
              ))}
            </div>
          </div>
        )}

        {/* Plain-language privacy summary (§11.2) */}
        <div className="pd-card" style={{gridColumn:'1/-1'}}>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:6}}>🔒 Privacy at a glance</div>
          <div style={{fontSize:13,color:'var(--ink-quiet)',fontWeight:700,lineHeight:1.6}}>
            <b>What we store (on this device only):</b> your child's first name, age band,
            avatar choices, gameplay progress, and settings.<br/>
            <b>What we never collect:</b> exact birthdate, email or phone, photos, location,
            contacts, voice recordings, or free-text beyond the name field.<br/>
            No accounts, no ads, no chat, no third-party trackers — nothing leaves this device.
          </div>
        </div>
      </div>

      {/* Print-friendly progress report (§17.4 P2): screen-hidden, shown only
          via @media print — window.print() above triggers the browser dialog.
          Suppressed while a postcard or the classroom report is queued below
          so print-only blocks never both go to visibility:visible at once. */}
      {!postcardWorld && !showClassroom && <div className="print-report">
        <h1>{profile.name||'Your child'}'s Progress Report</h1>
        <div className="print-meta">Generated {todayStr()}</div>
        <h2>Playtime — last 7 days</h2>
        <table><tbody><tr>
          {days.map((d,i)=><td key={i}>{d}<br/><b>{playMins[i]?playMins[i]+'m':'–'}</b></td>)}
        </tr></tbody></table>
        <h2>Stars & Progress</h2>
        <table><tbody>
          <tr><td>Total stars</td><td><b>{profile.stars} ⭐</b></td></tr>
          <tr><td>Current streak</td><td><b>{profile.streak} days</b></td></tr>
          {subjectProgress.map(s=>(
            <tr key={s.id}><td>{s.label}</td><td><b>{s.pct}% complete</b></td></tr>
          ))}
        </tbody></table>
        <h2>Per-skill accuracy</h2>
        <table><tbody>
          {skillRows.length ? skillRows.map(r=>(
            <tr key={r.id}><td>{r.label}</td><td><b>{r.acc}%</b> ({r.attempts} tries)</td></tr>
          )) : <tr><td colSpan={2}>No skill data yet — play a stage to start tracking.</td></tr>}
        </tbody></table>
        <h2>Suggested focus</h2>
        <div>{weakSkill
          ? `Practice next: ${weakSkill.label} (currently ${weakSkill.acc}% accuracy)`
          : 'All practiced skills look strong — no specific focus needed right now.'}</div>
        {weakSkill && REALWORLD_TIPS[weakSkill.id] && (
          <div style={{marginTop:6}}>Away from the screen: {REALWORLD_TIPS[weakSkill.id]}</div>
        )}
      </div>}

      {/* Milestone postcard (§13.4 P2): screen-hidden, shown only via @media
          print when a parent picks a completed world below. Same mechanism
          as the progress report above — a dedicated print-only block. */}
      {postcardWorld && (
        <div className="print-report postcard">
          <div className="postcard-pip">
            <Pip size={150} color={profile.avatarColor||'leaf'} mood="proud" arms/>
            {shopIcon(profile.avatarAccessory) && (
              <span className="postcard-acc">{shopIcon(profile.avatarAccessory)}</span>
            )}
          </div>
          <h1>{profile.name||'Your child'} finished {postcardWorld.label} World! 🎉</h1>
          <div className="print-meta">{todayStr()}</div>
          <div className="postcard-msg">
            "I did it! Thanks for playing with me." — Pip
          </div>
        </div>
      )}

      {/* Classroom report (§13.4 / P3_CLOUD_DESIGN.md §4.2): aggregate-only,
          multi-child print block. No per-child rows, no ranking — class-level
          subject completion + class-wide skill accuracy only. */}
      {showClassroom && classroomStats && (
        <div className="print-report">
          <h1>Classroom Report</h1>
          <div className="print-meta">Generated {todayStr()} · {classroomStats.childCount} children on this device</div>
          <h2>Class progress by subject</h2>
          <table><tbody>
            {Object.values(classroomStats.perSubject).map(s=>(
              <tr key={s.label}><td>{s.label}</td><td><b>{s.avgPct}% average completion</b></td></tr>
            ))}
          </tbody></table>
          <h2>Class summary</h2>
          <table><tbody>
            <tr><td>Total stars earned (all children)</td><td><b>{classroomStats.totalStars} ⭐</b></td></tr>
            <tr><td>Average streak</td><td><b>{classroomStats.avgStreak} days</b></td></tr>
          </tbody></table>
          <h2>Class-wide skill accuracy</h2>
          <table><tbody>
            {classroomStats.classSkillRows.length ? classroomStats.classSkillRows.map(r=>(
              <tr key={r.id}><td>{r.label}</td><td><b>{r.acc}%</b> ({r.attempts} class attempts)</td></tr>
            )) : <tr><td colSpan={2}>Not enough class-wide play data yet.</td></tr>}
          </tbody></table>
          {classroomStats.classSkillRows[0] && (
            <>
              <h2>Suggested class focus</h2>
              <div>The whole class could use more practice with: {classroomStats.classSkillRows[0].label} ({classroomStats.classSkillRows[0].acc}% class accuracy)</div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   ONBOARDING: WELCOME
═══════════════════════════════════════════════════════ */
function WelcomeScreen({ dispatch, profile }) {
  const [name, setName] = useState(profile.name||'');
  const [age, setAge]   = useState(profile.age||6);
  const go = () => {
    if (!name.trim()) return;
    dispatch({type:'SET_NAME',v:finalizeName(name)});
    dispatch({type:'SET_AGE',v:age});
    dispatch({type:'OB_NEXT'});
    dispatch({type:'NAV',screen:'avatar'});
  };
  return (
    <div className="screen">
      <div style={{position:'absolute',inset:0,
        background:'linear-gradient(180deg,#FFE9B8 0%,#FDE3BE 40%,#C8E6A4 100%)'}}/>
      <Sun size={100} style={{position:'absolute',top:50,right:60}}/>
      <div className="cloud" style={{width:60,height:60,top:100,left:110,position:'absolute'}}/>

      {/* step dots */}
      <div style={{position:'absolute',top:38,left:'50%',transform:'translateX(-50%)',display:'flex',gap:8}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{width:i===0?36:12,height:12,borderRadius:999,
            background:i===0?'var(--coral)':'rgba(61,40,24,.18)',transition:'all .2s'}}/>
        ))}
      </div>

      <div style={{position:'absolute',left:70,bottom:40}}>
        <div className="pip-bob"><Pip size={310} color="leaf" wave mood="happy"/></div>
      </div>

      <div className="sticker tilt-r" style={{position:'absolute',right:60,top:100,width:450,padding:36,background:'#fff'}}>
        <div style={{fontSize:12,fontWeight:800,color:'var(--ink-quiet)',textTransform:'uppercase',letterSpacing:'.12em'}}>
          Welcome, friend! 👋
        </div>
        <div className="display" style={{fontSize:40,color:'var(--ink)',marginTop:8,lineHeight:1.05}}>
          Hi! I'm Pip.<br/>What's your name?
        </div>
        <input value={name} onChange={e=>setName(sanitizeNameInput(e.target.value))} onKeyDown={e=>e.key==='Enter'&&go()}
          maxLength={12} placeholder="Type your name…"
          style={{width:'100%',marginTop:24,padding:'18px 24px',borderRadius:22,
            border:name?'3px solid var(--coral)':'3px solid var(--cream-200)',
            background:'var(--cream-50)',fontFamily:'Fredoka',fontWeight:600,fontSize:30,
            color:'var(--ink)',outline:'none',transition:'border-color .2s'}}/>
        <div style={{marginTop:20,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:15,color:'var(--ink-soft)',fontWeight:700}}>How old are you?</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end',maxWidth:280}}>
            {/* §26.1: age range extended 5-7 → 5-12 (decision O8) — tier is a
                pure function of age, auto-selected below, no separate picker. */}
            {[5,6,7,8,9,10,11,12].map(n=>(
              <div key={n} onClick={()=>setAge(n)} style={{
                width:40,height:40,borderRadius:'50%',cursor:'pointer',
                background:n===age?'var(--coral)':'#fff',color:n===age?'#fff':'var(--ink)',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontFamily:'Fredoka',fontWeight:700,fontSize:17,
                boxShadow:n===age?'0 4px 0 var(--coral-dark)':'0 2px 0 var(--cream-200),inset 0 0 0 2px var(--cream-200)',
                transition:'all .15s',
              }}>{n}</div>
            ))}
          </div>
        </div>
        {/* §26.1 tier auto-select feedback, matches screens-i.jsx AgeTierSelectScreen */}
        {age >= 8 && (
          <div style={{marginTop:14,padding:'10px 16px',borderRadius:16,
            background:tierOf(age)==='senior'?'rgba(108,123,255,.12)':'rgba(94,183,232,.12)',
            fontSize:14,fontWeight:700,color:'var(--ink-soft)'}}>
            {tierOf(age)==='senior'
              ? "You're old enough for the Senior experience — XP, streaks, quizzes & achievements! ⚡"
              : "You'll get the Middle experience — a goal dashboard with richer subjects! 🚀"}
          </div>
        )}
        <div style={{display:'flex',justifyContent:'flex-end',marginTop:28}}>
          <Btn color="coral" size="big" onClick={go} disabled={!name.trim()}>Hi, Pip! →</Btn>
        </div>
      </div>
    </div>
  );
}

   ONBOARDING: AVATAR

const COLORS = ['leaf','berry','sky','coral','sun'];
const ACCS = [
  {id:'none',label:'None',e:''},
  {id:'hat',label:'Sun Hat',e:'👒',locked:false},
  {id:'glasses',label:'Glasses',e:'🕶️',locked:false},
  {id:'bow',label:'Bow',e:'🎀',locked:false},
  {id:'crown',label:'Crown',e:'👑',locked:true},
  {id:'cape',label:'Cape',e:'🦸',locked:true},
  {id:'wand',label:'Wand',e:'🪄',locked:true},
  {id:'pet',label:'Pet',e:'🐶',locked:true},
];

function AvatarScreen({ dispatch, profile }) {
  const [color, setColor] = useState(profile.avatarColor||'leaf');
  const [acc, setAcc]     = useState(profile.avatarAccessory||'none');

  const go = () => {
    dispatch({type:'SET_COLOR',v:color});
    dispatch({type:'SET_ACC',v:acc});
    dispatch({type:'OB_NEXT'});
    dispatch({type:'NAV',screen:'plan'});
  };
  const accE = ACCS.find(a=>a.id===acc)?.e||'';

  return (
    <div className="screen">
      <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,#FFF7E8 0%,#FDE3BE 100%)'}}/>
      <Sun size={90} style={{position:'absolute',top:40,right:70}}/>

   like "going somewhere", ported from the screens-e design reference. */

    <>
      <Sun size={110} style={{position:'absolute',top:44,right:90}}/>
      <div className="cloud" style={{width:60,height:60,top:70,left:110,position:'absolute'}}/>
      {[[60,420,1.0],[170,480,0.75],[860,400,1.0],[760,500,0.85]].map(([x,y,sc],i)=>(
        <div key={i} style={{position:'absolute',left:x,top:y,transform:`scale(${sc})`,pointerEvents:'none'}}>
          <div style={{position:'absolute',bottom:0,left:30,width:22,height:64,background:'#8A5A36',borderRadius:6}}/>
          <div style={{position:'absolute',bottom:46,left:0,width:76,height:76,borderRadius:'50%',
            background:'var(--leaf)',boxShadow:'inset -7px -7px 0 var(--leaf-dark)'}}/>

          <div style={{position:'absolute',bottom:84,left:40,width:14,height:14,borderRadius:'50%',background:'var(--coral)'}}/>
        </div>
      ))}
    </>
  );
  if (subject==='words') return (           // Words · Forest — tall conifers, floating letters
    <>
      {[[30,320,1.3],[130,360,0.95],[220,340,1.1],[800,360,1.05],[890,330,1.35],[960,370,0.85]].map(([x,y,sc],i)=>(
        <div key={i} style={{position:'absolute',left:x,top:y,transform:`scale(${sc})`,opacity:.88,pointerEvents:'none'}}>
          <div style={{position:'absolute',bottom:0,left:24,width:16,height:54,background:'#5A3F22',borderRadius:4}}/>
          <div style={{position:'absolute',bottom:46,left:0,width:0,height:0,
            borderLeft:'32px solid transparent',borderRight:'32px solid transparent',
            borderBottom:'108px solid var(--leaf-dark)'}}/>
        </div>
      ))}
      {[['B',210,150,-6],['Cc',640,120,6],['L',880,190,-4]].map(([ch,x,y,rot],i)=>(
        <div key={i} style={{position:'absolute',left:x,top:y,background:'#fff',padding:'8px 16px',
          borderRadius:14,fontFamily:'Fredoka',fontWeight:700,fontSize:24,color:'var(--sky-dark)',
          boxShadow:'0 4px 0 var(--cream-200)',transform:`rotate(${rot}deg)`,pointerEvents:'none'}}>{ch}</div>
      ))}
    </>
  );
  if (subject==='science') return (         // Science · Discovery — floating lab/nature props
    <>
      <div style={{position:'absolute',top:80,left:70,fontSize:52,transform:'rotate(-10deg)',pointerEvents:'none'}}>🧪</div>
      <div style={{position:'absolute',top:130,right:100,fontSize:44,transform:'rotate(15deg)',pointerEvents:'none'}}>🔭</div>
      <div style={{position:'absolute',bottom:230,right:70,fontSize:48,transform:'rotate(-8deg)',pointerEvents:'none'}}>🌱</div>
      <div style={{position:'absolute',bottom:160,left:50,fontSize:44,transform:'rotate(12deg)',pointerEvents:'none'}}>🌍</div>

}

function MapScreen({ dispatch, profile, progress, subject, dailyBonus, skills }) {
  const subj = SUBJECTS.find(s=>s.id===subject);
  const nodes = getNodes(progress, subject);
  const curIdx = nodes.findIndex(n=>n.status==='current');
  const suggested = suggestSubject(skills, profile, subject);   // §9.3 map surface

  /* Daily hello bonus — reducer guards one-per-calendar-date */
  useEffect(()=>{ dispatch({type:'DAILY_BONUS'}); },[]);
  useEffect(()=>{
    if(!dailyBonus) return;
    SFX('coin'); HAPTIC(15);
    speak(`Good to see you, ${profile.name||'friend'}! Here are ten coins!`);
    const t = setTimeout(()=>dispatch({type:'DISMISS_BONUS'}), 4500);
    return ()=>clearTimeout(t);
  },[dailyBonus]);
  /* Offline indicator (§4 P2) — local-only app, so being offline changes nothing */
  const [offline, setOffline] = useState(typeof navigator!=='undefined' && !navigator.onLine);
  useEffect(()=>{
    const on = ()=>setOffline(false), off = ()=>setOffline(true);
    window.addEventListener('online',on); window.addEventListener('offline',off);
    return ()=>{ window.removeEventListener('online',on); window.removeEventListener('offline',off); };
  },[]);
  /* §4 P2 per-world art direction: distinct mood per subject rather than one
     palette swap — golden-hour Orchard, cool Forest, airy Discovery, dark Stage. */
  const bgMap = {
    math:    'linear-gradient(180deg,#FFE08A 0%,#FFCE7A 35%,#FFB45C 65%,#FF9A4A 100%)',
    words:   'linear-gradient(180deg,#BCE3F2 0%,#A8D8B0 55%,#6FAD7F 100%)',
    science: 'linear-gradient(180deg,#C8DDF5 0%,#E8F0FB 50%,#F8DEB8 100%)',
    music:   'radial-gradient(ellipse at 50% 30%,#6B4794 0%,#3E2A5C 100%)',
  };
  const pathColor = { math:'#E2A41B', words:'#3D9E50', science:'#3D9E50', music:'#B587E0' }[subject] || '#E2A41B';
  return (
    <div className="screen">
      <div style={{position:'absolute',inset:0,background:bgMap[subject]||bgMap.math}}/>
      <WorldDecor subject={subject}/>
      {subject==='music'&&['♪','♫','♩','♬'].map((n,i)=>(
        <div key={i} style={{position:'absolute',left:[110,240,760,900][i],top:[190,120,170,230][i],
          color:'#FFD25E',fontSize:40,opacity:.8,transform:`rotate(${i%2?-10:12}deg)`,pointerEvents:'none'}}>{n}</div>
      ))}
      {subject!=='music'&&(
        <div className="hill" style={{width:320,height:200,bottom:-60,left:-40,position:'absolute'}}/>
      )}
      {subject!=='music'&&(
        <div className="hill" style={{width:380,height:220,bottom:-80,right:-80,opacity:.4,position:'absolute'}}/>
      )}

      {/* SVG winding path — color matches the world's art direction */}
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}
           viewBox="0 0 1024 720" preserveAspectRatio="none">
        {NODE_PATH.map(([x,y],i)=>{
          if (!i) return null;
          const [px,py]=NODE_PATH[i-1];
          return (
            <g key={i}>
              <line x1={px*10.24} y1={py*7.2} x2={x*10.24} y2={y*7.2}
                stroke={subject==='music'?'rgba(255,255,255,.18)':'#FFF7E8'} strokeWidth="40" strokeLinecap="round"/>
              <line x1={px*10.24} y1={py*7.2} x2={x*10.24} y2={y*7.2}
                stroke={pathColor} strokeOpacity="0.55" strokeWidth="7" strokeLinecap="round"
                strokeDasharray="18 14"/>
            </g>
          );
        })}
      </svg>

      {/* Level nodes */}
      {nodes.map((node,i)=>{
        const [xp,yp]=NODE_PATH[i]||[50,50];
        const isCur=node.status==='current';
        return (
          <div key={i} className={`node ${node.status}`}
            style={{left:`${xp}%`,top:`${yp}%`,
              cursor:(isCur||node.status==='done')?'pointer':'default'}}
            onClick={()=>{
              if(isCur) dispatch({type:'NAV',screen:'intro'});
              else if(node.status==='done') dispatch({type:'REPLAY_STAGE',subject,stageIndex:i});
            }}>
            {node.status==='current'&&(
              <div style={{position:'absolute',top:-54,left:'50%',transform:'translateX(-50%)'}}>
                <div className="pip-bob">
                  <Pip size={42} color={profile.avatarColor||'leaf'} mood="happy" feet={false}/>

            {node.status==='done'&&node.stars>0&&(
              <div style={{position:'absolute',bottom:-24,left:'50%',transform:'translateX(-50%)',display:'flex',gap:2}}>
                {Array.from({length:3},(_,si)=>(
                  <span key={si} className={si<node.stars?'star':'star empty'} style={{width:14,height:14}}/>
                ))}
              </div>
            )}
            {node.status!=='done'&&<span className="num">{i+1}</span>}
          </div>
        );
      })}

      {/* Top bar */}
      <div style={{position:'absolute',top:18,left:0,right:0,padding:'0 24px',
        display:'flex',justifyContent:'space-between',alignItems:'center',zIndex:5}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:56,height:56,borderRadius:'50%',
            background:`var(--${profile.avatarColor||'leaf'})`,
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:`0 4px 0 var(--${profile.avatarColor||'leaf'}-dark)`,position:'relative'}}>
            <Pip size={40} color={profile.avatarColor||'leaf'} feet={false}/>
            {shopIcon(profile.avatarAccessory)&&<span style={{position:'absolute',top:-12,
              left:'50%',transform:'translateX(-50%) rotate(-8deg)',fontSize:22}}>
              {shopIcon(profile.avatarAccessory)}</span>}
          </div>
          <div>
            <div className="display" style={{fontSize:20,color:subject==='music'?'#fff':'var(--ink)'}}>{profile.name||'Friend'}</div>
            <div className="calm-hide" style={{fontSize:12,color:subject==='music'?'rgba(255,255,255,.7)':'var(--ink-quiet)',fontWeight:700}}>
              ⭐ {profile.stars} stars

          </div>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <span className="calm-hide"><Chip icon="coin" value={profile.coins}/></span>
          <IconBtn onClick={()=>dispatch({type:'NAV',screen:'shop'})}>🛍️</IconBtn>
          <IconBtn onClick={()=>dispatch({type:'NAV',screen:'settings'})}>⚙️</IconBtn>
        </div>
      </div>

      {offline&&(
        <div style={{position:'absolute',top:84,left:'50%',transform:'translateX(-50%)',zIndex:6,
          padding:'7px 18px',borderRadius:999,background:'rgba(255,255,255,.94)',
          fontFamily:'Fredoka',fontWeight:600,fontSize:14,color:'var(--ink-soft)',
          boxShadow:'0 3px 0 rgba(61,40,24,.10)'}}>
          📡 You're offline — all good, keep playing!
        </div>
      )}

      {/* World label */}
      <div style={{position:'absolute',bottom:76,left:24}}>
        <div className="sticker" style={{padding:'10px 20px',background:'rgba(255,255,255,.92)',
          display:'inline-flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:22}}>{subj?.icon}</span>
          <div>
            <div className="display" style={{fontSize:18,color:'var(--ink)'}}>{subj?.label} World</div>

              Stage {Math.max(1,curIdx+1)} of {NODE_COUNT}

          </div>
        </div>
      </div>

      {/* Subject switcher tabs */}
      <div style={{position:'absolute',bottom:0,left:0,right:0,
        display:'flex',justifyContent:'center',gap:10,padding:'12px 24px',
        background:'linear-gradient(180deg,transparent,rgba(255,255,255,.8))'}}>
        {SUBJECTS.filter(s=>!(profile.pausedSubjects||[]).includes(s.id)).map(s=>{
          const locked = subjLocked(s, profile);

          <div className="display" style={{fontSize:34,color:'var(--ink)',marginTop:8}}>

          </div>

            color:'#fff',borderRadius:999,padding:'4px 14px',fontSize:13,fontWeight:800}}>
            {typeLabels[cfg.type]||cfg.type}
          </div>
          <div style={{marginTop:20,display:'flex',flexDirection:'column',gap:14}}>
            {[['⭐','Up to 3 stars'],['❓','5 questions'],['⏱','~4 minutes']].map(([ic,lb])=>(
              <div key={lb} style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:22}}>{ic}</span>
                <span style={{fontWeight:700,color:'var(--ink-soft)',fontSize:15}}>{lb}</span>
              </div>
            ))}

              Start ▶
            </Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

  const fruitColor = crossed => crossed ? '#aaa' : ((scene||SCENES[0]).fruit);
  const stemColor = (scene||SCENES[0]).stem;
  return (
    <div style={{position:'relative',width:440,height:380}}>

        width:340,height:270,background:'var(--leaf)',borderRadius:'50%',

/* Compare */
function CompareView({ q, feedback, onAnswer }) {
  const zone = (which, count, positions) => {
    let cls='compare-zone';
    if(feedback){ cls+=q.correct===which?' correct':' wrong'; }
    return (
      <div className={cls} onClick={()=>!feedback&&onAnswer(which)}
        style={{background:'rgba(255,255,255,.72)'}}>
        <MiniTree count={count} positions={positions} scene={q.scene}/>
        <div className="display" style={{fontSize:24,color:'var(--ink)',marginTop:8}}>
          {count} {count===1?(q.scene||SCENES[0]).noun:(q.scene||SCENES[0]).plural}
        </div>
        <div style={{fontSize:13,fontWeight:800,color:'var(--ink-quiet)',marginTop:4}}>
          {which==='left'?'Left tree':'Right tree'}

  return (
    <div style={{display:'flex',width:'100%',height:'100%',alignItems:'center',gap:20,padding:'0 20px'}}>

      <div className="display" style={{fontSize:40,color:'var(--ink)',flexShrink:0}}>VS</div>
      {zone('right',q.right,q.posR)}

  ],

    { cat:'cold', icon:'❄️', label:'Cold', bg:'#EEF4FF', border:'#5EB7E8' },
  ],

function ScienceSortView({ q, feedback, onAnswer }) {
  const zones = SORT_ZONE_CONFIGS[q.type] || SORT_ZONE_CONFIGS.living;
  /* §4 P2: the item can also be dragged onto a zone; tapping zones still works */
  const dnd = useDragTile((tileId, dropId) => { if (!feedback) onAnswer(dropId); });
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:20,width:'100%'}}>
      <div style={{textAlign:'center'}} {...dnd.tileProps('item')}>
        <div style={{fontSize:96,lineHeight:1,filter:'drop-shadow(0 6px 12px rgba(0,0,0,.18))',
          cursor:'grab',touchAction:'none',
          opacity:dnd.drag&&dnd.drag.moved?0.3:1}}>{q.emoji}</div>
        <div className="display" style={{fontSize:32,color:'var(--ink)',marginTop:8}}>{q.label}</div>
      </div>
      {dnd.drag&&dnd.drag.moved&&(
        <div style={{position:'fixed',left:dnd.drag.x-40,top:dnd.drag.y-48,fontSize:80,zIndex:99,
          pointerEvents:'none',filter:'drop-shadow(0 6px 12px rgba(0,0,0,.25))'}}>{q.emoji}</div>
      )}
      <div style={{display:'flex',gap:20,width:'100%',maxWidth:580}}>
        {zones.map((z,i)=>{
          let base='sort-zone';
          let extraStyle={background:z.bg,border:`3px solid ${z.border}`,borderRadius:28,
            cursor:'pointer',flex:1,minHeight:140,display:'flex',flexDirection:'column',
            alignItems:'center',justifyContent:'center',gap:8,transition:'transform .12s'};
          if(feedback){
            if(z.cat===q.correct){extraStyle={...extraStyle,background:'#E8F6E8',border:'4px solid var(--leaf)',transform:'scale(1.04)'};}
            else if(z.cat===feedback.chosen){extraStyle={...extraStyle,background:'#FFE8E8',border:'4px solid var(--coral)'};}
          }
          return (
            <div key={i} style={{...extraStyle,position:'relative'}} data-drop={z.cat} onClick={()=>!feedback&&onAnswer(z.cat)}>
              {/* §10.1: correct/wrong never rely on color alone (deuteranopia/protanopia) */}
              {feedback&&z.cat===q.correct&&<span aria-hidden="true" style={{position:'absolute',top:8,right:10,fontSize:22}}>✓</span>}
              {feedback&&z.cat===feedback.chosen&&z.cat!==q.correct&&<span aria-hidden="true" style={{position:'absolute',top:8,right:10,fontSize:22}}>✗</span>}
              <div style={{fontSize:52}}>{z.icon}</div>
              <div className="display" style={{fontSize:26,color:'var(--ink)',textAlign:'center'}}>{z.label}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* Small "coach" Pip used throughout the Senior tier (screens-h.jsx SPip) */
function SPip({ size = 44, color = 'sky' }) {
  return <Pip size={size} color={color} mood="happy"/>;
}

/* Senior circular progress ring (screens-h.jsx SRing) */
function SRing({ value = 0.7, size = 120, stroke = 12, label, sub }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={stroke} />
        <defs>
          <linearGradient id={'sr' + size} x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#2ED3C6" />
            <stop offset="100%" stopColor="#6C7BFF" />
          </linearGradient>
        </defs>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={`url(#sr${size})`} strokeWidth={stroke}
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - value)} />
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center', gap:2 }}>
        <div className="s-display" style={{ fontSize: size*0.26, color:'var(--s-text)' }}>{label}</div>
        {sub && <div style={{ fontSize:12, fontWeight:800, color:'var(--s-text-quiet)', textTransform:'uppercase', letterSpacing:'.08em' }}>{sub}</div>}
      </div>
    </div>
  );
}

/* Per-subject accuracy, used by both tier home dashboards (reuses skills §9.1) */
function subjectPct(skills, subject) {
  const ids = Object.keys(skills||{}).filter(k=>k.startsWith(subject+'.'));
  if (!ids.length) return 0;
  const { attempts, correct } = ids.reduce((a,id)=>({
    attempts: a.attempts + skills[id].attempts, correct: a.correct + skills[id].correct }), {attempts:0,correct:0});
  return attempts ? correct/attempts : 0;
}

/* §26.6 achievements (O9, screens-h.jsx SeniorAchievementsScreen) — every
   badge is computed from real, persistent profile/skills state (never mock
   data, never derived from the event log — see blankProfile's comment on
   why). `pct` (0-1) drives the in-progress bar for a badge not yet earned;
   omitted once done. */
function computeBadges(profile, skills) {
  const level = levelFromXp(profile.xp);
  const mathPct = subjectPct(skills, 'math');
  const subjectsPlayed = (profile.tierSubjectsPlayed||[]).length;
  const questionsAnswered = profile.tierQuestionsAnswered || 0;
  return [
    { id:'onfire',    icon:'🔥', name:'On Fire',        sub:'10-day streak',      accent:'var(--s-amber)',
      done: (profile.streak||0) >= 10, pct: Math.min(1, (profile.streak||0)/10) },
    { id:'speedster', icon:'⚡', name:'Speedster',       sub:'A brisk-paced set',  accent:'var(--s-teal)',
      done: !!profile.tierHadFastSet, pct: profile.tierHadFastSet ? 1 : 0 },
    { id:'sharp',     icon:'🎯', name:'Sharpshooter',    sub:'100% on a set',      accent:'var(--s-indigo)',
      done: (profile.tierPerfectSets||0) >= 1, pct: Math.min(1, (profile.tierPerfectSets||0)/1) },
    { id:'mathmaster',icon:'📐', name:'Math Master',     sub:'80% Numbers mastery',accent:'var(--s-violet)',
      done: mathPct >= 0.8, pct: Math.min(1, mathPct/0.8) },
    { id:'deepthink', icon:'🧠', name:'Deep Thinker',    sub:'500 questions',      accent:'var(--s-lime)',
      done: questionsAnswered >= 500, pct: Math.min(1, questionsAnswered/500) },
    { id:'explorer',  icon:'🌍', name:'Explorer',        sub:'Try all subjects',   accent:'var(--s-coral)',
      done: subjectsPlayed >= 4, pct: Math.min(1, subjectsPlayed/4) },
    { id:'champion',  icon:'🏆', name:'Champion',        sub:'Reach level 10',     accent:'var(--s-amber)',
      done: level >= 10, pct: Math.min(1, level/10) },
    { id:'perfect',   icon:'💎', name:'Perfectionist',   sub:'5 perfect sets',     accent:'var(--s-teal)',
      done: (profile.tierPerfectSets||0) >= 5, pct: Math.min(1, (profile.tierPerfectSets||0)/5) },
  ];
}

/* ── Subject → stage picker for Middle/Senior (reuses SUBJECTS + TIER_STAGE_CONFIGS) ── */
/* §26.6b Item C (2026-07-22 playtest finding): Middle's stage picker was
   functionally complete but visually thin — large empty cards with just a
   title and one instruction line, no icon, no per-stage progress, no sense
   of sequence. Four additions below, all reusing existing components
   (ProgressBar, subject icons, the sticker/chip system already established
   by MiddleHomeScreen) — the onClick dispatch is untouched, so navigation
   and what's reachable is identical to before this change. Senior's card
   grid already had enough visual weight (icon+%, s-track) and is left as-is. */
function TierSubjectStagesScreen({ dispatch, profile, subject, skills }) {
  const tier = tierOf(profile.age);
  const stages = TIER_STAGE_CONFIGS[tier][subject] || [];
  const subj = SUBJECTS.find(s=>s.id===subject);
  const senior = tier === 'senior';
  const subjLabel = subj ? tierSubjectLabel(tier, subj.id, subj.label) : '';
  // Middle only: per-stage mastery (skills[cfg.skill], single skill — not
  // subjectPct's whole-subject aggregate, since each stage has its own skill
  // id) and "up next" = the first stage with zero attempts recorded yet.
  const stagePct = cfg => {
    const rec = skills && skills[cfg.skill];
    return rec && rec.attempts ? rec.correct / rec.attempts : 0;
  };
  const upNextIdx = !senior ? stages.findIndex(cfg => !(skills && skills[cfg.skill] && skills[cfg.skill].attempts)) : -1;
  return (
    <div className={senior ? 'screen senior' : 'screen'}>
      {senior ? <div className="s-backdrop"/> : <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,#FFF7E8,#EFEAF6)'}}/>}
      <div style={{position:'absolute',inset:0,padding:'26px 40px',display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          {senior
            ? <button className="s-icon" onClick={()=>dispatch({type:'NAV',screen:'tierHome'})}>←</button>
            : <IconBtn onClick={()=>dispatch({type:'NAV',screen:'tierHome'})}>←</IconBtn>}
          <div className={senior?'s-display':'display'} style={{fontSize:senior?30:28,color:senior?undefined:'var(--ink)'}}>
            {subj?.icon} {subjLabel}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginTop:24,flex:1,minHeight:0,overflow:'auto'}}>
          {stages.map((cfg,i)=>{
            const pct = !senior ? stagePct(cfg) : 0;
            const isUpNext = !senior && i === upNextIdx;
            return (
            <div key={i} onClick={()=>dispatch({type:'TIER_START',subject,stageIndex:i})}
              className={senior?'s-card':'sticker'}
              style={{padding:20,cursor:'pointer',display:'flex',flexDirection:'column',gap:8,
                position:'relative',
                ...(senior?{}:{background:'#fff',
                  border: isUpNext ? `3px solid ${subj?.color||'var(--coral)'}` : '3px solid transparent',
                  boxShadow: isUpNext ? `0 6px 0 ${subj?.dark||'var(--coral-dark)'}, 0 14px 26px -10px rgba(61,40,24,.22)` : undefined})}}>
              {!senior && (
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{width:40,height:40,borderRadius:12,background:subj?.color||'var(--coral)',
                    display:'flex',alignItems:'center',justifyContent:'center',fontSize:19}}>{subj?.icon}</div>
                  <div style={{fontSize:11,fontWeight:800,color:'var(--ink-quiet)',
                    background:'var(--cream-100)',borderRadius:999,padding:'3px 10px'}}>{i+1} of {stages.length}</div>
                </div>
              )}
              <div className={senior?'s-display':'display'} style={{fontSize:senior?18:20,color:senior?undefined:'var(--ink)'}}>{cfg.label}</div>
              <div style={{fontSize:13,fontWeight:700,color:senior?'var(--s-text-soft)':'var(--ink-soft)'}}>{cfg.instruction}</div>
              {!senior && (
                <div style={{marginTop:'auto',display:'flex',flexDirection:'column',gap:4}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:800,color:'var(--ink-quiet)'}}>
                    <span>{Math.round(pct*100)}% mastery</span>
                    {isUpNext && <span style={{color:subj?.dark||'var(--coral-dark)'}}>Up next</span>}
                  </div>
                  <ProgressBar value={pct}/>
