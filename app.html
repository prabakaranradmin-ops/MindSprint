              )}
            </div>
          );})}
        </div>
      </div>
    </div>
  );
}

/* ── §26.4 typed-answer word problem (screens-i.jsx #33) — Senior/Middle ── */
function WordProblemView({ q, feedback, senior, onAnswer }) {
  const [typed, setTyped] = useState('');
  useEffect(()=>{ setTyped(''); },[q.id]);
  /* 4x4 grid, not the original 3x4: some word problems' natural answer needs
     "/" (fraction answers like "3/4" — wp-frac-2/wp-frac-3 both list a
     fraction as a valid acceptEquivalents form) or ":" (wp-time-1's "4:00"),
     and the original 12-key numpad had no way to type either — found while
     checking the mechanic for real rather than assuming decimal-only answers
     covered every problem. "/" and ":" sit in their own trailing column so
     the core 7-8-9/4-5-6/1-2-3/.-0 numpad shape is unchanged for every other
     problem; ⌫ stays in its own reachable corner rather than buried mid-grid. */
  const keys = ['7','8','9','/','4','5','6',':','1','2','3','','.','0','⌫',''];
  const press = (k) => {
    if (feedback) return;
    if (k==='⌫') setTyped(t=>t.slice(0,-1));
    else setTyped(t=>(t+k).slice(0,10));
  };
  const submit = () => { if (typed && !feedback) onAnswer(typed); };
  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:24,width:'100%',height:'100%'}}>
      <div style={{display:'flex',flexDirection:'column',minHeight:0}}>
        <div className={senior?'s-card raised':'sticker'} style={{padding:26,background:senior?undefined:'#fff'}}>
          <div className={senior?'s-display':'display'} style={{fontSize:senior?23:22,lineHeight:1.4,color:senior?undefined:'var(--ink)'}}>{q.prompt}</div>
          <div style={{marginTop:10,fontSize:14,color:senior?'var(--s-text-soft)':'var(--ink-soft)',fontWeight:700}}>
            Enter your answer{q.unit?` in ${q.unit}`:''}.
          </div>
        </div>
        <div style={{marginTop:20,display:'flex',alignItems:'center',gap:14}}>
          <div style={{flex:1,height:76,borderRadius:16,
            background:senior?'var(--s-surface)':'#fff',
            border:senior?'1.5px solid var(--s-teal)':'3px solid var(--coral)',
            display:'flex',alignItems:'center',padding:'0 22px',gap:4}}>
            <span className={senior?'s-display':'display'} style={{fontSize:34,color:senior?'var(--s-text)':'var(--ink)'}}>{typed||' '}</span>
            {q.unit && <span style={{marginLeft:'auto',fontSize:15,fontWeight:800,color:senior?'var(--s-text-quiet)':'var(--ink-quiet)'}}>{q.unit}</span>}
          </div>
          {senior
            ? <button className="s-btn lg" style={{height:76}} disabled={!!feedback||!typed} onClick={submit}>Check →</button>
            : <Btn color="coral" size="big" disabled={!!feedback||!typed} onClick={submit}>Check →</Btn>}
        </div>
        <div style={{marginTop:18,display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,flex:1,minHeight:0}}>
          {keys.map((k,i)=>k===''
            ? <div key={i}/>
            : <button key={i} onClick={()=>press(k)} disabled={!!feedback} className={senior?'s-card':undefined} style={{
              border:senior?'1px solid var(--s-line)':'3px solid var(--cream-200)',
              borderRadius:senior?undefined:16, cursor:'pointer',
              fontFamily:senior?'Space Grotesk':'Fredoka', fontWeight:700, fontSize:24,
              color:senior?'var(--s-text)':'var(--ink)',
              background:senior?(k==='⌫'?'rgba(255,255,255,.03)':'var(--s-surface)'):'#fff',
              display:'flex',alignItems:'center',justifyContent:'center',
            }}>{k}</button>
          )}
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <div className={senior?'s-card':'sticker'} style={{padding:20,background:senior?undefined:'#fff'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {senior ? <SPip size={34}/> : <Pip size={40} color="sky"/>}
            <div className={senior?'s-display':'display'} style={{fontSize:senior?17:19,color:senior?undefined:'var(--ink)'}}>Coach tip</div>
          </div>
          <div style={{fontSize:15,color:senior?'var(--s-text-soft)':'var(--ink-soft)',fontWeight:700,lineHeight:1.5,marginTop:12}}>
            {q.hint}
          </div>
        </div>
        {/* §14 hints never penalize — explicit label, no XP/coin cost anywhere in this flow */}
        <div style={{fontSize:12,fontWeight:700,color:senior?'var(--s-text-quiet)':'var(--ink-quiet)',textAlign:'center'}}>
          💡 Hint shown above (no XP penalty)
        </div>
      </div>
    </div>
  );
}

/* ── §26.4 reading comprehension (screens-i.jsx #34) — Senior/Middle ── */
function ComprehensionView({ q, feedback, senior, onAnswer }) {
  const [qi, setQi] = useState(0);
  const [picked, setPicked] = useState(null);
  const [correctCount, setCorrectCount] = useState(0);
  useEffect(()=>{ setQi(0); setPicked(null); setCorrectCount(0); },[q.id]);
  const question = q.questions[qi];
  const choose = (opt) => {
    if (picked) return;
    setPicked(opt);
    const nowCorrect = correctCount + (opt.ok?1:0);
    setTimeout(()=>{
      if (qi+1 < q.questions.length) { setQi(qi+1); setPicked(null); setCorrectCount(nowCorrect); }
      else onAnswer(nowCorrect, q.questions.length);
    }, 700);
  };
  return (
    <div style={{display:'grid',gridTemplateColumns:'1.15fr 1fr',gap:22,width:'100%',height:'100%'}}>
      <div className={senior?'s-card':'sticker'} style={{padding:26,display:'flex',flexDirection:'column',minHeight:0,background:senior?undefined:'#fff',overflow:'auto'}}>
        <div className={senior?'s-display':'display'} style={{fontSize:senior?24:26,color:senior?undefined:'var(--ink)'}}>{q.title}</div>
        <div style={{marginTop:12,fontSize:16,lineHeight:1.7,color:senior?'var(--s-text-soft)':'var(--ink-soft)',fontWeight:600}}>
          {q.paragraphs.map((p,i)=><p key={i} style={{margin:'0 0 12px'}}>{p}</p>)}
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',minHeight:0}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div className={senior?'s-track':'bar'} style={{flex:1}}><i style={{width:((qi)/q.questions.length*100)+'%'}}/></div>
          <div style={{fontSize:13,fontWeight:800,color:senior?'var(--s-text-soft)':'var(--ink-soft)'}}>Q{qi+1} of {q.questions.length}</div>
        </div>
        <div className={senior?'s-card raised':'sticker'} style={{padding:22,marginTop:14,background:senior?undefined:'#fff'}}>
          <div className={senior?'s-display':'display'} style={{fontSize:senior?21:22,lineHeight:1.35,color:senior?undefined:'var(--ink)'}}>{question.prompt}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12,marginTop:14,flex:1,minHeight:0,overflow:'auto'}}>
          {question.opts.map((o,i)=>{
            const chosen = picked===o;
            const showResult = picked && (chosen || o.ok);
            return (
              <button key={i} onClick={()=>choose(o)} disabled={!!picked} data-ok={o.ok?'true':'false'}
                className={`comprehension-opt${senior?' s-card':''}`}
                style={{padding:senior?'16px 18px':'14px 18px',display:'flex',alignItems:'center',gap:14,cursor:'pointer',textAlign:'left',
                  borderRadius:senior?undefined:18,
                  border:showResult ? (o.ok?'1.5px solid var(--leaf)':'1.5px solid var(--rose)') : (senior?'1px solid var(--s-line)':'3px solid var(--cream-200)'),
                  background:showResult ? (o.ok?'rgba(111,203,127,.15)':'rgba(245,143,168,.12)') : (senior?'var(--s-surface)':'#fff')}}>
                <span style={{fontSize:15,fontWeight:700,color:senior?'var(--s-text)':'var(--ink)',lineHeight:1.35}}>{o.t}</span>
              </button>
            );
          })}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:16,color:senior?'var(--s-text-soft)':'var(--ink-soft)',fontSize:13,fontWeight:700}}>
          {senior ? <SPip size={26}/> : <Pip size={32} color="sky"/>} {question.hint}
        </div>
      </div>
    </div>
  );
}

/* ── Middle/Senior activity screen — parallel to ActivityScreen (§26.4) ── */
/* Middle tier's own activity-loop identity (fills the gap flagged in §26.6b):
   previously Middle fell through to the exact same markup as Senior's ternary
   "else" branch, which was actually plain Junior styling — no Middle
   distinction at all below the home screen. Middle now gets its own look:
   the same cream/lavender gradient + sticker-card language as
   MiddleHomeScreen, a mid-size Pip (bigger than Senior's SPip coach, smaller
   than Junior's full-size companion), and XP-forward copy instead of
   Junior's hearts/stars framing (Middle has no hearts concept — §26.4). */
function TierActivityScreen({ dispatch, profile, tierSession, tierFeedback }) {
  const tier = tierOf(profile.age);
  const senior = tier === 'senior';
  const middle = tier === 'middle';
  const q = tierSession.questions[tierSession.qIdx];
  const cfg = TIER_STAGE_CONFIGS[tier][tierSession.subject]?.[tierSession.stageIndex];
  const pct = tierSession.qIdx / tierSession.questions.length;
  useEffect(()=>{ speak(q.instruction || cfg?.instruction || ''); return stopSpeech; },[tierSession.qIdx]);

  const answer = (chosen) => { if (!tierFeedback) dispatch({type:'TIER_ANSWER',chosen}); };
  const answerComprehension = (correctCount, totalCount) => {
    if (!tierFeedback) dispatch({type:'TIER_ANSWER',correctCount,totalCount});
  };

  const body = (() => {
    if (q.type === 'wordproblem')   return <WordProblemView q={q} feedback={tierFeedback} senior={senior} onAnswer={answer}/>;
    if (q.type === 'comprehension') return <ComprehensionView q={q} feedback={tierFeedback} senior={senior} onAnswer={answerComprehension}/>;
    if (q.type === 'scienceQuiz')   return <ScienceQuizView q={q} feedback={tierFeedback} senior={senior} onAnswer={answer}/>;
    /* Reused Junior mechanics at a fixed higher tier — same view components,
       no separate rendering path (§26.4: reuse the engine, not rebuild it). */
    const answerProps = { q, feedback: tierFeedback, onAnswer: answer };
    switch (q.type) {
      case 'addition':    return <AdditionBlocksView {...answerProps}/>;
      case 'subtraction': return <SubtractionView {...answerProps}/>;
      case 'compare':     return <CompareView {...answerProps}/>;
      case 'pattern':     return <PatternView {...answerProps}/>;
      case 'pairs':       return <PairsView {...answerProps}/>;
      case 'phonics':     return <PhonicsView {...answerProps}/>;
      case 'wordbuild':   return <WordBuilderView {...answerProps}/>;
      case 'habitat':     return <HabitatView {...answerProps}/>;
      case 'lifeorder':   return <LifeOrderView {...answerProps}/>;
      case 'sinkfloat':   return <ScienceSortView {...answerProps}/>;
      case 'hotcold':     return <ScienceSortView {...answerProps}/>;
      case 'livingmix':   return <ScienceSortView {...answerProps}/>;
      case 'rhythm':      return <RhythmView {...answerProps}/>;
      default:            return null;
    }
  })();

  return (
    <div className={senior?'screen senior':'screen'}>
      {senior
        ? <div className="s-backdrop"/>
        : <div style={{position:'absolute',inset:0,
            background: middle
              ? 'linear-gradient(180deg,#FFF7E8,#EFEAF6)'
              : 'linear-gradient(180deg,#DCEFFB 0%,#E8F4D4 68%,#C8E6A4 100%)'}}/>}
      <div style={{position:'relative',zIndex:5,padding:senior?'26px 40px':'16px 32px',display:'flex',flexDirection:'column',height:'100%'}}>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          {senior
            ? <button className="s-icon" onClick={()=>dispatch({type:'NAV',screen:'tierHome'})}>✕</button>
            : <IconBtn onClick={()=>dispatch({type:'NAV',screen:'tierHome'})}>✕</IconBtn>}
          <div className={senior?'s-track':'bar'} style={{flex:1}}><i style={{width:(pct*100)+'%'}}/></div>
          {/* §26.3 no hard-fail timers: speed is bonus-only framing, never a countdown */}
          <div className={senior?'s-chip':'chip'} title="Speed bonus — never a time limit">
            <span>⚡</span><span>Take your time — no time limit</span>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:16}}>
          <div style={{fontSize:13,fontWeight:800,color:senior?'var(--s-text-quiet)':'var(--ink-quiet)',
            letterSpacing:'.1em',textTransform:'uppercase'}}>
            Question {tierSession.qIdx+1} of {tierSession.questions.length} · {cfg?.label}
          </div>
          {/* Middle-only: XP-forward framing distinct from both Junior (stars/coins
              copy lives in the map header, not here) and Senior (no per-question XP
              readout — Senior only totals XP on the results screen). */}
          {middle && <div className="chip"><span>◆</span><span>+{C.quizBaseXp} XP</span></div>}
        </div>
        <div style={{flex:1,minHeight:0,display:'flex',alignItems:'center',justifyContent:'center',marginTop:16}}>
          {body}
        </div>
      </div>

      {tierFeedback && (
        <div className="modal-overlay">
          <div className={senior?'s-card raised pop-in':'modal-card pop-in'} style={senior?{padding:36,width:480,display:'flex',flexDirection:'column',alignItems:'center',gap:14,textAlign:'center'}:{}}>
            {senior
              ? <SPip size={70}/>
              : <Pip size={middle?85:110} color={middle?(tierFeedback.ok?'berry':'sky'):(tierFeedback.ok?'leaf':'sky')} mood={tierFeedback.ok?'proud':'curious'}/>}
            <div className={senior?'s-display':'display'} style={{fontSize:senior?26:(middle?28:34),
              color:tierFeedback.ok?(senior?'var(--s-teal)':(middle?'var(--berry-dark)':'var(--leaf-dark)')):(senior?'var(--s-text)':'var(--sky-dark)')}}>
              {tierFeedback.ok ? (middle?'Nice work!':'Nice — that\'s right!') : 'Not quite — let\'s look closer'}
            </div>
            {!tierFeedback.ok && tierFeedback.correct != null && (
              <div style={{fontSize:15,fontWeight:700,color:senior?'var(--s-text-soft)':'var(--ink-soft)'}}>
                Correct answer: <span style={{color:senior?'var(--s-teal)':'var(--ink)'}}>{tierFeedback.correct}</span>
              </div>
            )}
            {senior
              ? <button className="s-btn lg" onClick={()=>dispatch({type:'TIER_NEXT_Q'})}>Next question →</button>

/* ── Rhythm Tap (§4 P2): watch the notes fall, then echo the beat ── */
function RhythmView({ q, feedback, onAnswer }) {
  const [phase, setPhase] = useState('watch');   // 'watch' | 'play'
  const [watchIdx, setWatchIdx] = useState(-1);  // note being shown during watch
  const [tapIdx, setTapIdx] = useState(0);       // echo progress
  const [combo, setCombo] = useState(0);
  const [hit, setHit] = useState(null);          // { lane, txt: 'Good!'|'Perfect!' }
  const lastTap = useRef(0);
  const timers = useRef([]);

  useEffect(()=>{                                // (re)play the pattern on new question or retry
    if (feedback) return;
    timers.current.forEach(clearTimeout); timers.current = [];
    setPhase('watch'); setWatchIdx(-1); setTapIdx(0); setHit(null);
    q.pattern.forEach((lane, i) => {
      timers.current.push(setTimeout(()=>{ setWatchIdx(i); SFX('note', lane); }, 500 + i*550));
    });
    timers.current.push(setTimeout(()=>{ setWatchIdx(-1); setPhase('play'); },
      500 + q.pattern.length*550 + 250));
    return ()=>timers.current.forEach(clearTimeout);
  },[q.id, feedback]);

  const tap = (lane) => {
    if (phase !== 'play' || feedback) return;
    SFX('note', lane);
    if (lane === q.pattern[tapIdx]) {
      const now = Date.now();
      setHit({ lane, txt: now - lastTap.current < 1200 ? 'Perfect!' : 'Good!' });
      lastTap.current = now;
      setCombo(c=>c+1);
      timers.current.push(setTimeout(()=>setHit(null), 700));
      const next = tapIdx + 1;
      setTapIdx(next);
      if (next === q.pattern.length) timers.current.push(setTimeout(()=>onAnswer('done'), 400));
    } else {
      setCombo(0);
      onAnswer(RHYTHM_LANES[lane].name);         // ≠ 'done' → gentle retry, pattern replays
    }
  };

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,
      width:'min(720px,96%)',height:'100%'}}>
      <div style={{display:'flex',gap:12,alignItems:'center'}}>
        <div style={{padding:'6px 16px',borderRadius:999,background:'rgba(255,255,255,.15)',
          color:'#fff',fontFamily:'Fredoka',fontWeight:700,fontSize:16}}>
          {phase==='watch'?'Watch the notes…':'Your turn!'}
        </div>
        <div style={{padding:'6px 14px',borderRadius:999,background:'rgba(255,255,255,.12)',
          color:'#fff',fontFamily:'Fredoka',fontWeight:600,fontSize:15,
          display:'flex',gap:6,alignItems:'center'}}>

/* ── Drag with tap fallback (§4 P2 / §10.3 motor accessibility) ──
   Tiles can be dragged onto any [data-drop] target via pointer events, OR
   tapped to pick up and tapped again on the target to place. Both paths call
   onDrop(tileId, dropId). */
function useDragTile(onDrop) {
  const [sel, setSel] = useState(null);      // tile picked up by tap
  const [drag, setDrag] = useState(null);    // { id, x, y, moved } while dragging
  const dragRef = useRef(null);
  const start = (id) => (e) => {
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch {}
    dragRef.current = { id, x:e.clientX, y:e.clientY, moved:false };
    setDrag(dragRef.current);
  };
  const move = (e) => {
    const d = dragRef.current; if (!d) return;
    dragRef.current = { ...d, x:e.clientX, y:e.clientY,
      moved: d.moved || Math.abs(e.clientX - d.x) + Math.abs(e.clientY - d.y) > 6 };
    setDrag(dragRef.current);
  };
  const end = (e) => {
    const d = dragRef.current;
    dragRef.current = null; setDrag(null);
    if (!d) return;
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const zone = el && el.closest && el.closest('[data-drop]');
    if (d.moved && zone) { HAPTIC(10); onDrop(d.id, zone.getAttribute('data-drop')); setSel(null); }  // §10.3 drag-snap
    else if (!d.moved) setSel(s => s === d.id ? null : d.id);
  };
  const place = (dropId) => { if (sel !== null) { onDrop(sel, dropId); setSel(null); } };
  const tileProps = (id) => ({ onPointerDown:start(id), onPointerMove:move, onPointerUp:end });
  return { sel, drag, place, tileProps };
}

/* ── Letter tracing (§4 P2, words stage 2) ── */
function TraceView({ q, feedback, onAnswer }) {
  const [strokeIdx, setStrokeIdx] = useState(0);
  const [dotIdx, setDotIdx] = useState(0);
  useEffect(()=>{ setStrokeIdx(0); setDotIdx(0); },[q.id]);
  // §15.3: pair tracing with the letter's recorded phoneme sound, same as Phonics.
  useEffect(()=>{ SFX('phonics', q.letter); },[q.letter]);

  /* Straight strokes are endpoint pairs (3 dots incl. midpoint); curved strokes
     list their dot path explicitly. */
  const dots = s => s.length === 2
    ? [s[0], [(s[0][0]+s[1][0])/2, (s[0][1]+s[1][1])/2], s[1]]
    : s;
  const pl = pts => pts.map(p => p.join(',')).join(' ');
  const doneAll = strokeIdx >= q.strokes.length;
  const tapDot = () => {
    if (feedback || doneAll) return;
    SFX('tap');
    const pts = dots(q.strokes[strokeIdx]);
    if (dotIdx + 1 < pts.length) { setDotIdx(dotIdx + 1); return; }
    SFX('starPop');                              // stroke complete
    const next = strokeIdx + 1;
    setStrokeIdx(next); setDotIdx(0);
    if (next >= q.strokes.length) setTimeout(()=>onAnswer('done'), 400);
  };

  return (
    <div style={{display:'flex',gap:28,alignItems:'stretch',justifyContent:'center',
      width:'100%',height:'100%',padding:'0 10px 14px'}}>
      {/* tracing canvas */}
      <div style={{position:'relative',background:'#fff',borderRadius:28,flex:'0 1 480px',
        boxShadow:'inset 0 0 0 2px var(--cream-200)',overflow:'hidden'}}>
        {[20,50,80].map(p=>(
          <div key={p} style={{position:'absolute',left:0,right:0,top:`${p}%`,
            borderTop:'2px dashed var(--cream-200)'}}/>
        ))}
        <svg viewBox="0 0 400 440" style={{position:'absolute',inset:0,width:'100%',height:'100%'}}>
          {q.strokes.map((s,i)=>{
            if (i < strokeIdx)                    // traced
              return <polyline key={i} points={pl(dots(s))} fill="none" pointerEvents="none"
                stroke="var(--coral)" strokeWidth="34" strokeLinecap="round" strokeLinejoin="round"/>;
            const ghost = <polyline key={'g'+i} points={pl(dots(s))} fill="none" pointerEvents="none"
              stroke="var(--cream-200)" strokeWidth="34" strokeLinecap="round" strokeLinejoin="round"
              strokeDasharray="6 14"/>;
            if (i !== strokeIdx) return ghost;
            const pts = dots(s);
            return (
              <g key={i}>
                {ghost}
                {dotIdx>0&&<polyline points={pl(pts.slice(0, dotIdx+1))} fill="none" pointerEvents="none"
                  stroke="var(--coral)" strokeWidth="34" strokeLinecap="round" strokeLinejoin="round"/>}
                {pts.map(([dx,dy],k)=>k<dotIdx?null:(
                  <circle key={k} cx={dx} cy={dy} r={k===dotIdx?22:12}
                    className={k===dotIdx?'trace-dot-active':'trace-dot'}
                    onClick={k===dotIdx?tapDot:undefined}
                    pointerEvents={k===dotIdx?'auto':'none'}
                    fill={k===dotIdx?'#fff':'rgba(61,40,24,0.12)'}
                    stroke={k===dotIdx?'var(--coral-dark)':'none'} strokeWidth="5"
                    style={{cursor:k===dotIdx?'pointer':'default'}}/>
                ))}
              </g>
            );
          })}
        </svg>
        {/* per-stroke stars */}
        <div style={{position:'absolute',top:14,right:14,display:'flex',gap:5}}>
          {q.strokes.map((_,i)=>(
            <span key={i} className={i<strokeIdx?'star':'star empty'} style={{width:26,height:26}}/>
          ))}
        </div>
        <div style={{position:'absolute',top:14,left:16,fontFamily:'Fredoka',fontWeight:700,
          fontSize:15,color:'var(--ink-soft)'}}>
          Letter {q.letter} · stroke {Math.min(strokeIdx+1,q.strokes.length)} of {q.strokes.length}
        </div>
      </div>
      {/* side guidance */}
      <div style={{display:'flex',flexDirection:'column',gap:14,width:250,justifyContent:'center'}}>
        <div className="sticker" style={{padding:18,background:'#fff'}}>
          <div style={{fontSize:12,fontWeight:800,color:'var(--ink-quiet)',
            letterSpacing:'0.1em',textTransform:'uppercase'}}>Word</div>
          <div className="display" style={{fontSize:30,color:'var(--ink)',marginTop:2}}>{q.word}</div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginTop:8}}>
            <span style={{fontSize:44}}>{q.emoji}</span>
            <div style={{fontFamily:'Fredoka',fontSize:16,color:'var(--ink-soft)'}}>
              starts with <strong style={{color:'var(--coral-dark)'}}>{q.letter}</strong>
            </div>
            <button onClick={()=>SFX('phonics', q.letter)} aria-label={`Hear the letter ${q.letter}'s sound`}
              style={{width:34,height:34,borderRadius:'50%',border:'none',cursor:'pointer',
                background:'var(--sky)',boxShadow:'0 3px 0 var(--sky-dark)',fontSize:15,flexShrink:0}}>🔊</button>
          </div>
        </div>
        <div className="sticker" style={{padding:14,background:'#FFF6E0',
          display:'flex',alignItems:'center',gap:10}}>
          <Pip size={54} color="leaf" mood="happy"/>
          <div style={{fontFamily:'Fredoka',fontSize:15,color:'var(--ink)'}}>
            Tap the dots in order!
          </div>
        </div>
        <Btn color="ghost" onClick={()=>{ if(!feedback&&!doneAll) onAnswer('done'); }}>Skip</Btn>
      </div>
    </div>
  );
}

/* ── Pattern Complete (§4 P1) ── */
function ShapeGlyph({ shape, color, size = 80 }) {
  const c = `var(--${color})`, d = `var(--${color}-dark)`;
  if (shape === 'circle') return <div style={{width:size,height:size,borderRadius:'50%',background:c,boxShadow:`0 5px 0 ${d}`}}/>;

    borderRight:`${size/2}px solid transparent`,borderBottom:`${size*0.9}px solid ${c}`,

/* ── Matching Pairs (§4 P1): 3×2 memory board with tap counter ── */
function PairsView({ q, feedback, onAnswer }) {
  const [flipped, setFlipped] = useState([]);   // deck indices face-up, unmatched
  const [matched, setMatched] = useState([]);   // matched pair ids
  const [taps, setTaps] = useState(0);
  useEffect(()=>{ setFlipped([]); setMatched([]); setTaps(0); },[q.id]);

  const tap = (i) => {
    if (feedback || flipped.length === 2) return;
    const card = q.deck[i];
    if (matched.includes(card.pid) || flipped.includes(i)) return;
    setTaps(t=>t+1);
    const now = [...flipped, i];
    setFlipped(now);
    if (now.length === 2) {
      const [a,b] = now.map(x=>q.deck[x]);
      if (a.pid === b.pid) {
        const m = [...matched, a.pid];
        setMatched(m); setFlipped([]);
        SFX('starPop'); speak(a.w, true);
        if (m.length === 3) setTimeout(()=>onAnswer('done'), 400);
      } else {
        setTimeout(()=>setFlipped([]), 800);   // gentle flip-back, no hearts lost (§3.5)
      }
    }
  };

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,width:'100%',height:'100%'}}>
      <div style={{display:'flex',gap:12,alignItems:'center'}}>
        <div style={{padding:'6px 16px',borderRadius:999,background:'rgba(255,255,255,.85)',
          fontFamily:'Fredoka',fontWeight:700,fontSize:15,color:'var(--ink-soft)'}}>
          {matched.length} / 3 pairs matched
        </div>
        <div style={{padding:'6px 16px',borderRadius:999,background:'var(--sun)',
          display:'flex',gap:6,alignItems:'center',fontFamily:'Fredoka',fontWeight:700,
          fontSize:15,color:'var(--ink)'}}>
          <span>👆</span><span>{taps} taps</span>
        </div>
      </div>
      <div style={{flex:1,width:'min(680px,94%)',display:'grid',
        gridTemplateColumns:'repeat(3,1fr)',gridTemplateRows:'repeat(2,1fr)',gap:18,paddingBottom:16}}>
        {q.deck.map((c,i)=>{
          const isMatched = matched.includes(c.pid);
          const isUp = isMatched || flipped.includes(i);
          return (
            <button key={i} className="pair-card" onClick={()=>tap(i)}
              aria-label={isUp ? c.w : 'hidden card'}
              style={isUp ? {
                background:'#fff',borderRadius:24,border:'none',position:'relative',
                cursor:isMatched?'default':'pointer',
                boxShadow:isMatched?'0 0 0 4px var(--leaf), 0 6px 0 var(--leaf-dark)'
                                   :'0 6px 0 rgba(61,40,24,0.12)',
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,
              } : {
                background:'var(--berry)',borderRadius:24,border:'none',cursor:'pointer',
                boxShadow:'0 6px 0 var(--berry-dark)',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:44,color:'#fff',fontFamily:'Fredoka',fontWeight:700,
              }}>
              {isUp ? (<>
                {isMatched&&<div style={{position:'absolute',top:-8,right:-8,width:32,height:32,
                  borderRadius:'50%',background:'var(--leaf)',display:'flex',alignItems:'center',
                  justifyContent:'center',color:'#fff',fontWeight:900,fontSize:16,
                  boxShadow:'0 3px 0 var(--leaf-dark)'}}>✓</div>}
                <div style={{fontSize:52}}>{c.e}</div>
                <div className="display" style={{fontSize:18,color:'var(--ink)'}}>{c.w}</div>
              </>) : '?'}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* §9.4 cross-subject reinforcement: the science "Sort it Out!" stage mixes
   living/non-living items, so the count of living things seen is a genuine,
   honest counting fact from that exact play session — not decoration. Tagged
   with the SAME skill id counting questions use, so it counts wherever it
   happens (§9.1). Only offered once per stage clear, only when the session
   actually had living-item questions to count. */
function livingCountRecap(session) {
  if (!session || session.subject !== 'science') return null;
  const qs = (session.questions || []).slice(0, 5);   // exclude any requeued repeats
  const livingQs = qs.filter(q => q.type === 'living');
  if (!livingQs.length) return null;
  return { count: livingQs.filter(q => q.correct === 'living').length, total: livingQs.length };
}

function StageClearedScreen({ dispatch, session, profile }) {
  const stars = session.mistakes===0 ? 3 : session.mistakes<=2 ? 2 : 1;
  const recap = livingCountRecap(session);
  const [recapAnswered, setRecapAnswered] = useState(false);
  useEffect(()=>{
    SFX('stageClear');
    speak(`Stage clear! You earned ${stars} star${stars===1?'':'s'}!`);
    return stopSpeech;
  },[]);
  const answerRecap = (n) => {
    setRecapAnswered(true);
    dispatch({type:'BUMP_SKILL_ONLY', skillId:'math.count_to_5', ok:n===recap.count});
    SFX(n===recap.count?'correct':'retry');
    speak(n===recap.count ? 'Yes! Great counting!' : `It was ${recap.count}. Nice try!`);

  const palette = ['#FF8A4C','#6FCB7F','#5EB7E8','#FFCE52','#B587E0'];

          {[...Array(3)].map((_,i)=>(
            <span key={i} className="star" style={{
              width:72,height:72,
              opacity:i<stars?1:.25,
              transform:i===1?'scale(1.2)':'scale(1)',

        {/* §9.4 cross-subject reinforcement bonus: counting practice tagged
            with math.count_to_5, embedded right in the science stage recap */}
        {recap&&!recapAnswered&&(
          <div className="sticker pop-in" style={{padding:'16px 24px',display:'flex',
            flexDirection:'column',alignItems:'center',gap:10,background:'#fff'}}>

            <div style={{display:'flex',gap:10}}>
              {[...new Set([recap.count, Math.max(0,recap.count-1), Math.min(recap.total,recap.count+1)])]

                <button key={n} onClick={()=>answerRecap(n)}

                    fontSize:24,boxShadow:'0 4px 0 var(--leaf-dark)'}}>{n}</button>
              ))}
            </div>
          </div>
        )}

        <div style={{display:'flex',gap:14,marginTop:4}}>
          <Btn color="leaf" size="big" onClick={()=>dispatch({type:'NEXT_STAGE'})}>
            Next Stage →
          </Btn>
          <Btn color="sky" onClick={()=>dispatch({type:'NAV',screen:'map'})}>
            ↩ Map
          </Btn>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════ */
/* Interruption resume: kid-friendly Keep going / Start over choice */
function ResumeModal({ dispatch, pendingResume, profile }) {
  const subj = SUBJECTS.find(s=>s.id===pendingResume.subject);
  useEffect(()=>{ speak('Welcome back! Want to keep going?'); },[]);
  return (
    <div className="modal-overlay">
      <div className="modal-card pop-in">
        <div className="pip-bob"><Pip size={120} color={profile.avatarColor||'leaf'} mood="happy" wave/></div>
        <div className="display" style={{fontSize:34,color:'var(--ink)'}}>Welcome back! 🌱</div>
        <div style={{fontSize:16,color:'var(--ink-soft)',fontWeight:700}}>
          You were on {subj?.icon} question {pendingResume.qIdx+1} of {pendingResume.questions.length}
        </div>
        <div style={{display:'flex',gap:14,marginTop:8}}>
          <Btn color="leaf" size="big" onClick={()=>dispatch({type:'RESUME'})}>Keep going! →</Btn>
          <Btn color="sky" onClick={()=>dispatch({type:'DISCARD_RESUME'})}>Start over</Btn>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [state, dispatch] = useReducer(reducer, INIT);
  const { screen, profile, progress, subject, session, feedback, replayStage,
          pendingResume, dailyBonus, showParentGate, showParentDash, onboard,
          tierSession, tierFeedback, tierStreakWasReset } = state;

  useEffect(()=>{
    /* §22.1 onboarding resume: welcome/avatar/plan now persist too (once
       SET_NAME has assigned an activeProfileId) so a relaunch mid-onboarding
       doesn't lose the child's name/avatar/age or force a full restart.
       Only 'splash'/'picker' stay excluded — no in-progress profile exists
       there yet. */
    if(!['splash','picker'].includes(screen)) doSave(state);
  },[state]);
  useEffect(()=>{ stopSpeech(); },[screen]);
  /* §13.1 session_start/session_end: once per mount, and best-effort on tab
     hide (visibilitychange is the standard reliable signal — beforeunload is
     not consistently fired on mobile). No PII, same as every other event. */
  useEffect(()=>{
    dispatch({type:'LOG_EVENT', name:'session_start', data:{}});
    const onHide = () => { if (document.visibilityState === 'hidden')
      dispatch({type:'LOG_EVENT', name:'session_end', data:{}}); };
    document.addEventListener('visibilitychange', onHide);
    return () => document.removeEventListener('visibilitychange', onHide);
  },[]);
  /* §10.4 accessibility modes — body classes drive CSS overrides */
  useEffect(()=>{
    document.body.classList.toggle('reduced-motion', !!state.settings.reducedMotion);
    document.body.classList.toggle('calm', !!state.settings.calm);
    document.body.classList.toggle('lefty', !!state.settings.lefty);
  },[state.settings]);

  if(showParentDash) return <div className="app-frame"><ParentDashboard dispatch={dispatch} profile={profile} progress={progress}
    settings={state.settings} skills={state.skills} events={state.events} roster={composeProfiles(state)}/></div>;
  if(showParentGate) return <div className="app-frame"><ParentGateModal dispatch={dispatch}/></div>;

  /* Daily time limit (§14): soft stop once today's completed-stage time
     reaches 30 min. Parent screens above stay reachable to turn it off. */
  if (state.settings.dailyLimit) {
    const day = ts => { const d = new Date(ts);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
    const today = todayStr();
    const todaySecs = (state.events||[]).reduce((a,e)=>
      e.t==='stage_complete' && day(e.ts)===today ? a+(e.durationSec||0) : a, 0);
    if (todaySecs >= 30*60) return <div className="app-frame"><TimeUpScreen dispatch={dispatch} profile={profile}/></div>;
  }

  const main = (()=>{ switch(screen){
    case 'splash':   return <SplashScreen      dispatch={dispatch} profile={profile} kidCount={state.roster.length}/>;
    case 'picker':   return <ProfilePickerScreen dispatch={dispatch} kids={state.roster}/>;
    case 'welcome':  return <WelcomeScreen     dispatch={dispatch} profile={profile}/>;
    case 'avatar':   return <AvatarScreen      dispatch={dispatch} profile={profile}/>;
    case 'plan':     return <PlanScreen        dispatch={dispatch} profile={profile} onboard={onboard}/>;
    case 'map':      return <MapScreen         dispatch={dispatch} profile={profile} progress={progress} subject={subject} dailyBonus={dailyBonus} skills={state.skills}/>;
    case 'intro':    return <LessonIntroScreen dispatch={dispatch} profile={profile} progress={progress} subject={subject} replayStage={replayStage}/>;
    case 'activity': return <ActivityScreen    dispatch={dispatch} profile={profile} session={session} feedback={feedback}/>;
    case 'cleared':  return <StageClearedScreen dispatch={dispatch} session={session} profile={profile}/>;
    case 'shop':     return <ShopScreen         dispatch={dispatch} profile={profile}/>;
    case 'settings': return <KidSettingsScreen  dispatch={dispatch} settings={state.settings} profile={profile}/>;
    case 'musicLocked': return <MusicLockedScreen dispatch={dispatch} profile={profile}/>;
    /* §26 age-tier expansion (decision O8) — Middle/Senior screens, parallel
       to map/intro/activity/cleared above. */
    case 'tierHome':          return <TierHomeScreen dispatch={dispatch} profile={profile} skills={state.skills} tierStreakWasReset={tierStreakWasReset}/>;
    case 'tierSubjectStages': return <TierSubjectStagesScreen dispatch={dispatch} profile={profile} subject={subject} skills={state.skills}/>;
    case 'tierActivity':      return <TierActivityScreen dispatch={dispatch} profile={profile} tierSession={tierSession} tierFeedback={tierFeedback}/>;
    case 'tierResults':       return <TierResultsScreen dispatch={dispatch} profile={profile} tierSession={tierSession}/>;
    case 'tierAchievements':  return <SeniorAchievementsScreen dispatch={dispatch} profile={profile} skills={state.skills}/>;
    default:         return <SplashScreen      dispatch={dispatch} profile={profile} kidCount={state.roster.length}/>;
  }})();

  return (
    <div className="app-frame">
      {main}
      {pendingResume && screen==='map' && <ResumeModal dispatch={dispatch} pendingResume={pendingResume} profile={profile}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
