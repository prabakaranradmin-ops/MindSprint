<style>
html,body{margin:0;padding:0;height:100%;background:#1a1008;overscroll-behavior:none;}
#root{display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;padding:20px;box-sizing:border-box;overflow:hidden;}
/* §mobile-fit: the whole game is authored against a fixed 1024x720 coordinate
   system (every screen's absolute-positioned children, SVG viewBoxes, and
   px-based layouts assume it). Rather than rewrite that, .app-frame pins the
   design at its native 1024x720 size and then scales the whole thing down
   uniformly ("contain" math: the smaller of the width or height ratio,
   capped at 1x so it never upscales past native size on large desktop
   screens) to fit whatever viewport it's actually running in — phones
   included. The scale factor is computed in JS into --stage-scale (see the
   setStageScale script near the closing body tag): transform:scale() only
   accepts a plain <number>, and Chromium silently resolves calc()/min()
   expressions inside it to nothing rather than a number, so a pure-CSS
   `scale(min(1, calc(...)))` here looks fine but never actually applies. */
.app-frame{
  width:1024px;height:720px;flex-shrink:0;position:relative;overflow:hidden;
  transform-origin:center center;
  transform:scale(var(--stage-scale, 1));
  border-radius:38px;box-shadow:0 40px 100px -20px rgba(0,0,0,0.85);
}
/* Phones (portrait or landscape — see the .phone-sized toggle in
   setStageScale): let the frame reach the true screen edges (no rounded
   corners / drop shadow floating in space) so the 1024x720 canvas scales as
   large as it can inside the viewport instead of looking like a shrunken
   postcard. A plain max-width media query can't also catch "short but wide"
   phone-landscape, hence the JS-driven class instead of a second query. */
#root.phone-sized{padding:0;}
#root.phone-sized .app-frame{border-radius:0;box-shadow:none;}
/* §mobile-fit/rotate: the game's 1024x720 canvas is landscape-shaped (1.42:1).
   A phone held upright is the opposite shape (~0.44:1), so "contain" scaling
   — however it's computed — is mathematically stuck shrinking to the width,
   leaving most of the screen as empty letterbox above/below (measured ~33%
   fill on a real portrait phone). Rather than distort or crop the 1024x720
   layout to force-fill portrait, ask for landscape: on that same phone
   rotated sideways the canvas fills ~95%+ of the screen at native aspect.
   #root/.app-frame stay mounted (state/timers keep running) — only visibility
   toggles, so rotating back mid-activity resumes exactly where it was. */
#rotate-prompt{display:none;}
@media (max-width:900px) and (orientation:portrait){
  #root{display:none;}
  #rotate-prompt{
    display:flex;position:fixed;inset:0;z-index:9999;background:#1a1008;color:#fff;
    flex-direction:column;align-items:center;justify-content:center;gap:18px;
    padding:32px;box-sizing:border-box;text-align:center;font-family:'Nunito',system-ui,sans-serif;
  }
}
#rotate-prompt .rotate-icon{font-size:64px;animation:rotateHint 1.6s ease-in-out infinite;}
@keyframes rotateHint{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-90deg)}}
#rotate-prompt .rotate-title{font-family:'Fredoka',sans-serif;font-size:24px;font-weight:700;}
#rotate-prompt .rotate-hint{font-size:15px;color:rgba(255,255,255,.7);max-width:280px;}
.screen{position:absolute;inset:0;font-family:'Nunito',system-ui,sans-serif;color:var(--ink);overflow:hidden;user-select:none;-webkit-font-smoothing:antialiased;}
.screen *{box-sizing:border-box;}

/* answer cards */
.ans-card{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:18px 16px;background:#fff;border:3px solid transparent;border-radius:24px;cursor:pointer;
  box-shadow:0 6px 0 rgba(61,40,24,.12),0 14px 22px -8px rgba(61,40,24,.18);
  transition:transform .1s ease,box-shadow .1s ease;font-family:'Fredoka',sans-serif;}
.ans-card:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 9px 0 rgba(61,40,24,.12),0 18px 28px -8px rgba(61,40,24,.22);}
.ans-card:active:not(:disabled){transform:translateY(3px);box-shadow:0 3px 0 rgba(61,40,24,.12);}
.ans-card.correct{background:var(--leaf);border-color:var(--leaf-dark);color:#fff;box-shadow:0 6px 0 var(--leaf-dark);}
.ans-card.wrong{background:var(--rose);border-color:var(--rose-dark);color:#fff;box-shadow:0 6px 0 var(--rose-dark);}
.ans-card.pulse-correct{animation:pulseCorrect .4s ease forwards;}
@keyframes pulseCorrect{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}

/* compare buttons */
.compare-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:28px;cursor:pointer;border:4px solid transparent;transition:all .15s;padding:20px;}
.compare-zone:hover{border-color:var(--coral);background:rgba(255,138,76,.08);}
.compare-zone.correct{border-color:var(--leaf);background:rgba(111,203,127,.15);}
.compare-zone.wrong{border-color:var(--rose);background:rgba(245,143,168,.15);}

/* phonics cards */
.phonics-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:#fff;border-radius:28px;padding:28px 20px;cursor:pointer;border:4px solid transparent;
  box-shadow:0 6px 0 rgba(61,40,24,.1),0 16px 28px -8px rgba(61,40,24,.16);
  transition:all .15s;font-family:'Fredoka',sans-serif;}
.phonics-card:hover:not(:disabled){transform:translateY(-4px);box-shadow:0 10px 0 rgba(61,40,24,.1),0 22px 36px -8px rgba(61,40,24,.2);}
.phonics-card.correct{background:var(--leaf);color:#fff;border-color:var(--leaf-dark);box-shadow:0 6px 0 var(--leaf-dark);}
.phonics-card.wrong{background:var(--rose);color:#fff;border-color:var(--rose-dark);box-shadow:0 6px 0 var(--rose-dark);}

/* science sort */
.sort-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  border-radius:28px;padding:24px;border:4px dashed var(--cream-200);transition:all .2s;cursor:pointer;}
.sort-zone:hover{border-color:var(--coral);background:rgba(255,138,76,.05);}
.sort-zone.correct{border-style:solid;border-color:var(--leaf);background:rgba(111,203,127,.12);}
.sort-zone.wrong{border-style:solid;border-color:var(--rose);background:rgba(245,143,168,.12);}

/* animations */
@keyframes pipBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.pip-bob{animation:pipBob 2s ease-in-out infinite;}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(720px) rotate(720deg);opacity:0}}
.confetti{position:absolute;top:0;animation:confettiFall linear forwards;}
@keyframes haloP{0%,100%{box-shadow:0 0 0 8px rgba(255,138,76,.25),0 8px 0 var(--coral-dark)}50%{box-shadow:0 0 0 18px rgba(255,138,76,.12),0 8px 0 var(--coral-dark)}}
.node.current{animation:haloP 2s ease-in-out infinite;}
@keyframes popIn{0%{transform:scale(0.5) translateY(20px);opacity:0}70%{transform:scale(1.08);opacity:1}100%{transform:scale(1);opacity:1}}
.pop-in{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shake{animation:shake .35s ease;}
@keyframes caretBlink{50%{opacity:0}}
.btn:active{transform:translateY(3px);box-shadow:0 3px 0 var(--btn-shadow)!important;}
.modal-overlay{position:absolute;inset:0;background:rgba(61,40,24,.38);display:flex;
  align-items:center;justify-content:center;z-index:30;backdrop-filter:blur(3px);}
.modal-card{background:#fff;border-radius:40px;padding:44px 40px 36px;
  box-shadow:0 20px 0 rgba(61,40,24,.12),0 40px 80px -20px rgba(61,40,24,.45);
  display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;width:560px;max-width:92%;}

/* parent dashboard */
.pd-card{background:#fff;border-radius:22px;padding:20px 24px;
  box-shadow:0 4px 0 rgba(61,40,24,.07),0 12px 24px -8px rgba(61,40,24,.12);}
.pd-bar-bg{height:12px;background:var(--cream-200);border-radius:999px;overflow:hidden;}
.pd-bar-fill{height:100%;border-radius:999px;transition:width .8s ease;}
.stat-card{background:#fff;border-radius:18px;padding:16px 20px;text-align:center;
  box-shadow:0 4px 0 rgba(61,40,24,.07),0 10px 20px -6px rgba(61,40,24,.10);}
</style>
