<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bloom Academy</title>
<link rel="stylesheet" href="styles.css"/>
<script src="content.js"></script>
<script src="audio-manager.jsx"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
html,body{margin:0;padding:0;height:100%;background:#1a1008;}
#root{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;box-sizing:border-box;}
.app-frame{width:1024px;height:720px;flex-shrink:0;position:relative;border-radius:38px;overflow:hidden;box-shadow:0 40px 100px -20px rgba(0,0,0,0.85);}
.screen{position:absolute;inset:0;font-family:'Nunito',system-ui,sans-serif;color:var(--ink);overflow:hidden;user-select:none;-webkit-font-smoothing:antialiased;}
.screen *{box-sizing:border-box;}

/* answer cards */
.ans-card{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:18px 16px;background:#fff;border:3px solid transparent;border-radius:24px;cursor:pointer;
  box-shadow:0 6px 0 rgba(61,40,24,.12),0 14px 22px -8px rgba(61,40,24,.18);
  transition:transform .1s ease,box-shadow .1s ease;font-family:'Fredoka',sans-serif;}
.ans-card:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 9px 0 rgba(61,40,24,.12),0 18px 28px -8px rgba(61,40,24,.22);}
.ans-card:active:not(:disabled){transform:translateY(3px);box-shadow:0 3px 0 rgba(61,40,24,.12);}
.ans-card.correct{background:var(--leaf);border-color:var(--leaf-dark);color:#fff;box-shadow:0 6px 0 var(--leaf-dark);}
.ans-card.wrong{background:var(--rose);border-color:var(--rose-dark);color:#fff;box-shadow:0 6px 0 var(--rose-dark);}
.ans-card.pulse-correct{animation:pulseCorrect .4s ease forwards;}
@keyframes pulseCorrect{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}

/* compare buttons */
.compare-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:28px;cursor:pointer;border:4px solid transparent;transition:all .15s;padding:20px;}
.compare-zone:hover{border-color:var(--coral);background:rgba(255,138,76,.08);}
.compare-zone.correct{border-color:var(--leaf);background:rgba(111,203,127,.15);}
.compare-zone.wrong{border-color:var(--rose);background:rgba(245,143,168,.15);}

/* phonics cards */
.phonics-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:#fff;border-radius:28px;padding:28px 20px;cursor:pointer;border:4px solid transparent;
  box-shadow:0 6px 0 rgba(61,40,24,.1),0 16px 28px -8px rgba(61,40,24,.16);
  transition:all .15s;font-family:'Fredoka',sans-serif;}
.phonics-card:hover:not(:disabled){transform:translateY(-4px);box-shadow:0 10px 0 rgba(61,40,24,.1),0 22px 36px -8px rgba(61,40,24,.2);}
.phonics-card.correct{background:var(--leaf);color:#fff;border-color:var(--leaf-dark);box-shadow:0 6px 0 var(--leaf-dark);}
.phonics-card.wrong{background:var(--rose);color:#fff;border-color:var(--rose-dark);box-shadow:0 6px 0 var(--rose-dark);}

/* science sort */
.sort-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  border-radius:28px;padding:24px;border:4px dashed var(--cream-200);transition:all .2s;cursor:pointer;}
.sort-zone:hover{border-color:var(--coral);background:rgba(255,138,76,.05);}
.sort-zone.correct{border-style:solid;border-color:var(--leaf);background:rgba(111,203,127,.12);}
.sort-zone.wrong{border-style:solid;border-color:var(--rose);background:rgba(245,143,168,.12);}

/* animations */
@keyframes pipBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.pip-bob{animation:pipBob 2s ease-in-out infinite;}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(720px) rotate(720deg);opacity:0}}
.confetti{position:absolute;top:0;animation:confettiFall linear forwards;}
@keyframes haloP{0%,100%{box-shadow:0 0 0 8px rgba(255,138,76,.25),0 8px 0 var(--coral-dark)}50%{box-shadow:0 0 0 18px rgba(255,138,76,.12),0 8px 0 var(--coral-dark)}}
.node.current{animation:haloP 2s ease-in-out infinite;}
@keyframes popIn{0%{transform:scale(0.5) translateY(20px);opacity:0}70%{transform:scale(1.08);opacity:1}100%{transform:scale(1);opacity:1}}
.pop-in{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shake{animation:shake .35s ease;}
@keyframes caretBlink{50%{opacity:0}}
.btn:active{transform:translateY(3px);box-shadow:0 3px 0 var(--btn-shadow)!important;}
.modal-overlay{position:absolute;inset:0;background:rgba(61,40,24,.38);display:flex;
  align-items:center;justify-content:center;z-index:30;backdrop-filter:blur(3px);}
.modal-card{background:#fff;border-radius:40px;padding:44px 40px 36px;
  box-shadow:0 20px 0 rgba(61,40,24,.12),0 40px 80px -20px rgba(61,40,24,.45);
  display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;width:560px;max-width:92%;}

/* parent dashboard */
.pd-card{background:#fff;border-radius:22px;padding:20px 24px;
  box-shadow:0 4px 0 rgba(61,40,24,.07),0 12px 24px -8px rgba(61,40,24,.12);}
.pd-bar-bg{height:12px;background:var(--cream-200);border-radius:999px;overflow:hidden;}
.pd-bar-fill{height:100%;border-radius:999px;transition:width .8s ease;}
.stat-card{background:#fff;border-radius:18px;padding:16px 20px;text-align:center;
  box-shadow:0 4px 0 rgba(61,40,24,.07),0 10px 20px -6px rgba(61,40,24,.10);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useReducer, useEffect, useRef, useMemo } = React;

/* ═══════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════ */
const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);
const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const numWord = n => ['zero','one','two','three','four','five','six','seven','eight','nine','ten'][n] || n;

/* Local calendar date as YYYY-MM-DD; noon-anchored diff avoids DST edge cases */
const todayStr = () => {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
};
const dayDiff = (from, to) => Math.round((new Date(to+'T12:00:00') - new Date(from+'T12:00:00')) / 86400000);

/* Name field: letters + spaces only, max 12 chars, tiny disallow-list, friendly fallback */
const NAME_BLOCKLIST = ['poop','butt','stupid','dumb'];
const sanitizeNameInput = raw => raw.replace(/[^\p{L} ]/gu, '').slice(0, 12);
const finalizeName = raw => {
  const clean = sanitizeNameInput(raw).trim();
  if (!clean || NAME_BLOCKLIST.includes(clean.toLowerCase())) return 'Friend';
  return clean;
};

/* Read-aloud via Speech Synthesis (interim until recorded VO; phoneme audio must be sprites) */
let speechOn = true;
function speak(text, force=false) {
  try {
    if ((!speechOn && !force) || !window.speechSynthesis || !text) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/[🍎🎉⭐🌟🏆✨💫🌈🔤🖼️🤔➕➖🌱💧🔥❄️🏠🔄💪🎯]/gu,''));
    u.rate = 0.92; u.pitch = 1.15;
    window.speechSynthesis.speak(u);
  } catch {}
}
function stopSpeech(){ try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch {} }

/* ═══════════════════════════════════════════════════════
   GAME DATA
═══════════════════════════════════════════════════════ */
const SUBJECTS = [
  { id:'math',    label:'Numbers', icon:'🔢', color:'var(--coral)', dark:'var(--coral-dark)', locked:false },
  { id:'words',   label:'Words',   icon:'📖', color:'var(--sky)',   dark:'var(--sky-dark)',   locked:false },
  { id:'science', label:'Science', icon:'🔬', color:'var(--leaf)',  dark:'var(--leaf-dark)',  locked:false },
  { id:'music',   label:'Music',   icon:'🎵', color:'var(--berry)', dark:'var(--berry-dark)', locked:false },
];
/* Music is star-gated, not hidden: Rhythm Tap exists, so the locked state can
   honestly show progress toward the unlock (§14 no-broken-promises). */
const MUSIC_UNLOCK_STARS = 30;
const subjLocked = (s, profile) => s.id === 'music' && ((profile && profile.stars) || 0) < MUSIC_UNLOCK_STARS;

/* Content banks + stage lineups live in content.js (§15.1 — data, not code) */
const C = window.BLOOM_CONTENT;
const STAGE_CONFIGS = C.stageConfigs;
const PHONICS_BANK = C.phonics, WORDPIC_BANK = C.wordpic, LIVING_BANK = C.living,
      SIZE_BANK = C.size, SINK_FLOAT_BANK = C.sinkfloat, HOT_COLD_BANK = C.hotcold,
      HABITATS = C.habitats, HABITAT_BANK = C.habitat, LIFECYCLE_BANK = C.lifecycle,
      LIFECYCLE_SEQS = C.lifecycleSeqs, TRACE_BANK = C.traceLetters,
      SKILL_LABELS = C.skillLabels;

/* ──────── Apple positions INSIDE the canopy ──────────
   Tree container: 440×380. Canopy: ellipse centered at
   (220,130) with rx=165,ry=120. All % of 440×380.
   Verified: each point satisfies ((x-220)/165)²+((y-130)/120)² < 0.72
─────────────────────────────────────────────────────── */
const APPLE_POOL = [
  [50,20],[36,16],[64,18],[28,30],[72,28],[50,42],[38,50],[62,46],
  [44,26],[56,33],[24,22],[76,24],[50,12],[32,40],[68,40],[46,55],
];

/* ──────────────────────────────────────────────────────
   ADAPTIVE DIFFICULTY (§8.3, §9.2) — deterministic rules.
   Age seeds the baseline; rolling accuracy steps up/down.
   Changes are silent and gradual — never a visible "level down".
────────────────────────────────────────────────────── */
function rollingAcc(skills, skillId, n) {
  const r = (skills && skills[skillId] && skills[skillId].recent) || [];
  const w = r.slice(-n);
  if (!w.length) return null;
  return w.reduce((a, b) => a + b, 0) / w.length;
}
function getAdaptive(ctx, skillId) {
  const age = (ctx && ctx.age) || 6;
  let tier = age >= 7 ? 2 : 1;          // age-seeded start (§9.2)
  let near = age >= 6;                  // 5-year-olds get far distractors (§8.3)
  let twoOpts = false;
  const rec = (ctx && ctx.skills && ctx.skills[skillId] && ctx.skills[skillId].recent) || [];
  const acc10 = rollingAcc(ctx && ctx.skills, skillId, 10);
  const acc15 = rollingAcc(ctx && ctx.skills, skillId, 15);
  if (rec.length >= 10 && acc10 !== null && acc10 <= 0.6) {        // step down
    tier = 1; near = false; twoOpts = true;
  } else if (rec.length >= 15 && acc15 !== null && acc15 >= 0.9) { // step up
    tier = Math.min(3, tier + 1); near = true;
  }
  return { tier, near, twoOpts };
}

/* Wrong-answer helper — near = distractors within ±1–2 (§8.3 distractor proximity) */
function wrongNums(correct, min, max, near = false, count = 2) {
  const out = new Set();
  if (near) {
    for (const d of shuffle([-1, 1, -2, 2])) {
      const n = correct + d;
      if (n >= min && n <= max && n !== correct) out.add(n);
      if (out.size >= count) break;
    }
  }
  let tries = 0;
  while (out.size < count && tries < 60) {
    const n = rnd(min, max);
    if (n !== correct && (near || max - min < 4 || Math.abs(n - correct) >= 2)) out.add(n);
    tries++;
  }
  while (out.size < count) { const n = rnd(min, max); if (n !== correct) out.add(n); }
  return [...out];
}

/* Bank picker: difficulty tiering + freshness (§15.1) — avoids items the child
   saw recently when the bank is big enough; degrades gracefully when it isn't. */
function pickBank(bank, n, adapt, recent) {
  let pool = bank;
  if (adapt && adapt.twoOpts) { const e = bank.filter(i => i.difficulty <= 1); if (e.length >= n) pool = e; }
  else if (!(adapt && adapt.tier >= 2)) { const e = bank.filter(i => i.difficulty <= 2); if (e.length >= n) pool = e; }
  if (recent && recent.length) { const f = pool.filter(i => !recent.includes(i.id)); if (f.length >= n) pool = f; }
  return shuffle([...pool]).slice(0, n);
}
/* Step-down reduces choices to 2 where the mechanic allows (§9.2) */
function capOpts(opts, adapt) {
  if (!(adapt && adapt.twoOpts)) return shuffle(opts.map(o => ({ ...o })));
  const ok = opts.find(o => o.ok);
  const w = shuffle(opts.filter(o => !o.ok))[0];
  return shuffle([{ ...ok }, { ...w }]);
}
const numAnswers = (correct, wrongs, adapt) =>
  shuffle([correct, ...(adapt && adapt.twoOpts ? wrongs.slice(0, 1) : wrongs)]);

/* ──────────────────────────────────────────────────────
   QUESTION GENERATORS — every question carries `skill`
   (§9.1) and, for bank items, `itemId` (freshness)
────────────────────────────────────────────────────── */
function genCountQs(maxCount, adapt, n = 5) {
  const effMax = adapt && adapt.twoOpts ? Math.max(3, maxCount - 2) : maxCount;
  const counts = shuffle(Array.from({ length: effMax }, (_, i) => i + 1)).slice(0, n);
  while (counts.length < n) counts.push(rnd(1, effMax));
  return counts.map((count, i) => ({
    id: i, type: 'count', count,
    answers: numAnswers(count, wrongNums(count, 1, Math.min(effMax + 2, 10), adapt && adapt.near), adapt),
    applePos: shuffle([...APPLE_POOL]),
  }));
}

function genAdditionQs(adapt, n = 5) {
  const hi = adapt && adapt.twoOpts ? 3 : (adapt && adapt.tier >= 2 ? 5 : 4);
  return Array.from({ length: n }, (_, i) => {
    const a = rnd(1, hi), b = rnd(1, Math.min(hi, 9 - a)), sum = a + b;
    return {
      id: i, type: 'addition', a, b, count: sum,
      answers: numAnswers(sum, wrongNums(sum, 1, 10, adapt && adapt.near), adapt),
      posA: shuffle([...APPLE_POOL]).slice(0, a),
      posB: shuffle([...APPLE_POOL]).slice(0, b),
    };
  });
}

function genSubtractionQs(adapt, n = 5) {
  const hi = adapt && adapt.twoOpts ? 3 : (adapt && adapt.tier >= 2 ? 5 : 4);
  return Array.from({ length: n }, (_, i) => {
    const b = rnd(1, hi);
    const a = b + rnd(1, hi);
    const diff = a - b;
    return {
      id: i, type: 'subtraction', a, b, count: diff,
      answers: numAnswers(diff, wrongNums(diff, 0, Math.max(2, a - 1), adapt && adapt.near), adapt),
      applePos: shuffle([...APPLE_POOL]).slice(0, a),
      strikeIdx: shuffle(Array.from({ length: a }, (_, x) => x)).slice(0, b),
    };
  });
}

function genCompareQs(adapt, n = 5) {
  return Array.from({ length: n }, (_, i) => {
    let left = rnd(1, 8), right = rnd(1, 8);
    const wantGap = adapt && adapt.twoOpts ? 3 : (adapt && adapt.tier >= 2 ? 1 : 2);
    let guard = 0;
    while ((left === right || Math.abs(left - right) < wantGap) && guard++ < 40) right = rnd(1, 8);
    if (left === right) right = left === 8 ? 7 : left + 1;
    return {
      id: i, type: 'compare', left, right,
      correct: left > right ? 'left' : 'right',
      count: Math.max(left, right),
      posL: shuffle([...APPLE_POOL]).slice(0, left),
      posR: shuffle([...APPLE_POOL]).slice(0, right),
    };
  });
}

/* Pattern Complete (§4 P1): repeating shape unit, child picks what comes next.
   Keys are human-readable — they double as answer labels and read-aloud text. */
const PATTERN_SHAPES = [
  { key:'red circle',      shape:'circle', color:'coral' },
  { key:'blue square',     shape:'square', color:'sky' },
  { key:'yellow triangle', shape:'tri',    color:'sun' },
  { key:'green circle',    shape:'circle', color:'leaf' },
  { key:'purple square',   shape:'square', color:'berry' },
];
function genPatternQs(adapt, n = 5) {
  return Array.from({ length: n }, (_, i) => {
    const unitLen = (adapt && adapt.twoOpts) ? 2 : (i % 2 === 0 ? 2 : 3);   // AB / ABC
    const unit = shuffle([...PATTERN_SHAPES]).slice(0, unitLen);
    const seq = Array.from({ length: 5 }, (_, k) => unit[k % unitLen]);
    const correct = unit[5 % unitLen];
    const wrongs = shuffle(PATTERN_SHAPES.filter(p => p.key !== correct.key))
      .slice(0, (adapt && adapt.twoOpts) ? 1 : 2);
    return { id:i, type:'pattern', seq, correct:correct.key, opts:shuffle([correct, ...wrongs]) };
  });
}

/* Matching Pairs (§4 P1): each question is a 3×2 memory board of word+picture
   pairs. The board resolves itself; 'done' answers the question when all pairs
   are found — mismatches flip back gently and never cost hearts (§3.5). */
function genPairsQs(adapt, recent, n = 5) {
  const picks = pickBank(WORDPIC_BANK, Math.min(3 * n, WORDPIC_BANK.length), adapt, recent);
  return Array.from({ length: n }, (_, i) => {
    const mine = [0, 1, 2].map(k => picks[(i * 3 + k) % picks.length]);
    const pairs = mine.map(p => ({ w:p.word, e:(p.opts.find(o => o.ok) || {}).e, pid:p.id }));
    return { id:i, type:'pairs', deck:shuffle(pairs.flatMap(p => [{ ...p }, { ...p }])),
             correct:'done', itemId:mine[0] && mine[0].id };
  });
}

/* Rhythm Tap (§4 P2, music world): watch-then-echo. Notes fall onto 4 pads in
   sequence, then the child taps the same beat back — deterministic and gentle
   for ages 5–7 (no real-time timing windows). */
const RHYTHM_LANES = [
  { name:'drum',   icon:'🥁', color:'rose' },
  { name:'bell',   icon:'🔔', color:'sun' },
  { name:'guitar', icon:'🎸', color:'leaf' },
  { name:'piano',  icon:'🎹', color:'sky' },
];
function genRhythmQs(cfg, adapt, n = 5) {
  const len = Math.max(2, ((cfg && cfg.patternLen) || 3) - (adapt && adapt.twoOpts ? 1 : 0));
  return Array.from({ length: n }, (_, i) => ({
    id:i, type:'rhythm', correct:'done',
    pattern: Array.from({ length: len }, () => rnd(0, 3)),
  }));
}

/* Word Builder (§4 P2, words stage 4): assemble the word from letter tiles,
   picture clue alongside. Board resolves itself; 'done' = built correctly. */
function genWordBuildQs(adapt, recent, n = 5) {
  const AZ = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const picks = pickBank(WORDPIC_BANK, Math.min(n, WORDPIC_BANK.length), adapt, recent);
  return Array.from({ length: n }, (_, i) => {
    const p = picks[i % picks.length];
    const word = p.word.toUpperCase();
    const extras = [];
    while (extras.length < (adapt && adapt.twoOpts ? 1 : 2)) {
      const ch = AZ[rnd(0, 25)];
      if (!word.includes(ch) && !extras.includes(ch)) extras.push(ch);
    }
    return { id:i, type:'wordbuild', word, correctLabel:word,
      emoji:(p.opts.find(o => o.ok) || {}).e,
      tiles:shuffle([...word.split(''), ...extras]), correct:'done', itemId:p.id };
  });
}

/* Lifecycle timeline (§4 P2, science stage 5): drag 4 stage cards into order */
function genLifeOrderQs(adapt, recent, n = 5) {
  return Array.from({ length: n }, (_, i) => {
    const s = LIFECYCLE_SEQS[i % LIFECYCLE_SEQS.length];
    return { id:i, type:'lifeorder', topic:s.topic, prompt:s.q, stages:s.stages,
      deal:shuffle(s.stages.map((_, k) => k)), correct:'done', itemId:s.id,
      correctLabel:s.stages.map(x => x.l).join(' → ') };
  });
}

/* Letter tracing (§4 P2, words stage 2): tap/drag through the dots of each
   stroke in order; per-stroke stars; Skip advances without penalty. */
function genTraceQs(adapt, recent, n = 5) {
  return pickBank(TRACE_BANK, Math.min(n, TRACE_BANK.length), adapt, recent)
    .concat(pickBank(TRACE_BANK, n, adapt, []))    // pad if the bank is small
    .slice(0, n)
    .map((t, i) => {
      const ph = PHONICS_BANK.find(p => p.letter === t.letter);
      const ok = ph && ph.opts.find(o => o.ok);
      return { id:i, type:'trace', letter:t.letter, strokes:t.strokes,
        word:(ok && ok.w) || t.letter, emoji:(ok && ok.e) || '✏️',
        correct:'done', itemId:t.id };
    });
}

function genPhonicsQs(adapt, recent, n = 5) {
  return pickBank(PHONICS_BANK, n, adapt, recent).map((p, i) => ({
    id: i, type: 'phonics', letter: p.letter, itemId: p.id,
    opts: capOpts(p.opts, adapt),
    correct: p.opts.find(o => o.ok).w,
  }));
}

function genWordPicQs(adapt, recent, n = 5) {
  return pickBank(WORDPIC_BANK, n, adapt, recent).map((p, i) => ({
    id: i, type: 'wordpic', word: p.word, itemId: p.id,
    opts: capOpts(p.opts, adapt),
    correct: p.opts.find(o => o.ok).e,
  }));
}

function genLivingQs(adapt, recent, n = 5) {
  return pickBank(LIVING_BANK, n, adapt, recent).map((p, i) => ({
    id: i, type: 'living', emoji: p.e, label: p.l, correct: p.cat, itemId: p.id,
    skill: 'science.living_nonliving', instruction: 'Is it living or non-living?',
  }));
}

function genSizeQs(adapt, recent, n = 5) {
  return pickBank(SIZE_BANK, n, adapt, recent).map((p, i) => ({
    id: i, type: 'size', emoji: p.e, label: p.l, correct: p.cat, itemId: p.id,
    skill: 'science.size', instruction: 'Is it BIG or small?',
  }));
}

/* Science stage 1: mixed sorting — 3 living/non-living + 2 big/small,
   per-question instructions */
function genLivingSizeMixQs(adapt, recent) {
  return shuffle([...genLivingQs(adapt, recent, 3), ...genSizeQs(adapt, recent, 2)])
    .map((q, i) => ({ ...q, id: i }));
}

function genSinkFloatQs(adapt, recent, n = 5) {
  return pickBank(SINK_FLOAT_BANK, n, adapt, recent).map((p, i) => ({
    id: i, type: 'sinkfloat', emoji: p.e, label: p.l, itemId: p.id,
    correct: p.sinks ? 'sink' : 'float',
  }));
}

function genHotColdQs(adapt, recent, n = 5) {
  return pickBank(HOT_COLD_BANK, n, adapt, recent).map((p, i) => ({
    id: i, type: 'hotcold', emoji: p.e, label: p.l, itemId: p.id,
    correct: p.hot ? 'hot' : 'cold',
  }));
}

function genHabitatQs(adapt, recent, n = 5) {
  return pickBank(HABITAT_BANK, n, adapt, recent).map((p, i) => {
    let habs = [p.h, ...p.w];
    if (adapt && adapt.twoOpts) habs = [p.h, p.w[0]];
    const opts = shuffle(habs).map(h => ({ hab: h, ...HABITATS[h] }));
    return { id: i, type: 'habitat', emoji: p.e, label: p.l, correct: p.h, opts, itemId: p.id };
  });
}

function genLifecycleQs(adapt, recent, n = 5) {
  return pickBank(LIFECYCLE_BANK, n, adapt, recent).map((p, i) => {
    let pool = [p.next, ...p.wrong];
    if (adapt && adapt.twoOpts) pool = [p.next, p.wrong[0]];
    return { id: i, type: 'lifecycle', stage: p.stage, label: p.label, topic: p.topic,
             correct: p.next.l, opts: shuffle(pool), itemId: p.id };
  });
}

function generateQuestions(subject, stageIndex, ctx) {
  const cfg = STAGE_CONFIGS[subject] && STAGE_CONFIGS[subject][stageIndex];
  let adapt = getAdaptive(ctx, cfg && cfg.skill);
  if (ctx && ctx.remediate) adapt = { tier:1, near:false, twoOpts:true };   // §8.4 step-down
  const recent = (ctx && ctx.recentItems) || [];
  let qs;
  switch (cfg && cfg.type) {
    case 'count':       qs = genCountQs(cfg.maxCount || 9, adapt); break;
    case 'addition':    qs = genAdditionQs(adapt); break;
    case 'subtraction': qs = genSubtractionQs(adapt); break;
    case 'compare':     qs = genCompareQs(adapt); break;
    case 'pattern':     qs = genPatternQs(adapt); break;
    case 'pairs':       qs = genPairsQs(adapt, recent); break;
    case 'phonics':     qs = genPhonicsQs(adapt, recent); break;
    case 'wordpic':     qs = genWordPicQs(adapt, recent); break;
    case 'living':      qs = genLivingQs(adapt, recent); break;
    case 'size':        qs = genSizeQs(adapt, recent); break;
    case 'livingmix':   qs = genLivingSizeMixQs(adapt, recent); break;
    case 'sinkfloat':   qs = genSinkFloatQs(adapt, recent); break;
    case 'hotcold':     qs = genHotColdQs(adapt, recent); break;
    case 'habitat':     qs = genHabitatQs(adapt, recent); break;
    case 'lifecycle':   qs = genLifecycleQs(adapt, recent); break;
    case 'rhythm':      qs = genRhythmQs(cfg, adapt); break;
    case 'wordbuild':   qs = genWordBuildQs(adapt, recent); break;
    case 'trace':       qs = genTraceQs(adapt, recent); break;
    case 'lifeorder':   qs = genLifeOrderQs(adapt, recent); break;
    default:            qs = genCountQs(5, adapt);
  }
  return qs.map(q => ({ ...q, skill: q.skill || (cfg && cfg.skill) }));
}

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
const NODE_COUNT = 5;
const CUR_WORLD = 0;   /* v1 ships world 1; the schema is multi-world from day one (§3.2, D2) */

function makeProgress() {
  return Object.fromEntries(SUBJECTS.map(s => [
    s.id,
    { worlds: [ { nodes: Array.from({length: NODE_COUNT}, (_, i) => ({ status: i === 0 ? 'current' : 'locked', stars: 0 })) } ] }
  ]));
}
const getNodes = (progress, subject) =>
  ((progress[subject] && progress[subject].worlds && progress[subject].worlds[CUR_WORLD]) || {}).nodes || [];
const setNodes = (progress, subject, nodes) => ({
  ...progress,
  [subject]: { ...progress[subject],
    worlds: progress[subject].worlds.map((w, i) => i === CUR_WORLD ? { ...w, nodes } : w) },
});

const newId = () => (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
  : 'p-' + Date.now() + '-' + Math.floor(Math.random() * 1e6);
const blankProfile = () => ({ name:'', age:6, avatarColor:'leaf', avatarAccessory:'none',
  coins:0, stars:0, streak:0, lastPlayDate:null, lastBonusDate:null, owned:[] });

/* v2 progress { subj:{nodes} } → v3 { subj:{worlds:[{nodes}]} } */
const wrapWorlds = prog => {
  const out = {};
  for (const k in (prog || {})) out[k] = prog[k].worlds ? prog[k] : { worlds: [{ nodes: prog[k].nodes || [] }] };
  const fresh = makeProgress();
  for (const s of SUBJECTS) if (!out[s.id]) out[s.id] = fresh[s.id];
  return out;
};

/* Storage v3 (§12): { version, activeProfileId, settings, profiles:[{id, profile,
   progress, skills, events, recentItems, session}] }. A v2 save migrates into
   profiles[0]; the old bloom-v2 key stays untouched as a backup (§22.2). */
function loadStore() {
  try {
    const v3 = JSON.parse(localStorage.getItem('bloom-v3') || 'null');
    if (v3 && v3.profiles && v3.profiles.length) return v3;
  } catch {}
  try {
    const v2 = JSON.parse(localStorage.getItem('bloom-v2') || 'null');
    if (v2 && v2.profile) {
      const id = newId();
      return { version:3, activeProfileId:id,
        settings: v2.settings || { readAloud:true, sfx:true },
        profiles: [{ id, profile: { ...blankProfile(), ...v2.profile },
          progress: wrapWorlds(v2.progress), skills:{}, events:[], recentItems:[],
          session: v2.session || null }] };
    }
  } catch {}
  return null;
}

/* The persistent profile list with the active profile's live state overlaid */
function composeProfiles(s) {
  if (!s.activeProfileId) return s.roster || [];
  const snap = { id: s.activeProfileId, profile: s.profile, progress: s.progress,
    skills: s.skills, events: s.events, recentItems: s.recentItems,
    session: (s.screen === 'activity' && s.session &&
              s.session.qIdx < s.session.questions.length) ? s.session : null };
  const roster = s.roster || [];
  return roster.some(p => p.id === s.activeProfileId)
    ? roster.map(p => p.id === s.activeProfileId ? snap : p)
    : [...roster, snap];
}
function doSave(s) {
  try {
    if (!s.activeProfileId) return;
    localStorage.setItem('bloom-v3', JSON.stringify({
      version: 3, activeProfileId: s.activeProfileId,
      settings: s.settings, profiles: composeProfiles(s),
    }));
  } catch {}
}

/* Local event log (§13.1): profile-scoped, no PII, 90-day raw retention, hard cap */
function logEv(events, t, data) {
  const cut = Date.now() - 90 * 86400000;
  return [...(events || []).filter(e => e.ts > cut).slice(-1999), { t, ts: Date.now(), ...(data || {}) }];
}
/* Per-skill tracking (§9.1): attempts, correct, rolling last-20 window */
function bumpSkill(skills, skillId, ok) {
  if (!skillId) return skills;
  const cur = skills[skillId] || { attempts: 0, correct: 0, recent: [], lastPlayed: null };
  return { ...skills, [skillId]: {
    attempts: cur.attempts + 1, correct: cur.correct + (ok ? 1 : 0),
    recent: [...cur.recent, ok ? 1 : 0].slice(-20), lastPlayed: todayStr() } };
}

const store = loadStore();
const activeP = store ? (store.profiles.find(p => p.id === store.activeProfileId) || store.profiles[0]) : null;
const resumable = (activeP && activeP.session &&
  activeP.session.qIdx < ((activeP.session.questions || []).length)) ? activeP.session : null;
const INIT = {
  /* >1 child on the device → kid-friendly profile picker (§12) */
  screen: !store ? 'splash' : (store.profiles.length > 1 ? 'picker' : 'map'),
  activeProfileId: activeP ? activeP.id : null,
  roster: store ? store.profiles : [],
  profile: activeP ? activeP.profile : blankProfile(),
  progress: activeP ? wrapWorlds(activeP.progress) : makeProgress(),
  skills: (activeP && activeP.skills) || {},
  events: (activeP && activeP.events) || [],
  recentItems: (activeP && activeP.recentItems) || [],
  settings: (store && store.settings) || { readAloud:true, sfx:true },
  subject: (resumable && resumable.subject) || 'math',
  session: null,      // { subject, stageIndex, questions, qIdx, mistakes, qMistakes, isReplay, startTs, usedIds }
  feedback: null,     // { ok:bool, chosen, correct }
  replayStage: null,  // set when replaying a completed stage
  pendingResume: (store && store.profiles.length > 1) ? null : resumable,
  dailyBonus: false,
  showParentGate: false,
  showParentDash: false,
  onboard: { step:0, selSubjects:['math','words','science'] },
};
speechOn = INIT.settings.readAloud;

/* Synthesized SFX (§4 P1) — audio-manager.jsx. Failure-safe: the game must be
   fully playable with audio unavailable (§17.1-9), so every call swallows. */
const SFX = (name, arg) => {
  try { const m = window.AudioMgr; if (m && m[name]) Promise.resolve(m[name](arg)).catch(()=>{}); } catch {}
};
const syncMute = (settings) => {
  try { window.AudioMgr && window.AudioMgr.setMute(settings.sfx === false); } catch {}
};
syncMute(INIT.settings);

/* Streak rules: streak-day = any completed stage on a local calendar date.
   1 missed day = quiet "rest day" (streak survives); 2+ missed = silent reset.
   Clock moved backward never revokes anything — anomalies resolve in the child's favor. */
function updateStreak(profile) {
  const today = todayStr();
  const last = profile.lastPlayDate;
  if (!last)              return { ...profile, streak: Math.max(1, profile.streak||0), lastPlayDate: today };
  const diff = dayDiff(last, today);
  if (diff <= 0)          return profile;                                        // same day or clock rolled back
  if (diff <= 2)          return { ...profile, streak: (profile.streak||0)+1, lastPlayDate: today };
  return { ...profile, streak: 1, lastPlayDate: today };
}

/* Load a profile's data into live state (used by picker + dashboard switch) */
function activateProfile(s, p) {
  const resume = (p.session && p.session.qIdx < ((p.session.questions || []).length)) ? p.session : null;
  return { ...s, activeProfileId: p.id, profile: p.profile, progress: wrapWorlds(p.progress),
    skills: p.skills || {}, events: p.events || [], recentItems: p.recentItems || [],
    session: null, feedback: null, replayStage: null, pendingResume: resume,
    subject: (resume && resume.subject) || 'math', dailyBonus: false,
    screen: 'map', showParentDash: false, showParentGate: false };
}

function reducer(s, a) {
  switch (a.type) {
    case 'NAV': {
      const quitting = s.screen==='activity' && a.screen==='map' &&
        s.session && s.session.qIdx < s.session.questions.length;
      return { ...s, screen:a.screen, feedback:null,
        events: quitting ? logEv(s.events,'stage_quit',
          { subject:s.subject, stageIndex:s.session.stageIndex, qIdx:s.session.qIdx }) : s.events,
        replayStage: a.screen==='map' ? null : s.replayStage };
    }
    case 'REPLAY_STAGE': return { ...s, screen:'intro', subject:a.subject,
                                  replayStage:a.stageIndex, feedback:null };
    case 'NEXT_STAGE':   return { ...s, screen:'map', feedback:null, replayStage:null };
    case 'SET_NAME':return { ...s, activeProfileId: s.activeProfileId || newId(),
                             profile:{...s.profile, name:a.v} };
    case 'SET_AGE': return { ...s, profile:{...s.profile, age:a.v} };
    case 'SET_COLOR':return{ ...s, profile:{...s.profile, avatarColor:a.v} };
    case 'SET_ACC': return { ...s, profile:{...s.profile, avatarAccessory:a.v} };
    case 'TOGGLE_SUB': {
      const sel = s.onboard.selSubjects;
      const next = sel.includes(a.id)
        ? sel.length > 2 ? sel.filter(x=>x!==a.id) : sel
        : [...sel, a.id];
      return { ...s, onboard:{...s.onboard, selSubjects:next} };
    }
    case 'OB_NEXT': return { ...s, onboard:{...s.onboard, step:s.onboard.step+1},
                             events: logEv(s.events,'onboarding_step',{ step:s.onboard.step+1 }) };
    case 'SET_SUBJECT': return { ...s, subject:a.v };
    case 'PARENT_GATE': return { ...s, showParentGate:a.v };
    case 'PARENT_DASH': return { ...s, showParentDash:a.v, showParentGate:false };
    case 'SET_SETTING': {
      const settings = { ...s.settings, [a.key]: a.v };
      if (a.key === 'readAloud') { speechOn = a.v; if (!a.v) stopSpeech(); }
      if (a.key === 'sfx') syncMute(settings);
      return { ...s, settings, events: logEv(s.events,'settings_changed',{ key:a.key, value:a.v }) };
    }

    /* Daily hello bonus: +10 flat coins, at most once per calendar date, never multiplied
       by consecutive days. String compare guards against a backward-moved clock. */
    case 'DAILY_BONUS': {
      const today = todayStr();
      const last = s.profile.lastBonusDate;
      if (last && last >= today) return s;
      return { ...s, dailyBonus:true,
        profile:{ ...s.profile, coins:s.profile.coins+10, lastBonusDate:today } };
    }
    case 'DISMISS_BONUS': return { ...s, dailyBonus:false };

    /* Pip's Shop (§4 P1): buy with coins then wear immediately; ownership is
       per-profile and permanent. Ignores buys that can't be afforded. */
    case 'SHOP_BUY': {
      const it = SHOP_ITEMS.find(x => x.id === a.id);
      const owned = s.profile.owned || [];
      if (!it || owned.includes(it.id) || s.profile.coins < it.price) return s;
      return { ...s,
        profile: { ...s.profile, coins: s.profile.coins - it.price,
          owned: [...owned, it.id], avatarAccessory: it.id },
        events: logEv(s.events, 'shop_buy', { id: it.id, price: it.price }) };
    }
    case 'SHOP_WEAR': {
      if (a.id !== 'none' && !(s.profile.owned || []).includes(a.id)) return s;
      return { ...s, profile: { ...s.profile, avatarAccessory: a.id } };
    }

    /* Interruption resume: restore the exact question with mistake counts intact */
    case 'RESUME': return { ...s, screen:'activity', subject:s.pendingResume.subject,
      session:s.pendingResume, pendingResume:null, feedback:null };
    case 'DISCARD_RESUME': return { ...s, pendingResume:null };

    /* Try Again re-presents the SAME question (qMistakes intact so the 2nd
       mistake reveals the answer) — it must never advance the set. */
    case 'RETRY': return { ...s, feedback:null };

    /* ── Multi-profile actions (§12) — rename/delete are parent-gated in the UI ── */
    case 'NEW_PROFILE': {
      const roster = composeProfiles(s);
      if (roster.length >= 4) return s;
      return { ...s, roster, activeProfileId:newId(), profile:blankProfile(),
        progress:makeProgress(), skills:{}, events:[], recentItems:[],
        session:null, feedback:null, pendingResume:null, replayStage:null, dailyBonus:false,
        screen:'welcome', onboard:{ step:0, selSubjects:['math','words','science'] } };
    }
    case 'SWITCH_PROFILE': {
      const roster = composeProfiles(s);
      const p = roster.find(x=>x.id===a.id);
      if (!p) return s;
      const ns = activateProfile({ ...s, roster }, p);
      doSave(ns); return ns;
    }
    case 'RENAME_PROFILE': {
      const roster = composeProfiles(s).map(p=>p.id===a.id ? { ...p, profile:{ ...p.profile, name:a.name } } : p);
      const ns = { ...s, roster,
        profile: a.id===s.activeProfileId ? { ...s.profile, name:a.name } : s.profile };
      doSave(ns); return ns;
    }
    case 'DELETE_PROFILE': {
      const roster = composeProfiles(s).filter(p=>p.id!==a.id);
      if (a.id !== s.activeProfileId) { const ns = { ...s, roster }; doSave(ns); return ns; }
      if (!roster.length) {
        try { localStorage.removeItem('bloom-v3'); localStorage.removeItem('bloom-v2'); } catch {}
        return { ...s, roster:[], activeProfileId:null, profile:blankProfile(), progress:makeProgress(),
          skills:{}, events:[], recentItems:[], session:null, pendingResume:null,
          screen:'splash', showParentDash:false };
      }
      const ns = activateProfile({ ...s, roster }, roster[0]);
      doSave(ns); return ns;
    }

    case 'START': {
      const isReplay  = s.replayStage !== null && s.replayStage !== undefined;
      const curIdx    = getNodes(s.progress, a.subject).findIndex(n=>n.status==='current');
      const stageIndex = isReplay ? s.replayStage : (curIdx < 0 ? 0 : curIdx);
      /* §8.4: two consecutive 1-star finishes → the game silently gets gentler
         on the next attempt (easier tier, far distractors, 2 choices). */
      const node = getNodes(s.progress, a.subject)[stageIndex];
      const remediate = !!(node && (node.oneStar || 0) >= 2);
      const questions  = generateQuestions(a.subject, stageIndex,
        { age:s.profile.age, skills:s.skills, recentItems:s.recentItems, remediate });
      return { ...s, screen:'activity', subject:a.subject, feedback:null, replayStage:null,
        events: logEv(s.events,'stage_start',{ subject:a.subject, stageIndex, remediate }),
        session:{ subject:a.subject, stageIndex, questions, qIdx:0, mistakes:0, qMistakes:0,
          isReplay, startTs:Date.now(),
          usedIds:questions.map(q=>q.itemId).filter(Boolean) } };
    }

    case 'ANSWER': {
      const { session } = s;
      const q = session.questions[session.qIdx];
      const ok = a.chosen === q.correct || a.chosen === q.count ||
                 (q.type==='compare' && a.chosen === q.correct) ||
                 (q.type==='living'  && a.chosen === q.correct) ||
                 (q.type==='size'    && a.chosen === q.correct) ||
                 (q.type==='phonics' && a.chosen === q.correct) ||
                 (q.type==='wordpic' && a.chosen === q.correct);
      let events = logEv(s.events,'question_answered',
        { skill:q.skill, correct:ok, attemptNo:session.qMistakes+1 });
      if (!ok && session.qMistakes+1 >= 2) events = logEv(events,'answer_revealed',{ skill:q.skill });
      return {
        ...s,
        skills: bumpSkill(s.skills, q.skill, ok),
        events,
        session:{ ...session, mistakes: ok?session.mistakes:session.mistakes+1,
                              qMistakes: ok?session.qMistakes:session.qMistakes+1 },
        /* reveal shows correctLabel when set; 'done'-style boards suppress it
           (replaying the board IS the reveal) */
        feedback:{ ok, chosen:a.chosen,
          correct: q.correctLabel ?? (q.correct === 'done' ? null : q.correct) ?? q.count },
      };
    }

    case 'NEXT_Q': {
      const { session } = s;
      /* §8.4/§5: a missed question is re-queued once at the end of the set for
         another go. Requeued copies never requeue again (hard cap 2× per set). */
      const cur = session.questions[session.qIdx];
      const questions = (session.qMistakes > 0 && !cur.requeued)
        ? [...session.questions, { ...cur, requeued:true, id:session.questions.length }]
        : session.questions;
      const nextIdx = session.qIdx + 1;
      if (nextIdx >= questions.length) {
        const earned = session.mistakes===0?3:session.mistakes<=2?2:1;
        const coinsEarned = earned*5 + 10;
        const nodes = [...getNodes(s.progress, s.subject)];
        /* §8.4: oneStar tracks consecutive 1-star finishes of a node — two in a
           row makes the next attempt use the easier tier. Any better run resets. */
        if (session.isReplay) {
          // Replay: update stars only if improved; preserve node statuses
          const ri = session.stageIndex;
          if (nodes[ri]) {
            nodes[ri] = { ...nodes[ri],
              stars: earned > (nodes[ri].stars||0) ? earned : nodes[ri].stars,
              oneStar: earned === 1 ? (nodes[ri].oneStar||0) + 1 : 0 };
          }
        } else {
          const ci = nodes.findIndex(n=>n.status==='current');
          if (ci !== -1) {
            nodes[ci] = { status:'done', stars:earned,
              oneStar: earned === 1 ? (nodes[ci].oneStar||0) + 1 : 0 };
            if (ci+1 < nodes.length) nodes[ci+1] = { status:'current', stars:0 };
          }
        }
        const ns = {
          ...s, screen:'cleared', feedback:null,
          session:{ ...session, qIdx:nextIdx, earnedStars:earned, earnedCoins:coinsEarned },
          progress: setNodes(s.progress, s.subject, nodes),
          profile: updateStreak({ ...s.profile, stars:s.profile.stars+earned, coins:s.profile.coins+coinsEarned }),
          events: logEv(s.events,'stage_complete',{ subject:s.subject, stageIndex:session.stageIndex,
            stars:earned, mistakes:session.mistakes,
            durationSec: session.startTs ? Math.round((Date.now()-session.startTs)/1000) : 0 }),
          recentItems: [...(session.usedIds||[]), ...s.recentItems].slice(0, 24),
        };
        doSave(ns); return ns;
      }
      return { ...s, screen:'activity', feedback:null,
        session:{ ...session, questions, qIdx:nextIdx, qMistakes:0 } };
    }

    default: return s;
  }
}

/* ═══════════════════════════════════════════════════════
   UI KIT
═══════════════════════════════════════════════════════ */
function Pip({ size=180, color='leaf', mood='happy', wave=false, arms=false, feet=true, style }) {
  const bodyColor = {leaf:'var(--leaf)',berry:'var(--berry)',sky:'var(--sky)',coral:'var(--coral)',sun:'var(--sun)'}[color]||'var(--leaf)';
  return (
    <div className={`pip ${mood}${wave?' wave':''}`}
         style={{'--pip-size':size+'px','--pip-body':bodyColor,...style}}>
      {feet&&<><div className="foot left"/><div className="foot right"/></>}
      <div className="sprout"/><div className="leaf-blade"/>
      <div className="body"/><div className="belly"/>
      {arms&&!wave&&<div className="arm left"/>}
      {(arms||wave)&&<div className="arm right"/>}
      <div className="eye left"/><div className="eye right"/>
      <div className="cheek left"/><div className="cheek right"/>
      <div className="mouth"/>
    </div>
  );
}

function Btn({ children, color='coral', size='md', onClick, disabled, style }) {
  return (
    <button className={`btn${color!=='coral'?' '+color:''} ${size==='big'?'big':''}`}
      onClick={e=>{ SFX('tap'); onClick&&onClick(e); }} disabled={disabled} style={style}>{children}</button>
  );
}

function IconBtn({ children, onClick, style }) {
  return <button className="icon-btn" onClick={e=>{ SFX('tap'); onClick&&onClick(e); }} style={style}>{children}</button>;
}

function Chip({ icon='coin', value, style }) {
  return <div className="chip" style={style}><span className={icon}/><span>{value}</span></div>;
}

function ProgressBar({ value=0.5, color='leaf' }) {
  const fill = {leaf:'var(--leaf)',coral:'var(--coral)',sky:'var(--sky)'}[color]||'var(--leaf)';
  return (
    <div className="bar">
      <i style={{width:(value*100)+'%',background:`linear-gradient(180deg,${fill},${fill}dd)`}}/>
    </div>
  );
}

function Stars({ count=3, total=3, size=60 }) {
  return (
    <div style={{display:'flex',gap:10}}>
      {Array.from({length:total},(_,i)=>(
        <span key={i} className={i<count?'star':'star empty'} style={{width:size,height:size}}/>
      ))}
    </div>
  );
}

function Sun({ size=80, style }) {
  return (
    <div style={{width:size,height:size,position:'relative',...style}}>
      <div style={{position:'absolute',inset:'18%',borderRadius:'50%',background:'var(--sun)',boxShadow:'inset 0 -8px 0 var(--sun-dark)'}}/>
      {Array.from({length:8}).map((_,i)=>(
        <div key={i} style={{position:'absolute',left:'47%',top:'2%',width:'6%',height:'18%',
          background:'var(--sun-dark)',borderRadius:6,transform:`rotate(${i*45}deg)`,transformOrigin:'50% 240%'}}/>
      ))}
    </div>
  );
}

/* Apple component — size in px */
function Apple({ size=50, style, crossed=false }) {
  return (
    <div style={{width:size,height:size,position:'relative',...style}}>

/* ═══════════════════════════════════════════════════════

const GATE_QS = [
  { q:'What is 7 × 4?', opts:[24,28,32], ans:28 },
  { q:'What is 6 × 6?', opts:[34,36,38], ans:36 },
  { q:'What is 8 × 3?', opts:[22,24,26], ans:24 },
  { q:'What is 5 × 7?', opts:[30,35,40], ans:35 },
];

function ParentGateModal({ dispatch }) {
  const [gq] = useState(() => pick(GATE_QS));
  const [chosen, setChosen] = useState(null);

  const pick2 = (v) => {
    setChosen(v);
    if (v === gq.ans) {
      setTimeout(()=>dispatch({type:'PARENT_DASH',v:true}), 600);
    }
  };

  return (
    <div className="modal-overlay" onClick={()=>dispatch({type:'PARENT_GATE',v:false})}>
      <div className="modal-card" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:42}}>🔐</div>
        <div className="display" style={{fontSize:26,color:'var(--ink)'}}>Grown-ups only</div>
        <div style={{fontSize:17,color:'var(--ink-soft)',fontWeight:700,lineHeight:1.4,maxWidth:380}}>
          {gq.q}
        </div>
        <div style={{display:'flex',gap:16,marginTop:8}}>
          {gq.opts.map(o=>(
            <button key={o} onClick={()=>pick2(o)}
              style={{
                width:80,height:80,borderRadius:22,border:'3px solid',
                fontFamily:'Fredoka',fontWeight:700,fontSize:28,cursor:'pointer',
                borderColor: chosen===null?'var(--cream-200)': o===gq.ans?'var(--leaf)': chosen===o?'var(--rose)':'var(--cream-200)',
                background: chosen===null?'#fff': o===gq.ans?'var(--leaf)': chosen===o?'var(--rose)':'#fff',
                color: (chosen!==null&&(o===gq.ans||chosen===o))?'#fff':'var(--ink)',
                transition:'all .2s',
              }}>{o}</button>
          ))}
        </div>
        <div style={{fontSize:13,color:'var(--ink-quiet)',fontWeight:700,marginTop:4}}>
          No ads · No chat · COPPA compliant
        </div>
        <button onClick={()=>dispatch({type:'PARENT_GATE',v:false})}
          style={{background:'none',border:'none',color:'var(--ink-quiet)',cursor:'pointer',fontWeight:800,fontSize:15,marginTop:4}}>
          ← Back to game
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   PARENT DASHBOARD
═══════════════════════════════════════════════════════ */
/* Progress arrives worlds-wrapped (v3); flatten for stats. */
const nodesOf = p => p?.worlds ? p.worlds.flatMap(w => w.nodes) : (p?.nodes || []);

function ParentDashboard({ dispatch, profile, progress, settings }) {
  const [limitOn, setLimitOn] = useState(false);
  const fileRef = useRef(null);

  const exportSave = () => {
    const data = localStorage.getItem('bloom-v3') || localStorage.getItem('bloom-v2') || '{}';
    const blob = new Blob([data], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bloom-backup-' + todayStr() + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
  };
  const importSave = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data && data.profiles && data.profiles.length) {          // v3 backup
          localStorage.setItem('bloom-v3', JSON.stringify(data));
        } else if (data && data.profile && data.progress) {           // v2 backup
          localStorage.setItem('bloom-v2', JSON.stringify(data));
          localStorage.removeItem('bloom-v3');                        // let migration re-run
        } else throw new Error('bad file');
        location.reload();
      } catch { alert("That file doesn't look like a Bloom backup."); }
    };
    reader.readAsText(file);
  };

  // Simulate weekly play data
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const playMins = [12,0,20,8,15,25,10];
  const maxMins = Math.max(...playMins, 1);

  // Progress per subject
  const subjectProgress = SUBJECTS.filter(s=>!s.locked).map(s=>{
    const nodes = nodesOf(progress[s.id]);
    const done = nodes.filter(n=>n.status==='done').length;
    return { ...s, pct: Math.round(done/NODE_COUNT*100) };
  });

  return (
    <div className="screen" style={{background:'#F7F3EE'}}>
      {/* header */}
      <div style={{background:'#fff',borderBottom:'2px solid var(--cream-100)',
        padding:'18px 32px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:44,height:44,borderRadius:'50%',background:`var(--${profile.avatarColor||'leaf'})`,
            display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Pip size={34} color={profile.avatarColor||'leaf'} feet={false}/>
          </div>
          <div>
            <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:20,color:'var(--ink)'}}>
              {profile.name||'Your child'}'s Progress
            </div>
            <div style={{fontSize:13,color:'var(--ink-quiet)',fontWeight:700}}>Parent Dashboard</div>
          </div>
        </div>
        <div style={{display:'flex',gap:14,alignItems:'center'}}>
          <div style={{fontSize:13,color:'var(--ink-soft)',fontWeight:800}}>🔒 Secure area</div>
          <Btn color="ghost" onClick={()=>dispatch({type:'PARENT_DASH',v:false})}>← Back to Game</Btn>
        </div>
      </div>

      <div style={{padding:'24px 32px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:24,height:'calc(100% - 82px)',overflow:'auto'}}>
        {/* Stats row */}
        <div style={{gridColumn:'1/-1',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
          {[
            {icon:'⏱',label:'Today',value:'25 min'},
            {icon:'⭐',label:'Total Stars',value:profile.stars},
            {icon:'🏆',label:'Stages Done',value: Object.values(progress).flatMap(nodesOf).filter(n=>n.status==='done').length},
            {icon:'🔥',label:'Streak',value:profile.streak+' days'},
          ].map((s,i)=>(
            <div key={i} className="stat-card">
              <div style={{fontSize:28}}>{s.icon}</div>
              <div style={{fontFamily:'Fredoka',fontWeight:700,fontSize:30,color:'var(--ink)',marginTop:4}}>{s.value}</div>
              <div style={{fontSize:12,color:'var(--ink-quiet)',fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',marginTop:2}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Weekly chart */}
        <div className="pd-card">
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:16}}>📅 Weekly Play Time</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:10,height:100}}>
            {days.map((d,i)=>(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{width:'100%',background: i===6?'var(--coral)':'var(--sky)',
                  height: (playMins[i]/maxMins*80)+'px',borderRadius:'6px 6px 0 0',
                  boxShadow:i===6?'0 3px 0 var(--coral-dark)':'0 3px 0 var(--sky-dark)',
                  minHeight:4,transition:'height .6s ease'}}/>
                <div style={{fontSize:11,fontWeight:800,color:'var(--ink-soft)'}}>{d}</div>
                <div style={{fontSize:10,color:'var(--ink-quiet)',fontWeight:700}}>{playMins[i]?playMins[i]+'m':'-'}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Subject progress */}
        <div className="pd-card">
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--ink)',marginBottom:16}}>📊 Subject Progress</div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {subjectProgress.map(s=>(
              <div key={s.id}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                  <div style={{fontWeight:800,fontSize:15,color:'var(--ink)'}}>{s.icon} {s.label}</div>
                  <div style={{fontWeight:900,fontSize:15,color:'var(--ink-soft)'}}>{s.pct}%</div>
                </div>
                <div className="pd-bar-bg">
                  <div className="pd-bar-fill" style={{width:s.pct+'%',background:s.color}}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Settings */}
        <div className="pd-card" style={{gridColumn:'1/-1'}}>

              {label:'Sound Effects', sub:'In-game audio feedback', state:settings.sfx, set:v=>dispatch({type:'SET_SETTING',key:'sfx',v}), color:'var(--leaf)'},
            ].map((s,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                background:'var(--cream-50)',borderRadius:16,padding:'16px 20px'}}>
                <div>
                  <div style={{fontWeight:800,fontSize:15,color:'var(--ink)'}}>{s.label}</div>
                  <div style={{fontSize:12,color:'var(--ink-quiet)',fontWeight:700,marginTop:2}}>{s.sub}</div>
                </div>
                <div onClick={()=>s.set(!s.state)} style={{
                  width:56,height:32,borderRadius:999,cursor:'pointer',
                  background:s.state?s.color:'var(--cream-200)',transition:'background .2s',
                  position:'relative',flexShrink:0,
                }}>
                  <div style={{position:'absolute',top:4,width:24,height:24,borderRadius:'50%',
                    background:'#fff',boxShadow:'0 2px 4px rgba(0,0,0,.2)',

const NODE_PATH = [[16,70],[32,50],[50,34],[68,50],[84,28]];

function MapScreen({ dispatch, profile, progress, subject, dailyBonus }) {
  const subj = SUBJECTS.find(s=>s.id===subject);
  const nodes = getNodes(progress, subject);
  const curIdx = nodes.findIndex(n=>n.status==='current');

  /* Daily hello bonus — reducer guards one-per-calendar-date */
  useEffect(()=>{ dispatch({type:'DAILY_BONUS'}); },[]);
  useEffect(()=>{
    if(!dailyBonus) return;
    SFX('coin');
    speak(`Good to see you, ${profile.name||'friend'}! Here are ten coins!`);
    const t = setTimeout(()=>dispatch({type:'DISMISS_BONUS'}), 4500);
    return ()=>clearTimeout(t);
  },[dailyBonus]);
  const bgMap = {
    math:    'linear-gradient(180deg,#FFE08A 0%,#FFB45C 55%,#E8A040 100%)',
    words:   'linear-gradient(180deg,#DCEFFB 0%,#B8E0F5 45%,#90CCEA 100%)',
    science: 'linear-gradient(180deg,#EDF9F0 0%,#C8E6A4 55%,#A8D88A 100%)',
    music:   'radial-gradient(ellipse at 50% 30%,#6B4794 0%,#3E2A5C 100%)',
  };
  return (
    <div className="screen">
      <div style={{position:'absolute',inset:0,background:bgMap[subject]||bgMap.math}}/>
      {subject!=='music'&&<>
        <div className="cloud" style={{width:55,height:55,top:70,left:140,position:'absolute'}}/>
        <div className="cloud" style={{width:75,height:75,top:110,left:460,position:'absolute'}}/>
        <div className="cloud" style={{width:60,height:60,top:60,right:200,position:'absolute'}}/>
        <Sun size={90} style={{position:'absolute',top:48,right:80}}/>
      </>}
      <div className="hill" style={{width:320,height:200,bottom:-60,left:-40,position:'absolute'}}/>
      <div className="hill" style={{width:380,height:220,bottom:-80,right:-80,opacity:.4,position:'absolute'}}/>

      {/* SVG winding path */}
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}
           viewBox="0 0 1024 720" preserveAspectRatio="none">
        {NODE_PATH.map(([x,y],i)=>{
          if (!i) return null;
          const [px,py]=NODE_PATH[i-1];
          return (
            <g key={i}>
              <line x1={px*10.24} y1={py*7.2} x2={x*10.24} y2={y*7.2}
                stroke="#FFF7E8" strokeWidth="40" strokeLinecap="round"/>
              <line x1={px*10.24} y1={py*7.2} x2={x*10.24} y2={y*7.2}
                stroke="rgba(226,164,27,.5)" strokeWidth="7" strokeLinecap="round"
                strokeDasharray="18 14"/>
            </g>
          );
        })}
      </svg>

      {/* Level nodes */}
      {nodes.map((node,i)=>{
        const [xp,yp]=NODE_PATH[i]||[50,50];
        const isCur=node.status==='current';
        return (
          <div key={i} className={`node ${node.status}`}
            style={{left:`${xp}%`,top:`${yp}%`,
              cursor:(isCur||node.status==='done')?'pointer':'default'}}
            onClick={()=>{
              if(isCur) dispatch({type:'NAV',screen:'intro'});
              else if(node.status==='done') dispatch({type:'REPLAY_STAGE',subject,stageIndex:i});
            }}>
            {node.status==='current'&&(
              <div style={{position:'absolute',top:-54,left:'50%',transform:'translateX(-50%)'}}>
                <div className="pip-bob">
                  <Pip size={42} color={profile.avatarColor||'leaf'} mood="happy" feet={false}/>
                </div>
              </div>
            )}
            {node.status==='done'&&node.stars>0&&(
              <div style={{position:'absolute',bottom:-24,left:'50%',transform:'translateX(-50%)',display:'flex',gap:2}}>
                {Array.from({length:3},(_,si)=>(
                  <span key={si} className={si<node.stars?'star':'star empty'} style={{width:14,height:14}}/>
                ))}
              </div>
            )}
            {node.status!=='done'&&<span className="num">{i+1}</span>}
          </div>
        );
      })}

      {/* Top bar */}
      <div style={{position:'absolute',top:18,left:0,right:0,padding:'0 24px',
        display:'flex',justifyContent:'space-between',alignItems:'center',zIndex:5}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:56,height:56,borderRadius:'50%',

            <Pip size={40} color={profile.avatarColor||'leaf'} feet={false}/>
            {shopIcon(profile.avatarAccessory)&&<span style={{position:'absolute',top:-12,
              left:'50%',transform:'translateX(-50%) rotate(-8deg)',fontSize:22}}>
              {shopIcon(profile.avatarAccessory)}</span>}
          </div>
          <div>
            <div className="display" style={{fontSize:20,color:subject==='music'?'#fff':'var(--ink)'}}>{profile.name||'Friend'}</div>
            <div style={{fontSize:12,color:subject==='music'?'rgba(255,255,255,.7)':'var(--ink-quiet)',fontWeight:700}}>
              ⭐ {profile.stars} stars
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <Chip icon="coin" value={profile.coins}/>
          <IconBtn onClick={()=>dispatch({type:'NAV',screen:'shop'})}>🛍️</IconBtn>
          <IconBtn onClick={()=>dispatch({type:'NAV',screen:'settings'})}>⚙️</IconBtn>

      </div>

      {/* World label */}
      <div style={{position:'absolute',bottom:76,left:24}}>

          display:'inline-flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:22}}>{subj?.icon}</span>
          <div>
            <div className="display" style={{fontSize:18,color:'var(--ink)'}}>{subj?.label} World</div>
            <div style={{fontSize:11,color:'var(--ink-quiet)',fontWeight:800}}>
              Stage {Math.max(1,curIdx+1)} of {NODE_COUNT}
            </div>
          </div>
        </div>
      </div>

      {/* Subject switcher tabs */}
      <div style={{position:'absolute',bottom:0,left:0,right:0,
        display:'flex',justifyContent:'center',gap:10,padding:'12px 24px',
        background:'linear-gradient(180deg,transparent,rgba(255,255,255,.8))'}}>
        {SUBJECTS.map(s=>{
          const locked = subjLocked(s, profile);
          return (
          <div key={s.id} onClick={()=>locked
              ? dispatch({type:'NAV',screen:'musicLocked'})
              : dispatch({type:'SET_SUBJECT',v:s.id})}
            style={{
              padding:'9px 20px',borderRadius:999,cursor:'pointer',
              background:subject===s.id?s.color:'rgba(255,255,255,.88)',
              color:subject===s.id?'#fff':'var(--ink)',
              fontFamily:'Fredoka',fontWeight:600,fontSize:16,

function ScienceSortView({ q, feedback, onAnswer }) {

  const dnd = useDragTile((tileId, dropId) => { if (!feedback) onAnswer(dropId); });
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:20,width:'100%'}}>
      <div style={{textAlign:'center'}} {...dnd.tileProps('item')}>
        <div style={{fontSize:96,lineHeight:1,filter:'drop-shadow(0 6px 12px rgba(0,0,0,.18))',
          cursor:'grab',touchAction:'none',
          opacity:dnd.drag&&dnd.drag.moved?0.3:1}}>{q.emoji}</div>
        <div className="display" style={{fontSize:32,color:'var(--ink)',marginTop:8}}>{q.label}</div>
      </div>
      {dnd.drag&&dnd.drag.moved&&(
        <div style={{position:'fixed',left:dnd.drag.x-40,top:dnd.drag.y-48,fontSize:80,zIndex:99,
          pointerEvents:'none',filter:'drop-shadow(0 6px 12px rgba(0,0,0,.25))'}}>{q.emoji}</div>
      )}
      <div style={{display:'flex',gap:20,width:'100%',maxWidth:580}}>
        {zones.map((z,i)=>{
          let base='sort-zone';
          let extraStyle={background:z.bg,border:`3px solid ${z.border}`,borderRadius:28,
            cursor:'pointer',flex:1,minHeight:140,display:'flex',flexDirection:'column',
            alignItems:'center',justifyContent:'center',gap:8,transition:'transform .12s'};
          if(feedback){
            if(z.cat===q.correct){extraStyle={...extraStyle,background:'#E8F6E8',border:'4px solid var(--leaf)',transform:'scale(1.04)'};}
            else if(z.cat===feedback.chosen){extraStyle={...extraStyle,background:'#FFE8E8',border:'4px solid var(--coral)'};}
          }
          return (
            <div key={i} style={extraStyle} data-drop={z.cat} onClick={()=>!feedback&&onAnswer(z.cat)}>
              <div style={{fontSize:52}}>{z.icon}</div>
              <div className="display" style={{fontSize:26,color:'var(--ink)',textAlign:'center'}}>{z.label}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── Rhythm Tap (§4 P2): watch the notes fall, then echo the beat ── */
function RhythmView({ q, feedback, onAnswer }) {
  const [phase, setPhase] = useState('watch');   // 'watch' | 'play'
  const [watchIdx, setWatchIdx] = useState(-1);  // note being shown during watch
  const [tapIdx, setTapIdx] = useState(0);       // echo progress
  const [combo, setCombo] = useState(0);
  const [hit, setHit] = useState(null);          // { lane, txt: 'Good!'|'Perfect!' }
  const lastTap = useRef(0);
  const timers = useRef([]);

  useEffect(()=>{                                // (re)play the pattern on new question or retry
    if (feedback) return;
    timers.current.forEach(clearTimeout); timers.current = [];
    setPhase('watch'); setWatchIdx(-1); setTapIdx(0); setHit(null);
    q.pattern.forEach((lane, i) => {
      timers.current.push(setTimeout(()=>{ setWatchIdx(i); SFX('note', lane); }, 500 + i*550));
    });
    timers.current.push(setTimeout(()=>{ setWatchIdx(-1); setPhase('play'); },
      500 + q.pattern.length*550 + 250));
    return ()=>timers.current.forEach(clearTimeout);
  },[q.id, feedback]);

  const tap = (lane) => {
    if (phase !== 'play' || feedback) return;
    SFX('note', lane);
    if (lane === q.pattern[tapIdx]) {
      const now = Date.now();
      setHit({ lane, txt: now - lastTap.current < 1200 ? 'Perfect!' : 'Good!' });
      lastTap.current = now;
      setCombo(c=>c+1);
      timers.current.push(setTimeout(()=>setHit(null), 700));
      const next = tapIdx + 1;
      setTapIdx(next);
      if (next === q.pattern.length) timers.current.push(setTimeout(()=>onAnswer('done'), 400));
    } else {
      setCombo(0);
      onAnswer(RHYTHM_LANES[lane].name);         // ≠ 'done' → gentle retry, pattern replays
    }
  };

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,
      width:'min(720px,96%)',height:'100%'}}>
      <div style={{display:'flex',gap:12,alignItems:'center'}}>
        <div style={{padding:'6px 16px',borderRadius:999,background:'rgba(255,255,255,.15)',
          color:'#fff',fontFamily:'Fredoka',fontWeight:700,fontSize:16}}>
          {phase==='watch'?'Watch the notes…':'Your turn!'}
        </div>
        <div style={{padding:'6px 14px',borderRadius:999,background:'rgba(255,255,255,.12)',
          color:'#fff',fontFamily:'Fredoka',fontWeight:600,fontSize:15,
          display:'flex',gap:6,alignItems:'center'}}>
          <span>🎯</span><span>×{combo} combo</span>
        </div>
        <div style={{padding:'6px 14px',borderRadius:999,background:'rgba(255,255,255,.12)',
          color:'#fff',fontWeight:800,fontSize:14}}>
          Beat {Math.min(tapIdx, q.pattern.length)} / {q.pattern.length}
        </div>
      </div>

      {/* falling-note zone */}
      <div style={{flex:1,width:'100%',position:'relative',minHeight:90}}>
        {watchIdx>=0&&(
          <div key={watchIdx} className="note-fall" style={{position:'absolute',
            left:`calc(${q.pattern[watchIdx]*25}% + 12.5% - 30px)`,
            width:60,height:60,borderRadius:'50%',
            background:`var(--${RHYTHM_LANES[q.pattern[watchIdx]].color})`,
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:26,color:'rgba(255,255,255,.9)',boxShadow:'0 6px 0 rgba(0,0,0,.25)'}}>♪</div>
        )}
        {hit&&(
          <div style={{position:'absolute',bottom:4,width:100,textAlign:'center',
            left:`calc(${hit.lane*25}% + 12.5% - 50px)`}}>
            <span style={{display:'inline-block',background:hit.txt==='Perfect!'?'#FFD25E':'#fff',
              color:'var(--ink)',fontFamily:'Fredoka',fontWeight:700,fontSize:15,
              padding:'3px 12px',borderRadius:999}}>{hit.txt}</span>
          </div>
        )}
      </div>

      {/* tap pads — disabled while the pattern plays */}
      <div style={{width:'100%',display:'grid',gridTemplateColumns:'repeat(4,1fr)',
        gap:16,paddingBottom:14}}>
        {RHYTHM_LANES.map((l,i)=>{
          const lit = phase==='watch' && watchIdx>=0 && q.pattern[watchIdx]===i;
          return (
            <button key={l.name} className="rhythm-pad" aria-label={`${l.name} pad`}
              disabled={phase!=='play'||!!feedback} onClick={()=>tap(i)}
              style={{height:96,borderRadius:20,border:'none',
                background:`var(--${l.color})`,cursor:phase==='play'?'pointer':'default',
                opacity:phase==='watch'&&!lit?0.45:1,
                transform:lit?'scale(1.06)':'scale(1)',transition:'all .12s',
                boxShadow:lit?'0 0 0 4px rgba(255,255,255,.6), 0 6px 0 rgba(0,0,0,.3)'
                             :'0 6px 0 rgba(0,0,0,.3)',
                display:'flex',flexDirection:'column',alignItems:'center',
                justifyContent:'center',fontSize:30,color:'#fff'}}>
              <span>{l.icon}</span>
              <span style={{fontFamily:'Fredoka',fontWeight:700,fontSize:14}}>{l.name}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ── Drag with tap fallback (§4 P2 / §10.3 motor accessibility) ──
   Tiles can be dragged onto any [data-drop] target via pointer events, OR
   tapped to pick up and tapped again on the target to place. Both paths call
   onDrop(tileId, dropId). */
function useDragTile(onDrop) {
  const [sel, setSel] = useState(null);      // tile picked up by tap
  const [drag, setDrag] = useState(null);    // { id, x, y, moved } while dragging
  const dragRef = useRef(null);
  const start = (id) => (e) => {
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch {}
    dragRef.current = { id, x:e.clientX, y:e.clientY, moved:false };
    setDrag(dragRef.current);
  };
  const move = (e) => {
    const d = dragRef.current; if (!d) return;
    dragRef.current = { ...d, x:e.clientX, y:e.clientY,
      moved: d.moved || Math.abs(e.clientX - d.x) + Math.abs(e.clientY - d.y) > 6 };
    setDrag(dragRef.current);
  };
  const end = (e) => {
    const d = dragRef.current;
    dragRef.current = null; setDrag(null);
    if (!d) return;
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const zone = el && el.closest && el.closest('[data-drop]');
    if (d.moved && zone) { onDrop(d.id, zone.getAttribute('data-drop')); setSel(null); }
    else if (!d.moved) setSel(s => s === d.id ? null : d.id);
  };
  const place = (dropId) => { if (sel !== null) { onDrop(sel, dropId); setSel(null); } };
  const tileProps = (id) => ({ onPointerDown:start(id), onPointerMove:move, onPointerUp:end });
  return { sel, drag, place, tileProps };
}

/* ── Letter tracing (§4 P2, words stage 2) ── */
function TraceView({ q, feedback, onAnswer }) {
  const [strokeIdx, setStrokeIdx] = useState(0);
  const [dotIdx, setDotIdx] = useState(0);
  useEffect(()=>{ setStrokeIdx(0); setDotIdx(0); },[q.id]);

  const dots = ([[x1,y1],[x2,y2]]) => [
    [x1,y1], [(x1+x2)/2,(y1+y2)/2], [x2,y2],
  ];
  const doneAll = strokeIdx >= q.strokes.length;
  const tapDot = () => {
    if (feedback || doneAll) return;
    SFX('tap');
    if (dotIdx + 1 < 3) { setDotIdx(dotIdx + 1); return; }
    SFX('starPop');                              // stroke complete
    const next = strokeIdx + 1;
    setStrokeIdx(next); setDotIdx(0);
    if (next >= q.strokes.length) setTimeout(()=>onAnswer('done'), 400);
  };

  return (
    <div style={{display:'flex',gap:28,alignItems:'stretch',justifyContent:'center',
      width:'100%',height:'100%',padding:'0 10px 14px'}}>
      {/* tracing canvas */}
      <div style={{position:'relative',background:'#fff',borderRadius:28,flex:'0 1 480px',
        boxShadow:'inset 0 0 0 2px var(--cream-200)',overflow:'hidden'}}>
        {[20,50,80].map(p=>(
          <div key={p} style={{position:'absolute',left:0,right:0,top:`${p}%`,
            borderTop:'2px dashed var(--cream-200)'}}/>
        ))}
        <svg viewBox="0 0 400 440" style={{position:'absolute',inset:0,width:'100%',height:'100%'}}>
          {q.strokes.map((s,i)=>{
            const [[x1,y1],[x2,y2]] = s;
            if (i < strokeIdx)                    // traced
              return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} pointerEvents="none"
                stroke="var(--coral)" strokeWidth="34" strokeLinecap="round"/>;
            const ghost = <line key={'g'+i} x1={x1} y1={y1} x2={x2} y2={y2} pointerEvents="none"
              stroke="var(--cream-200)" strokeWidth="34" strokeLinecap="round"
              strokeDasharray="6 14"/>;
            if (i !== strokeIdx) return ghost;
            const pts = dots(s);
            const [px,py] = pts[Math.max(0,dotIdx)];
            return (

function ShapeGlyph({ shape, color, size = 80 }) {
  const c = `var(--${color})`, d = `var(--${color}-dark)`;
  if (shape === 'circle') return <div style={{width:size,height:size,borderRadius:'50%',background:c,boxShadow:`0 5px 0 ${d}`}}/>;
  if (shape === 'square') return <div style={{width:size,height:size,borderRadius:size*0.2,background:c,boxShadow:`0 5px 0 ${d}`}}/>;
  return <div style={{width:0,height:0,borderLeft:`${size/2}px solid transparent`,
    borderRight:`${size/2}px solid transparent`,borderBottom:`${size*0.9}px solid ${c}`,
    filter:`drop-shadow(0 5px 0 ${d})`}}/>;
}

/* ── Matching Pairs (§4 P1): 3×2 memory board with tap counter ── */
function PairsView({ q, feedback, onAnswer }) {
  const [flipped, setFlipped] = useState([]);   // deck indices face-up, unmatched
  const [matched, setMatched] = useState([]);   // matched pair ids
  const [taps, setTaps] = useState(0);
  useEffect(()=>{ setFlipped([]); setMatched([]); setTaps(0); },[q.id]);

  const tap = (i) => {
    if (feedback || flipped.length === 2) return;
    const card = q.deck[i];
    if (matched.includes(card.pid) || flipped.includes(i)) return;
    setTaps(t=>t+1);
    const now = [...flipped, i];
    setFlipped(now);
    if (now.length === 2) {
      const [a,b] = now.map(x=>q.deck[x]);
      if (a.pid === b.pid) {
        const m = [...matched, a.pid];
        setMatched(m); setFlipped([]);
        SFX('starPop'); speak(a.w, true);
        if (m.length === 3) setTimeout(()=>onAnswer('done'), 400);
      } else {
        setTimeout(()=>setFlipped([]), 800);   // gentle flip-back, no hearts lost (§3.5)
      }
    }
  };

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,width:'100%',height:'100%'}}>
      <div style={{display:'flex',gap:12,alignItems:'center'}}>
        <div style={{padding:'6px 16px',borderRadius:999,background:'rgba(255,255,255,.85)',
          fontFamily:'Fredoka',fontWeight:700,fontSize:15,color:'var(--ink-soft)'}}>
          {matched.length} / 3 pairs matched
        </div>
        <div style={{padding:'6px 16px',borderRadius:999,background:'var(--sun)',
          display:'flex',gap:6,alignItems:'center',fontFamily:'Fredoka',fontWeight:700,
          fontSize:15,color:'var(--ink)'}}>
          <span>👆</span><span>{taps} taps</span>
        </div>
      </div>
      <div style={{flex:1,width:'min(680px,94%)',display:'grid',
        gridTemplateColumns:'repeat(3,1fr)',gridTemplateRows:'repeat(2,1fr)',gap:18,paddingBottom:16}}>
        {q.deck.map((c,i)=>{
          const isMatched = matched.includes(c.pid);
          const isUp = isMatched || flipped.includes(i);
          return (
            <button key={i} className="pair-card" onClick={()=>tap(i)}
              aria-label={isUp ? c.w : 'hidden card'}
              style={isUp ? {
                background:'#fff',borderRadius:24,border:'none',position:'relative',
                cursor:isMatched?'default':'pointer',
                boxShadow:isMatched?'0 0 0 4px var(--leaf), 0 6px 0 var(--leaf-dark)'
                                   :'0 6px 0 rgba(61,40,24,0.12)',
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,
              } : {
                background:'var(--berry)',borderRadius:24,border:'none',cursor:'pointer',
                boxShadow:'0 6px 0 var(--berry-dark)',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:44,color:'#fff',fontFamily:'Fredoka',fontWeight:700,
              }}>
              {isUp ? (<>
                {isMatched&&<div style={{position:'absolute',top:-8,right:-8,width:32,height:32,
                  borderRadius:'50%',background:'var(--leaf)',display:'flex',alignItems:'center',
                  justifyContent:'center',color:'#fff',fontWeight:900,fontSize:16,
                  boxShadow:'0 3px 0 var(--leaf-dark)'}}>✓</div>}
                <div style={{fontSize:52}}>{c.e}</div>
                <div className="display" style={{fontSize:18,color:'var(--ink)'}}>{c.w}</div>
              </>) : '?'}
            </button>
          );
        })}
      </div>
    </div>
  );
}

        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════ */
/* Interruption resume: kid-friendly Keep going / Start over choice */
function ResumeModal({ dispatch, pendingResume, profile }) {
  const subj = SUBJECTS.find(s=>s.id===pendingResume.subject);
  useEffect(()=>{ speak('Welcome back! Want to keep going?'); },[]);
  return (
    <div className="modal-overlay">
      <div className="modal-card pop-in">
        <div className="pip-bob"><Pip size={120} color={profile.avatarColor||'leaf'} mood="happy" wave/></div>
        <div className="display" style={{fontSize:34,color:'var(--ink)'}}>Welcome back! 🌱</div>
        <div style={{fontSize:16,color:'var(--ink-soft)',fontWeight:700}}>
          You were on {subj?.icon} question {pendingResume.qIdx+1} of {pendingResume.questions.length}
        </div>
        <div style={{display:'flex',gap:14,marginTop:8}}>
          <Btn color="leaf" size="big" onClick={()=>dispatch({type:'RESUME'})}>Keep going! →</Btn>
          <Btn color="sky" onClick={()=>dispatch({type:'DISCARD_RESUME'})}>Start over</Btn>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [state, dispatch] = useReducer(reducer, INIT);
  const { screen, profile, progress, subject, session, feedback, replayStage,
          pendingResume, dailyBonus, showParentGate, showParentDash, onboard } = state;

  useEffect(()=>{
    if(!['splash','welcome','avatar','plan'].includes(screen)) doSave(state);
  },[state]);
  useEffect(()=>{ stopSpeech(); },[screen]);
  /* §10.4 accessibility modes — body classes drive CSS overrides */
  useEffect(()=>{
    document.body.classList.toggle('reduced-motion', !!state.settings.reducedMotion);
    document.body.classList.toggle('calm', !!state.settings.calm);
    document.body.classList.toggle('lefty', !!state.settings.lefty);
  },[state.settings]);

  if(showParentDash) return <ParentDashboard dispatch={dispatch} profile={profile} progress={progress} settings={state.settings}/>;
  if(showParentGate) return <ParentGateModal dispatch={dispatch}/>;

  const main = (()=>{ switch(screen){
    case 'splash':   return <SplashScreen      dispatch={dispatch} profile={profile}/>;
    case 'welcome':  return <WelcomeScreen     dispatch={dispatch} profile={profile}/>;
    case 'avatar':   return <AvatarScreen      dispatch={dispatch} profile={profile}/>;
    case 'plan':     return <PlanScreen        dispatch={dispatch} profile={profile} onboard={onboard}/>;
    case 'map':      return <MapScreen         dispatch={dispatch} profile={profile} progress={progress} subject={subject} dailyBonus={dailyBonus}/>;
    case 'intro':    return <LessonIntroScreen dispatch={dispatch} profile={profile} progress={progress} subject={subject} replayStage={replayStage}/>;
    case 'activity': return <ActivityScreen    dispatch={dispatch} profile={profile} session={session} feedback={feedback}/>;
    case 'cleared':  return <StageClearedScreen dispatch={dispatch} session={session} profile={profile}/>;
    case 'shop':     return <ShopScreen         dispatch={dispatch} profile={profile}/>;
    case 'settings': return <KidSettingsScreen  dispatch={dispatch} settings={state.settings}/>;
    case 'musicLocked': return <MusicLockedScreen dispatch={dispatch} profile={profile}/>;
    default:         return <SplashScreen      dispatch={dispatch} profile={profile}/>;
  }})();

  return (<>
    {main}
    {pendingResume && screen==='map' && <ResumeModal dispatch={dispatch} pendingResume={pendingResume} profile={profile}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
