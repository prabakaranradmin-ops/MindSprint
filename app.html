<div id="rotate-prompt">
  <div class="rotate-icon">📱</div>
  <div class="rotate-title">Turn your phone sideways!</div>
  <div class="rotate-hint">Bloom Academy is easier to play in landscape — rotate your device to start.</div>
</div>
<div id="root">
  <!-- Loading state (§4 P2): shown while Babel compiles the app, replaced on mount -->
  <div class="boot">
    <div class="boot-pip"><div class="boot-sprout"></div></div>
    <div class="boot-title">Bopplebee</div>
    <div class="boot-bar"><div class="boot-fill"></div></div>
    <div class="boot-hint">Growing your garden…</div>
  </div>
</div>
<script>
/* §2 offline-first / D3 hosted-PWA beta: registers the service worker so the
   game installs to the home screen and every asset above is cache-first.
   Failure-safe — an unsupported/blocked SW must never prevent the game from
   loading and playing normally (§17.1-7 full offline session). */
(function registerServiceWorker() {
  try {
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        /* A cache-first SW (by design, for full offline play) otherwise
           means a phone that visited before a fix shipped keeps serving the
           old cached app.html indefinitely — the new SW installs in the
           background but only takes over once it does, and a plain reload
           doesn't wait for that. controllerchange also fires on every
           first-ever install in a browser that had no SW before (including
           every fresh Playwright test context), so it's only safe to
           auto-reload when a controller was ALREADY active before this load
           — i.e. an existing install is being replaced by a newer one, not
           a brand-new install with nothing to refresh away from. Guarded by
           sessionStorage too, so an update mid-session can't loop-reload a
           child out of an activity more than once. */
        const hadController = !!navigator.serviceWorker.controller;
        navigator.serviceWorker.register('sw.js').catch(() => {});
        if (hadController) {
          let refreshed = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshed || sessionStorage.getItem('__sw_refreshed')) return;
            refreshed = true;
            sessionStorage.setItem('__sw_refreshed', '1');
            window.location.reload();
          });
        }
      });
    }
  } catch {}
})();

/* §mobile-fit: computes how far to shrink the fixed 1024x720 .app-frame so
   it fits the real viewport (see the .app-frame comment in <style> for why
   this can't be a pure-CSS transform:scale(min(...)) expression). Runs
   immediately (not just on 'load') so the boot screen itself is scaled too,
   and re-runs on resize/orientationchange for rotation and split-screen. */
(function setStageScale() {
  const MOBILE_BREAKPOINT = 640;
  function apply() {
    const vw = window.innerWidth, vh = window.innerHeight;
    // Phone portrait (narrow) or phone landscape (short) both need every
    // pixel — #root's 20px/side padding only makes sense once there's
    // headroom to spare (tablet/desktop).
    const isPhoneSized = vw <= MOBILE_BREAKPOINT || vh <= 500;
    const pad = isPhoneSized ? 0 : 40;
    const scale = Math.min(1, (vw - pad) / 1024, (vh - pad) / 720);
    document.documentElement.style.setProperty('--stage-scale', String(Math.max(scale, 0.01)));
    document.getElementById('root').classList.toggle('phone-sized', isPhoneSized);
  }
  apply();
  window.addEventListener('resize', apply);
  window.addEventListener('orientationchange', apply);
})();
</script>
<script type="text/babel">
const { useState, useReducer, useEffect, useRef, useMemo } = React;

/* ═══════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════ */
/* Fisher-Yates: unbiased, and — unlike sort(() => Math.random()-0.5) — always
   consumes exactly n-1 random draws, so it reproduces deterministically under
   a seeded RNG (§17.2 unit tests). The sort-based version could silently vary
   its own call count between runs on the same input. */
const shuffle = arr => {
  const out = [...arr];
  for (let i = out.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [out[i], out[j]] = [out[j], out[i]];
  }
  return out;
};
const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const numWord = n => ['zero','one','two','three','four','five','six','seven','eight','nine','ten'][n] || n;

/* Local calendar date as YYYY-MM-DD; noon-anchored diff avoids DST edge cases */
const todayStr = () => {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
};
const dayDiff = (from, to) => Math.round((new Date(to+'T12:00:00') - new Date(from+'T12:00:00')) / 86400000);

/* Name field: letters + spaces only, max 12 chars, tiny disallow-list, friendly fallback */
const NAME_BLOCKLIST = ['poop','butt','stupid','dumb'];
const sanitizeNameInput = raw => raw.replace(/[^\p{L} ]/gu, '').slice(0, 12);
const finalizeName = raw => {
  const clean = sanitizeNameInput(raw).trim();
  if (!clean || NAME_BLOCKLIST.includes(clean.toLowerCase())) return 'Friend';
  return clean;
};

/* Read-aloud via Speech Synthesis (interim until recorded VO; phoneme audio must be sprites) */
let speechOn = true;
function speak(text, force=false) {
  try {
    if ((!speechOn && !force) || !window.speechSynthesis || !text) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/[🍎🎉⭐🌟🏆✨💫🌈🔤🖼️🤔➕➖🌱💧🔥❄️🏠🔄💪🎯]/gu,''));
    u.rate = 0.92; u.pitch = 1.15;
    window.speechSynthesis.speak(u);
  } catch {}
}
function stopSpeech(){ try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch {} }

/* ═══════════════════════════════════════════════════════
   GAME DATA
═══════════════════════════════════════════════════════ */
/* Content banks + config live in content.js (§15.1/§19.1 — data, not code) */
const C = window.BLOOM_CONTENT;

const SUBJECTS = [
  { id:'math',    label:'Numbers', icon:'🔢', color:'var(--coral)', dark:'var(--coral-dark)', locked:false },
  { id:'words',   label:'Words',   icon:'📖', color:'var(--sky)',   dark:'var(--sky-dark)',   locked:false },
  { id:'science', label:'Science', icon:'🔬', color:'var(--leaf)',  dark:'var(--leaf-dark)',  locked:false },
  { id:'music',   label:'Music',   icon:'🎵', color:'var(--berry)', dark:'var(--berry-dark)', locked:false },
];
/* Music is star-gated, not hidden: Rhythm Tap exists, so the locked state can
   honestly show progress toward the unlock (§14 no-broken-promises). */
const MUSIC_UNLOCK_STARS = C.musicUnlockStars;   // §14/§19.1: config, not code
const subjLocked = (s, profile) => s.id === 'music' && ((profile && profile.stars) || 0) < MUSIC_UNLOCK_STARS;

/* §26.6b naming gap: Middle/Senior previously showed Junior's exact subject
   labels ("Numbers"/"Words") verbatim. The design mocks used more grown-up
   names per tier (screens-h.jsx SeniorHomeScreen: "Mathematics"/"Language";
   MiddleHomeScreen: "Math"/"Reading") — naming only, no new subjects or
   content, matching §26.1's resolution to reuse the same 4 real subjects
   rather than invent banks for the mock's illustrative extras (Geography,
   Logic, History). Science and Music read the same at every tier — there's
   no more "grown-up" way to say either that isn't just a longer word for
   the same thing, so the mocks don't relabel them and neither does this. */
const TIER_SUBJECT_LABELS = {
  middle: { math:'Math', words:'Reading', science:'Science', music:'Music' },
  senior: { math:'Mathematics', words:'Language', science:'Science', music:'Music' },
};
const tierSubjectLabel = (tier, subjectId, fallback) => (TIER_SUBJECT_LABELS[tier] && TIER_SUBJECT_LABELS[tier][subjectId]) || fallback;

/* §9.3: subject to gently suggest on the map — weakest average accuracy
   (≥5 attempts, <70%), else the least recently played (not today); never the
   currently selected subject, never a locked one. */
function suggestSubject(skills, profile, current) {
  const bySubj = {};
  Object.entries(skills || {}).forEach(([id, s]) => {
    const subj = id.split('.')[0];
    const b = (bySubj[subj] = bySubj[subj] || { attempts:0, correct:0, last:null });
    b.attempts += s.attempts; b.correct += s.correct;
    if (s.lastPlayed && (!b.last || s.lastPlayed > b.last)) b.last = s.lastPlayed;
  });
  const paused = (profile && profile.pausedSubjects) || [];
  const cands = SUBJECTS.filter(s => !subjLocked(s, profile) && !paused.includes(s.id) && s.id !== current && bySubj[s.id]);
  if (!cands.length) return null;
  const weak = cands
    .filter(s => bySubj[s.id].attempts >= 5 && bySubj[s.id].correct / bySubj[s.id].attempts < 0.7)
    .sort((a, b) => bySubj[a.id].correct / bySubj[a.id].attempts
                  - bySubj[b.id].correct / bySubj[b.id].attempts)[0];
  if (weak) return weak.id;
  const stale = cands.filter(s => bySubj[s.id].last && bySubj[s.id].last < todayStr())
    .sort((a, b) => bySubj[a.id].last < bySubj[b.id].last ? -1 : 1)[0];
  return stale ? stale.id : null;
}

const STAGE_CONFIGS = C.stageConfigs;
/* §26 age-tier expansion: Middle/Senior stage lineups, kept in their own
   top-level content.js keys exactly like stageConfigsWorld2 (§3.2) — same
   "content-only, zero risk to the shipped Junior game" convention. */
const TIER_STAGE_CONFIGS = { middle: C.stageConfigsMiddle, senior: C.stageConfigsSenior };
const WORD_PROBLEMS_BANK = C.wordProblems, COMPREHENSION_BANK = C.comprehensionPassages;
const SCIENCE_QUIZ_BANK = C.scienceQuiz;
const PHONICS_BANK = C.phonics, WORDPIC_BANK = C.wordpic, LIVING_BANK = C.living,
      SIZE_BANK = C.size, SINK_FLOAT_BANK = C.sinkfloat, HOT_COLD_BANK = C.hotcold,
      HABITATS = C.habitats, HABITAT_BANK = C.habitat, LIFECYCLE_BANK = C.lifecycle,
      LIFECYCLE_SEQS = C.lifecycleSeqs, TRACE_BANK = C.traceLetters,
      SKILL_LABELS = C.skillLabels, REALWORLD_TIPS = C.realWorldTips;

/* ──────── Apple positions INSIDE the canopy ──────────
   Tree container: 440×380. Canopy: ellipse centered at
   (220,130) with rx=165,ry=120. All % of 440×380.
   Verified: each point satisfies ((x-220)/165)²+((y-130)/120)² < 0.72
─────────────────────────────────────────────────────── */
const APPLE_POOL = [
  [50,20],[36,16],[64,18],[28,30],[72,28],[50,42],[38,50],[62,46],
  [44,26],[56,33],[24,22],[76,24],[50,12],[32,40],[68,40],[46,55],
];

/* Scene variety (§15.1 P2): ≥3 fruit skins so counting/addition/subtraction/
   compare don't always look identical. Same tree geometry, different fruit
   color + stem + a small emoji fallback used in inline text ("N apples fell").
   Picked once per question at generation time — never mid-question. */
const SCENES = [
  { id:'apple',  fruit:'#E54B4B', stem:'#7B4F2C', noun:'apple',  plural:'apples',  emoji:'🍎' },
  { id:'berry',  fruit:'#8E3A6B', stem:'#5A3F22', noun:'berry',  plural:'berries', emoji:'🫐' },
  { id:'flower', fruit:'#F5A6C8', stem:'#5A8A3A', noun:'flower', plural:'flowers', emoji:'🌸' },
];
const pickScene = () => pick(SCENES);

/* ──────────────────────────────────────────────────────
   ADAPTIVE DIFFICULTY (§8.3, §9.2) — deterministic rules.
   Age seeds the baseline; rolling accuracy steps up/down.
   Changes are silent and gradual — never a visible "level down".
────────────────────────────────────────────────────── */
/* §9.2 recency decay: a skill untouched for 30+ days has its rolling accuracy
   pulled toward 0.5 (chance level — "we don't actually know anymore"),
   scaling in over the next 30 days so a skill 60+ days stale reads as fully
   due for a refresh: it can no longer step up regardless of its old record,
   and if it wasn't comfortably strong to begin with, it becomes eligible to
   step down too. This is the literal "drifts toward needing a refresh and
   becomes eligible for suggestion again" behavior the spec calls for — a
   flawless-but-forgotten skill isn't a fresh flawless skill. */
function decayAccuracy(acc, lastPlayed) {
  if (acc === null || !lastPlayed) return acc;
  const staleDays = dayDiff(lastPlayed, todayStr()) - 30;
  if (staleDays <= 0) return acc;
  const weight = Math.min(1, staleDays / 30);   // fully decayed by day 60
  return acc + (0.5 - acc) * weight;
}
function rollingAcc(skills, skillId, n) {
  const rec = skills && skills[skillId];
  const r = (rec && rec.recent) || [];
  const w = r.slice(-n);
  if (!w.length) return null;
  const acc = w.reduce((a, b) => a + b, 0) / w.length;
  return decayAccuracy(acc, rec && rec.lastPlayed);
}
function getAdaptive(ctx, skillId) {
  const age = (ctx && ctx.age) || 6;
  let tier = age >= 7 ? 2 : 1;          // age-seeded start (§9.2)
  let near = age >= 6;                  // 5-year-olds get far distractors (§8.3)
  let twoOpts = false;
  const rec = (ctx && ctx.skills && ctx.skills[skillId] && ctx.skills[skillId].recent) || [];
  const acc10 = rollingAcc(ctx && ctx.skills, skillId, 10);
  const acc15 = rollingAcc(ctx && ctx.skills, skillId, 15);
  if (rec.length >= 10 && acc10 !== null && acc10 <= 0.6) {        // step down
    tier = 1; near = false; twoOpts = true;
  } else if (rec.length >= 15 && acc15 !== null && acc15 >= 0.9) { // step up
    tier = Math.min(3, tier + 1); near = true;
  }
  return { tier, near, twoOpts };
}

/* Wrong-answer helper — near = distractors within ±1–2 (§8.3 distractor proximity) */
function wrongNums(correct, min, max, near = false, count = 2) {
  const out = new Set();
  if (near) {
    for (const d of shuffle([-1, 1, -2, 2])) {
      const n = correct + d;
      if (n >= min && n <= max && n !== correct) out.add(n);
      if (out.size >= count) break;
    }
  }
  let tries = 0;
  while (out.size < count && tries < 60) {
    const n = rnd(min, max);
    if (n !== correct && (near || max - min < 4 || Math.abs(n - correct) >= 2)) out.add(n);
    tries++;
  }
  while (out.size < count) { const n = rnd(min, max); if (n !== correct) out.add(n); }
  return [...out];
}

/* Bank picker: difficulty tiering + freshness (§15.1) — avoids items the child
   saw recently when the bank is big enough; degrades gracefully when it isn't. */
function pickBank(bank, n, adapt, recent) {
  let pool = bank;
  if (adapt && adapt.twoOpts) { const e = bank.filter(i => i.difficulty <= 1); if (e.length >= n) pool = e; }
  else if (!(adapt && adapt.tier >= 2)) { const e = bank.filter(i => i.difficulty <= 2); if (e.length >= n) pool = e; }
  if (recent && recent.length) { const f = pool.filter(i => !recent.includes(i.id)); if (f.length >= n) pool = f; }
  return shuffle([...pool]).slice(0, n);
}
/* Step-down reduces choices to 2 where the mechanic allows (§9.2) */
function capOpts(opts, adapt) {
  if (!(adapt && adapt.twoOpts)) return shuffle(opts.map(o => ({ ...o })));
  const ok = opts.find(o => o.ok);
  const w = shuffle(opts.filter(o => !o.ok))[0];
  return shuffle([{ ...ok }, { ...w }]);
}
const numAnswers = (correct, wrongs, adapt) =>
  shuffle([correct, ...(adapt && adapt.twoOpts ? wrongs.slice(0, 1) : wrongs)]);

/* ──────────────────────────────────────────────────────
   QUESTION GENERATORS — every question carries `skill`
   (§9.1) and, for bank items, `itemId` (freshness)
────────────────────────────────────────────────────── */
function genCountQs(maxCount, adapt, n = 5) {
  const effMax = adapt && adapt.twoOpts ? Math.max(3, maxCount - 2) : maxCount;
  const counts = shuffle(Array.from({ length: effMax }, (_, i) => i + 1)).slice(0, n);
  while (counts.length < n) counts.push(rnd(1, effMax));
  return counts.map((count, i) => {
    const scene = pickScene();
    return { id: i, type: 'count', count, scene,
      instruction: `How many ${scene.plural} do you see?`,
      answers: numAnswers(count, wrongNums(count, 1, Math.min(effMax + 2, 10), adapt && adapt.near), adapt),
      applePos: shuffle([...APPLE_POOL]) };
  });
}

/* §26 difficulty matrix (2026-07-22 playtest finding, Item B): Middle/Senior
   previously collapsed onto the exact same "tier>=2" branch as each other,
   so an 8-year-old and a 12-year-old got identical addition. hi/sumCap and
   the wrongNums max are now genuinely 3-way, capped by what
   AdditionBlocksView can actually render on the 1024px frame — flat
   38px+6px-gap blocks with no wrap, so ~7-8 blocks per side is the real
   ceiling before the equation row overflows, not just a difficulty choice. */
function genAdditionQs(adapt, n = 5) {
  const tier = adapt && adapt.tier;
  const hi = adapt && adapt.twoOpts ? 3 : tier === 3 ? 8 : tier === 2 ? 6 : 4;
  const sumCap = adapt && adapt.twoOpts ? 6 : tier === 3 ? 15 : tier === 2 ? 11 : 9;
  return Array.from({ length: n }, (_, i) => {
    const a = rnd(1, hi), b = rnd(1, Math.min(hi, sumCap - a)), sum = a + b;
    // Addition renders as abstract counting blocks (AdditionBlocksView, §4
    // P2 drag mechanic) — never fruit — so it does NOT get a scene skin or
    // a scene-flavored instruction; the stage's static "How many blocks
    // altogether?" instruction (content.js) always applies as-is.
    return {
      id: i, type: 'addition', a, b, count: sum,
      answers: numAnswers(sum, wrongNums(sum, 1, sumCap + 1, adapt && adapt.near), adapt),
      posA: shuffle([...APPLE_POOL]).slice(0, a),
      posB: shuffle([...APPLE_POOL]).slice(0, b),
    };
  });
}

/* §26 difficulty matrix: minuend a = b + rnd(1,hi), maxing at 2*hi, and a is
   what's actually rendered as apples on the tree (applePos, capped by
   APPLE_POOL's 16 positions) — so hi is capped at 8 for Senior (2*8=16,
   exactly the pool ceiling) rather than the larger number the raw
   difficulty target would otherwise suggest. */
function genSubtractionQs(adapt, n = 5) {
  const tier = adapt && adapt.tier;
  const hi = adapt && adapt.twoOpts ? 3 : tier === 3 ? 8 : tier === 2 ? 6 : 4;
  return Array.from({ length: n }, (_, i) => {
    const b = rnd(1, hi);
    const a = b + rnd(1, hi);
    const diff = a - b;
    return {
      id: i, type: 'subtraction', a, b, count: diff, scene: pickScene(),
      answers: numAnswers(diff, wrongNums(diff, 0, Math.max(2, a - 1), adapt && adapt.near), adapt),
      applePos: shuffle([...APPLE_POOL]).slice(0, a),
      strikeIdx: shuffle(Array.from({ length: a }, (_, x) => x)).slice(0, b),
    };
  });
}

/* §26 difficulty matrix: range now scales by tier too, not just the gap —
   Junior stayed at 1-8 (unchanged), Middle/Senior widen the field for finer
   discrimination practice. Capped at 16 (both sides independently draw a
   full APPLE_POOL copy, MiniTree's real ceiling — see genSubtractionQs). */
function genCompareQs(adapt, n = 5) {
  const tier = adapt && adapt.tier;
  const rangeMax = tier === 3 ? 16 : tier === 2 ? 16 : 8;
  return Array.from({ length: n }, (_, i) => {
    let left = rnd(1, rangeMax), right = rnd(1, rangeMax);
    const wantGap = adapt && adapt.twoOpts ? 3 : (adapt && adapt.tier >= 2 ? 1 : 2);
    let guard = 0;
    while ((left === right || Math.abs(left - right) < wantGap) && guard++ < 40) right = rnd(1, rangeMax);
    if (left === right) right = left === rangeMax ? rangeMax - 1 : left + 1;
    const scene = pickScene();
    return {
      id: i, type: 'compare', left, right, scene,
      instruction: `Tap the tree with MORE ${scene.plural}!`,
      correct: left > right ? 'left' : 'right',
      count: Math.max(left, right),
      posL: shuffle([...APPLE_POOL]).slice(0, left),
      posR: shuffle([...APPLE_POOL]).slice(0, right),
    };
  });
}

/* Pattern Complete (§4 P1): repeating shape unit, child picks what comes next.
   Keys are human-readable — they double as answer labels and read-aloud text. */
const PATTERN_SHAPES = [
  { key:'red circle',      shape:'circle', color:'coral' },
  { key:'blue square',     shape:'square', color:'sky' },
  { key:'yellow triangle', shape:'tri',    color:'sun' },
  { key:'green circle',    shape:'circle', color:'leaf' },
  { key:'purple square',   shape:'square', color:'berry' },
];
/* §26 difficulty matrix: previously ignored adapt.tier entirely (only
   twoOpts affected unit length), so Middle and Senior got the exact same
   AB/ABC patterns as Junior's own tier-2 step-up. Now genuinely 3-way on
   BOTH unit length (repeat-unit complexity) and sequence length (how much
   of the pattern is shown before the "?"). seqLen capped at 7 — PATTERN_
   SHAPES only has 5 distinct shapes and PatternView's strip is a fixed
   min(760px,94%) width, so much longer would either repeat a unit trivially
   or crowd the row. */
function genPatternQs(adapt, n = 5) {
  const tier = adapt && adapt.tier;
  return Array.from({ length: n }, (_, i) => {
    const unitLen = (adapt && adapt.twoOpts) ? 2
      : tier === 3 ? (i % 2 === 0 ? 3 : 4)
      : tier === 2 ? (i % 2 === 0 ? 2 : 3)
      : (i % 2 === 0 ? 2 : 3);                       // Junior: AB / ABC, unchanged
    const seqLen = (adapt && adapt.twoOpts) ? 5 : tier === 3 ? (i % 2 === 0 ? 6 : 7) : 5;
    const unit = shuffle([...PATTERN_SHAPES]).slice(0, unitLen);
    const seq = Array.from({ length: seqLen }, (_, k) => unit[k % unitLen]);
    const correct = unit[seqLen % unitLen];
    const wrongs = shuffle(PATTERN_SHAPES.filter(p => p.key !== correct.key))
      .slice(0, (adapt && adapt.twoOpts) ? 1 : 2);
    return { id:i, type:'pattern', seq, correct:correct.key, opts:shuffle([correct, ...wrongs]) };
  });
}

/* Matching Pairs (§4 P1): each question is a 3×2 memory board of word+picture
   pairs. The board resolves itself; 'done' answers the question when all pairs
   are found — mismatches flip back gently and never cost hearts (§3.5). */
function genPairsQs(adapt, recent, n = 5) {
  const picks = pickBank(WORDPIC_BANK, Math.min(3 * n, WORDPIC_BANK.length), adapt, recent);
  return Array.from({ length: n }, (_, i) => {
    const mine = [0, 1, 2].map(k => picks[(i * 3 + k) % picks.length]);
    const pairs = mine.map(p => ({ w:p.word, e:(p.opts.find(o => o.ok) || {}).e, pid:p.id }));
    return { id:i, type:'pairs', deck:shuffle(pairs.flatMap(p => [{ ...p }, { ...p }])),
             correct:'done', itemId:mine[0] && mine[0].id };
  });
}

/* Rhythm Tap (§4 P2, music world): watch-then-echo. Notes fall onto 4 pads in
   sequence, then the child taps the same beat back — deterministic and gentle
   for ages 5–7 (no real-time timing windows). */
const RHYTHM_LANES = [
  { name:'drum',   icon:'🥁', color:'rose' },
  { name:'bell',   icon:'🔔', color:'sun' },
  { name:'guitar', icon:'🎸', color:'leaf' },
  { name:'piano',  icon:'🎹', color:'sky' },
];
function genRhythmQs(cfg, adapt, n = 5) {
  const len = Math.max(2, ((cfg && cfg.patternLen) || 3) - (adapt && adapt.twoOpts ? 1 : 0));
  return Array.from({ length: n }, (_, i) => ({
    id:i, type:'rhythm', correct:'done',
    pattern: Array.from({ length: len }, () => rnd(0, 3)),
  }));
}

/* Word Builder (§4 P2, words stage 4): assemble the word from letter tiles,
   picture clue alongside. Board resolves itself; 'done' = built correctly. */
function genWordBuildQs(adapt, recent, n = 5) {
  const AZ = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const picks = pickBank(WORDPIC_BANK, Math.min(n, WORDPIC_BANK.length), adapt, recent);
  return Array.from({ length: n }, (_, i) => {
    const p = picks[i % picks.length];
    const word = p.word.toUpperCase();
    const extras = [];
    while (extras.length < (adapt && adapt.twoOpts ? 1 : 2)) {
      const ch = AZ[rnd(0, 25)];
      if (!word.includes(ch) && !extras.includes(ch)) extras.push(ch);
    }
    return { id:i, type:'wordbuild', word, correctLabel:word,
      emoji:(p.opts.find(o => o.ok) || {}).e,
      tiles:shuffle([...word.split(''), ...extras]), correct:'done', itemId:p.id };
  });
}

/* Lifecycle timeline (§4 P2, science stage 5): drag 4 stage cards into order */
function genLifeOrderQs(adapt, recent, n = 5) {
  return Array.from({ length: n }, (_, i) => {
    const s = LIFECYCLE_SEQS[i % LIFECYCLE_SEQS.length];
    return { id:i, type:'lifeorder', topic:s.topic, prompt:s.q, stages:s.stages,
      deal:shuffle(s.stages.map((_, k) => k)), correct:'done', itemId:s.id,
      correctLabel:s.stages.map(x => x.l).join(' → ') };
  });
}

/* Letter tracing (§4 P2, words stage 2): tap/drag through the dots of each
   stroke in order; per-stroke stars; Skip advances without penalty. */
function genTraceQs(adapt, recent, n = 5) {
  return pickBank(TRACE_BANK, Math.min(n, TRACE_BANK.length), adapt, recent)
    .concat(pickBank(TRACE_BANK, n, adapt, []))    // pad if the bank is small
    .slice(0, n)
    .map((t, i) => {
      const ph = PHONICS_BANK.find(p => p.letter === t.letter);
      const ok = ph && ph.opts.find(o => o.ok);
      return { id:i, type:'trace', letter:t.letter, strokes:t.strokes,
        word:(ok && ok.w) || t.letter, emoji:(ok && ok.e) || '✏️',
        correct:'done', itemId:t.id };
    });
}

function genPhonicsQs(adapt, recent, n = 5) {
  return pickBank(PHONICS_BANK, n, adapt, recent).map((p, i) => ({
    id: i, type: 'phonics', letter: p.letter, itemId: p.id,
    opts: capOpts(p.opts, adapt),
    correct: p.opts.find(o => o.ok).w,
  }));
}

function genWordPicQs(adapt, recent, n = 5) {
  return pickBank(WORDPIC_BANK, n, adapt, recent).map((p, i) => ({
    id: i, type: 'wordpic', word: p.word, itemId: p.id,
    opts: capOpts(p.opts, adapt),
    correct: p.opts.find(o => o.ok).e,
  }));
}

function genLivingQs(adapt, recent, n = 5) {
  return pickBank(LIVING_BANK, n, adapt, recent).map((p, i) => ({
    id: i, type: 'living', emoji: p.e, label: p.l, correct: p.cat, itemId: p.id,
    skill: 'science.living_nonliving', instruction: 'Is it living or non-living?',
  }));
}

function genSizeQs(adapt, recent, n = 5) {
  return pickBank(SIZE_BANK, n, adapt, recent).map((p, i) => ({
    id: i, type: 'size', emoji: p.e, label: p.l, correct: p.cat, itemId: p.id,
    skill: 'science.size', instruction: 'Is it BIG or small?',
  }));
}

/* Science stage 1: mixed sorting — 3 living/non-living + 2 big/small,
   per-question instructions */
function genLivingSizeMixQs(adapt, recent) {
  return shuffle([...genLivingQs(adapt, recent, 3), ...genSizeQs(adapt, recent, 2)])
    .map((q, i) => ({ ...q, id: i }));
}

function genSinkFloatQs(adapt, recent, n = 5) {
  return pickBank(SINK_FLOAT_BANK, n, adapt, recent).map((p, i) => ({
    id: i, type: 'sinkfloat', emoji: p.e, label: p.l, itemId: p.id,
    correct: p.sinks ? 'sink' : 'float',
  }));
}

function genHotColdQs(adapt, recent, n = 5) {
  return pickBank(HOT_COLD_BANK, n, adapt, recent).map((p, i) => ({
    id: i, type: 'hotcold', emoji: p.e, label: p.l, itemId: p.id,
    correct: p.hot ? 'hot' : 'cold',
  }));
}

function genHabitatQs(adapt, recent, n = 5) {
  return pickBank(HABITAT_BANK, n, adapt, recent).map((p, i) => {
    let habs = [p.h, ...p.w];
    if (adapt && adapt.twoOpts) habs = [p.h, p.w[0]];
    const opts = shuffle(habs).map(h => ({ hab: h, ...HABITATS[h] }));
    return { id: i, type: 'habitat', emoji: p.e, label: p.l, correct: p.h, opts, itemId: p.id };
  });
}

function genLifecycleQs(adapt, recent, n = 5) {
  return pickBank(LIFECYCLE_BANK, n, adapt, recent).map((p, i) => {
    let pool = [p.next, ...p.wrong];
    if (adapt && adapt.twoOpts) pool = [p.next, p.wrong[0]];
    return { id: i, type: 'lifecycle', stage: p.stage, label: p.label, topic: p.topic,
             correct: p.next.l, opts: shuffle(pool), itemId: p.id };
  });
}

/* §26 Senior/Middle typed-answer mechanic (screens-i.jsx #33). minTier/maxTier
   come from the stage config (content.js stageConfigsMiddle/Senior), not the
   Junior adaptive system — word problems are hand-authored at a fixed
   difficulty band per stage, since §9.2's rolling-accuracy tiering was
   designed around the generator-based Junior banks, not free-text answers. */
function genWordProblemQs(cfg, recent, n = 5) {
  const pool = WORD_PROBLEMS_BANK.filter(w => w.difficulty >= (cfg.minTier||1) && w.difficulty <= (cfg.maxTier||3));
  const bank = pool.length >= n ? pool : WORD_PROBLEMS_BANK;
  return pickBank(bank, Math.min(n, bank.length), null, recent).map((p, i) => ({
    id: i, type: 'wordproblem', prompt: p.prompt, unit: p.unit, correct: p.answer,
    acceptEquivalents: p.acceptEquivalents, hint: p.hint, itemId: p.id,
  }));
}

/* §26 Senior/Middle reading comprehension (screens-i.jsx #34). One passage
   per "question" in the session sense — each passage's own questions are
   answered together as one activity screen, matching the design mock
   (Q1 of 3 progress track lives INSIDE the passage, not across stage
   questions). n is ignored: a stage draws exactly 1 fresh passage. */
function genComprehensionQs(cfg, recent) {
  const pool = COMPREHENSION_BANK.filter(c => c.difficulty >= (cfg.minTier||1) && c.difficulty <= (cfg.maxTier||3));
  const bank = pool.length ? pool : COMPREHENSION_BANK;
  const passage = pickBank(bank, 1, null, recent)[0] || bank[0];
  return [{ id: 0, type: 'comprehension', title: passage.title, paragraphs: passage.paragraphs,
    questions: passage.questions, itemId: passage.id }];
}

/* §26.12/O11: real Middle/Senior science content (screenshot-verified in
   REQUIREMENTS.md §26.12) — a single multiple-choice question, no passage.
   Filters by cfg.skill FIRST, not just difficulty — SCIENCE_QUIZ_BANK holds
   7 different skill ids in one flat bank (forces_motion, weather_climate,
   matter_states, energy_transfer, ecosystems, earth_systems, plus reused
   habitats), so a "Forces & Motion" stage must only ever draw forces_motion
   items, never an ecosystems question that happens to be in the same bank. */
function genScienceQuizQs(cfg, n = 5) {
  const bySkill = SCIENCE_QUIZ_BANK.filter(q => q.skill === cfg.skill);
  const pool = bySkill.filter(q => q.difficulty >= (cfg.minTier||1) && q.difficulty <= (cfg.maxTier||3));
  const bank = pool.length ? pool : (bySkill.length ? bySkill : SCIENCE_QUIZ_BANK);
  return shuffle([...bank]).slice(0, Math.min(n, bank.length)).map((p, i) => ({
    id: i, type: 'scienceQuiz', prompt: p.prompt, opts: shuffle(p.opts.map(o=>({...o}))),
    hint: p.hint, itemId: p.id,
  }));
}

function generateQuestions(subject, stageIndex, ctx) {
  const cfg = STAGE_CONFIGS[subject] && STAGE_CONFIGS[subject][stageIndex];
  let adapt = getAdaptive(ctx, cfg && cfg.skill);
  if (ctx && ctx.remediate) adapt = { tier:1, near:false, twoOpts:true };   // §8.4 step-down
  // World-2-style content-level floor (flagged fix from §26.12): a stage can
  // carry its own minTier so it starts genuinely harder regardless of what
  // the runtime adaptive system has independently decided for this child —
  // otherwise a stage's difficulty is 100% adaptive-driven, so a "harder"
  // World 2 stage reusing a World 1 generator would only ever look harder
  // once §9.2's step-up already kicked in on its own. Never LOWERS below
  // what adaptive/remediation already decided — only raises the floor.
  if (cfg && cfg.minTier && adapt.tier < cfg.minTier) {
    adapt = { ...adapt, tier: cfg.minTier, near: true, twoOpts: false };
  }
  const recent = (ctx && ctx.recentItems) || [];
  let qs;
  switch (cfg && cfg.type) {
    case 'count':       qs = genCountQs(cfg.maxCount || 9, adapt); break;
    case 'addition':    qs = genAdditionQs(adapt); break;
    case 'subtraction': qs = genSubtractionQs(adapt); break;
    case 'compare':     qs = genCompareQs(adapt); break;
    case 'pattern':     qs = genPatternQs(adapt); break;
    case 'pairs':       qs = genPairsQs(adapt, recent); break;
    case 'phonics':     qs = genPhonicsQs(adapt, recent); break;
    case 'wordpic':     qs = genWordPicQs(adapt, recent); break;
    case 'living':      qs = genLivingQs(adapt, recent); break;
    case 'size':        qs = genSizeQs(adapt, recent); break;
    case 'livingmix':   qs = genLivingSizeMixQs(adapt, recent); break;
    case 'sinkfloat':   qs = genSinkFloatQs(adapt, recent); break;
    case 'hotcold':     qs = genHotColdQs(adapt, recent); break;
    case 'habitat':     qs = genHabitatQs(adapt, recent); break;
    case 'lifecycle':   qs = genLifecycleQs(adapt, recent); break;
    case 'rhythm':      qs = genRhythmQs(cfg, adapt); break;
    case 'wordbuild':   qs = genWordBuildQs(adapt, recent); break;
    case 'trace':       qs = genTraceQs(adapt, recent); break;
    case 'lifeorder':   qs = genLifeOrderQs(adapt, recent); break;
    default:            qs = genCountQs(5, adapt);
  }
  return qs.map(q => ({ ...q, skill: q.skill || (cfg && cfg.skill) }));
}

/* §26 Middle/Senior question generation — parallel to generateQuestions
   above, same pattern stageConfigsWorld2 already established: reuse the
   Junior generator engine and content banks, never a second engine. Adaptive
   difficulty is fixed at tier 2-3 (near distractors, full option count) since
   Middle/Senior are, by construction, past the age-seeded step-down/step-up
   window §9.2 was designed for — there is no "twoOpts" remediation state at
   these ages, matching the design mocks (no simplified/2-choice states shown
   anywhere in screens-h/i.jsx). */
function generateTierQuestions(tier, subject, stageIndex, ctx) {
  const cfg = TIER_STAGE_CONFIGS[tier][subject] && TIER_STAGE_CONFIGS[tier][subject][stageIndex];
  const adapt = { tier: tier === 'senior' ? 3 : 2, near: true, twoOpts: false };
  const recent = (ctx && ctx.recentItems) || [];
  let qs;
  switch (cfg && cfg.type) {
    case 'addition':      qs = genAdditionQs(adapt); break;
    case 'subtraction':   qs = genSubtractionQs(adapt); break;
    case 'compare':       qs = genCompareQs(adapt); break;
    case 'pattern':       qs = genPatternQs(adapt); break;
    case 'pairs':         qs = genPairsQs(adapt, recent); break;
    case 'phonics':       qs = genPhonicsQs(adapt, recent); break;
    case 'wordbuild':     qs = genWordBuildQs(adapt, recent); break;
    case 'habitat':       qs = genHabitatQs(adapt, recent); break;
    case 'lifeorder':     qs = genLifeOrderQs(adapt, recent); break;
    case 'sinkfloat':     qs = genSinkFloatQs(adapt, recent); break;
    case 'hotcold':       qs = genHotColdQs(adapt, recent); break;
    case 'livingmix':     qs = genLivingSizeMixQs(adapt, recent); break;
    case 'rhythm':        qs = genRhythmQs(cfg, adapt); break;
    case 'wordproblem':   qs = genWordProblemQs(cfg, recent); break;
    case 'comprehension': qs = genComprehensionQs(cfg, recent); break;
    case 'scienceQuiz':   qs = genScienceQuizQs(cfg); break;
    default:              qs = genAdditionQs(adapt);
  }
  return qs.map(q => ({ ...q, skill: q.skill || (cfg && cfg.skill) }));
}

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
const NODE_COUNT = 5;
const CUR_WORLD = 0;   /* v1 ships world 1; the schema is multi-world from day one (§3.2, D2) */

function makeProgress() {
  return Object.fromEntries(SUBJECTS.map(s => [
    s.id,
    { worlds: [ { nodes: Array.from({length: NODE_COUNT}, (_, i) => ({ status: i === 0 ? 'current' : 'locked', stars: 0 })) } ] }
  ]));
}
const getNodes = (progress, subject) =>
  ((progress[subject] && progress[subject].worlds && progress[subject].worlds[CUR_WORLD]) || {}).nodes || [];
const setNodes = (progress, subject, nodes) => ({
  ...progress,
  [subject]: { ...progress[subject],
    worlds: progress[subject].worlds.map((w, i) => i === CUR_WORLD ? { ...w, nodes } : w) },
});

const newId = () => (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
  : 'p-' + Date.now() + '-' + Math.floor(Math.random() * 1e6);

/* §26.1 age-tier expansion (REQUIREMENTS §26, decision O8): tier is a pure
   function of profile.age — no separate tier picker, matches screens-i.jsx
   AgeTierSelectScreen. Junior (existing 5-7 experience) is untouched by any
   of this; Middle/Senior are additive. */
function tierOf(age) {
  if (age >= 10) return 'senior';
  if (age >= 8)  return 'middle';
  return 'junior';
}
/* Level is always DERIVED from lifetime xp via content.js's flat xpPerLevel
   curve — never stored separately, so it can't drift out of sync with xp. */
function levelFromXp(xp) {
  return Math.floor((xp || 0) / C.xpPerLevel) + 1;
}
const blankProfile = () => ({ name:'', age:6, avatarColor:'leaf', avatarAccessory:'none',
  coins:0, stars:0, streak:0, lastPlayDate:null, lastBonusDate:null, owned:[],
  /* §26.4: XP/level is a SEPARATE currency from coins/stars, not a
     replacement — both persist across a tier change so nothing a child
     already earned is ever lost (§14 progress-is-additive, extended to all
     tiers by §26.3). xp is total lifetime XP; level is derived from it via
     content.js's xpPerLevel, never stored redundantly out of sync. */
  xp:0,
  /* §26.6 achievements (O9): persistent, monotonic badge-tracking fields —
     deliberately NOT derived from the event log (logEv caps at 2000 events /
     90 days), since a badge must never un-earn itself as old events age out
     (§14 progress-is-additive). */
  tierQuestionsAnswered:0, tierPerfectSets:0, tierHadFastSet:false, tierSubjectsPlayed:[],
  pausedSubjects:[], affordNoticed:[], onboarded:false });

/* v2 progress { subj:{nodes} } → v3 { subj:{worlds:[{nodes}]} } */
const wrapWorlds = prog => {
  const out = {};
  for (const k in (prog || {})) out[k] = prog[k].worlds ? prog[k] : { worlds: [{ nodes: prog[k].nodes || [] }] };
  const fresh = makeProgress();
  for (const s of SUBJECTS) if (!out[s.id]) out[s.id] = fresh[s.id];
  return out;
};

/* Storage v3 (§12): { version, activeProfileId, settings, profiles:[{id, profile,
   progress, skills, events, recentItems, session}] }. A v2 save migrates into
   profiles[0]; the old bloom-v2 key stays untouched as a backup (§22.2).

   §22.2 corrupted-save recovery, full mechanism (2026-07-21): doSave() keeps
   a ONE-DEEP rolling backup at bloom-v3-backup — before writing the new
   bloom-v3, whatever was already there is copied to the backup key, so the
   backup always holds the last-known-good save from before the most recent
   write. loadStore() tries bloom-v3, then bloom-v3-backup, then the legacy
   bloom-v2 migration path. If every key is unreadable, the corrupt bloom-v3
   blob (if any) is preserved verbatim under bloom-v3-corrupt so the parent
   dashboard can surface it for diagnostics (§22.2) — the app still starts
   fresh either way, never crashes, never blocks the child from playing. */
function loadStore() {
  try {
    const v3 = JSON.parse(localStorage.getItem('bloom-v3') || 'null');
    if (v3 && v3.profiles && v3.profiles.length) return v3;
  } catch (e) { stashCorruptSave('bloom-v3', e); }
  try {
    const backup = JSON.parse(localStorage.getItem('bloom-v3-backup') || 'null');
    if (backup && backup.profiles && backup.profiles.length) {
      try { localStorage.setItem('bloom-v3', JSON.stringify(backup)); } catch {}
      return backup;
    }
  } catch {}
  try {
    const v2 = JSON.parse(localStorage.getItem('bloom-v2') || 'null');
    if (v2 && v2.profile) {
      const id = newId();
      /* A v2 save is, by definition, from a build that predates onboarding
         resume — its existence means onboarding already fully completed
         under the old single-profile system. Force onboarded:true so a
         returning player isn't sent back through onboarding on migration. */
      return { version:3, activeProfileId:id,
        settings: v2.settings || { readAloud:true, sfx:true },
        profiles: [{ id, profile: { ...blankProfile(), ...v2.profile, onboarded:true },
          progress: wrapWorlds(v2.progress), skills:{}, events:[], recentItems:[],
          session: v2.session || null }] };
    }
  } catch {}
  return null;
}

/* Preserves an unreadable bloom-v3 blob (verbatim string, not re-parsed) under
   a diagnostics key so the parent dashboard can show "we found a save we
   couldn't read" instead of the data silently vanishing. Never surfaced to
   the child, never blocks startup — just a breadcrumb for a parent. */
function stashCorruptSave(key, err) {
  try {
    const raw = localStorage.getItem(key);
    if (raw) localStorage.setItem('bloom-v3-corrupt', JSON.stringify(
      { key, raw, message: String(err && err.message || err), ts: Date.now() }));
  } catch {}
}

/* The persistent profile list with the active profile's live state overlaid */
function composeProfiles(s) {
  if (!s.activeProfileId) return s.roster || [];
  const onboardingScreens = ['welcome','avatar','plan'];
  const snap = { id: s.activeProfileId, profile: s.profile, progress: s.progress,
    skills: s.skills, events: s.events, recentItems: s.recentItems,
    session: (s.screen === 'activity' && s.session &&
              s.session.qIdx < s.session.questions.length) ? s.session : null,
    /* §22.1 onboarding resume: which onboarding screen to relaunch into, only
       meaningful while profile.onboarded is still falsy. */
    onboardScreen: onboardingScreens.includes(s.screen) ? s.screen : null,
    onboard: onboardingScreens.includes(s.screen) ? s.onboard : undefined };
  const roster = s.roster || [];
  return roster.some(p => p.id === s.activeProfileId)
    ? roster.map(p => p.id === s.activeProfileId ? snap : p)
    : [...roster, snap];
}
function doSave(s) {
  try {
    if (!s.activeProfileId) return;
    /* Roll the backup forward BEFORE overwriting — whatever is currently in
       bloom-v3 becomes the new backup, so backup always trails live by
       exactly one save. Only rolls if the current value is actually valid
       JSON, so a corrupt value is never propagated into the backup slot. */
    try {
      const current = localStorage.getItem('bloom-v3');
      if (current) { JSON.parse(current); localStorage.setItem('bloom-v3-backup', current); }
    } catch {}
    localStorage.setItem('bloom-v3', JSON.stringify({
      version: 3, activeProfileId: s.activeProfileId,
      settings: s.settings, profiles: composeProfiles(s),
    }));
  } catch {}
}

/* Local event log (§13.1): profile-scoped, no PII, 90-day raw retention, hard cap */
function logEv(events, t, data) {
  const cut = Date.now() - 90 * 86400000;
  return [...(events || []).filter(e => e.ts > cut).slice(-1999), { t, ts: Date.now(), ...(data || {}) }];
}
/* Per-skill tracking (§9.1): attempts, correct, rolling last-20 window */
function bumpSkill(skills, skillId, ok) {
  if (!skillId) return skills;
  const cur = skills[skillId] || { attempts: 0, correct: 0, recent: [], lastPlayed: null };
  return { ...skills, [skillId]: {
    attempts: cur.attempts + 1, correct: cur.correct + (ok ? 1 : 0),
    recent: [...cur.recent, ok ? 1 : 0].slice(-20), lastPlayed: todayStr() } };
}

/* §10.4: honor the OS-level prefers-reduced-motion signal as the DEFAULT for
   a brand-new device/profile — a parent can still flip it back on via the
   in-app toggle, but a child on a device with system reduced-motion set
   should never see full confetti/shake/bobbing before that toggle is even
   discovered. Only seeds the default; an existing saved settings.reducedMotion
   value always wins. */
let osReducedMotion = false;
try { osReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch {}

const store = loadStore();
const activeP = store ? (store.profiles.find(p => p.id === store.activeProfileId) || store.profiles[0]) : null;
const resumable = (activeP && activeP.session &&
  activeP.session.qIdx < ((activeP.session.questions || []).length)) ? activeP.session : null;
/* §22.1 onboarding resume: a profile that was created (has an id, so
   SET_NAME already fired) but never finished onboarding (no profile.onboarded
   flag) relaunches straight back into whichever onboarding screen it was on,
   instead of being mistaken for a fully set-up single profile and dropped
   onto the map. */
const interruptedOnboarding = activeP && !activeP.profile.onboarded && activeP.onboardScreen;
/* §26.1: a returning Middle/Senior profile lands on its tier home dashboard,
   not the Junior world map — same "returning user skips onboarding" idea
   (§3.1), extended per-tier. Junior behavior (map) is completely unchanged. */
const initialTier = activeP ? tierOf(activeP.profile.age) : 'junior';
const tierHomeScreen = { junior:'map', middle:'tierHome', senior:'tierHome' }[initialTier];
const INIT = {
  /* >1 child on the device → kid-friendly profile picker (§12) */
  screen: !store ? 'splash'
    : interruptedOnboarding ? activeP.onboardScreen
    : (store.profiles.length > 1 ? 'picker' : tierHomeScreen),
  activeProfileId: activeP ? activeP.id : null,
  roster: store ? store.profiles : [],
  profile: activeP ? activeP.profile : blankProfile(),
  progress: activeP ? wrapWorlds(activeP.progress) : makeProgress(),
  skills: (activeP && activeP.skills) || {},
  events: (activeP && activeP.events) || [],
  recentItems: (activeP && activeP.recentItems) || [],
  settings: (store && store.settings)
    || { readAloud:true, sfx:true, reducedMotion:osReducedMotion },
  subject: (resumable && resumable.subject) || 'math',
  session: null,      // { subject, stageIndex, questions, qIdx, mistakes, qMistakes, isReplay, startTs, usedIds }
  feedback: null,     // { ok:bool, chosen, correct }
  replayStage: null,  // set when replaying a completed stage
  pendingResume: (store && store.profiles.length > 1) ? null : resumable,
  dailyBonus: false,
  showParentGate: false,
  showParentDash: false,
  onboard: (interruptedOnboarding && activeP.onboard) || { step:0, selSubjects:['math','words','science'] },
  /* §26 Middle/Senior — parallel to session/feedback above, see TIER_START */
  tierSession: null,  // { subject, stageIndex, questions, qIdx, correctCount, startTs, usedIds }
  tierFeedback: null, // { ok:bool, chosen, correct }
  /* §26.3 guilt-free streak reset: true for exactly one screen view right
     after a Middle/Senior profile's streak silently reset (see App effect
     below), so the Senior UI can show the one-time "Fresh start today"
     reassurance card (screens-i.jsx #32) instead of just resetting quietly
     with no acknowledgment at all. */
  tierStreakWasReset: false,
};
speechOn = INIT.settings.readAloud;

/* Synthesized SFX (§4 P1) — audio-manager.jsx. Failure-safe: the game must be
   fully playable with audio unavailable (§17.1-9), so every call swallows. */
const SFX = (name, arg) => {
  try { const m = window.AudioMgr; if (m && m[name]) Promise.resolve(m[name](arg)).catch(()=>{}); } catch {}
};
const syncMute = (settings) => {
  try { window.AudioMgr && window.AudioMgr.setMute(settings.sfx === false); } catch {}
};
syncMute(INIT.settings);
const syncCalmAudio = (settings) => {
  try { window.AudioMgr && window.AudioMgr.setCalm(!!settings.calm); } catch {}
};
syncCalmAudio(INIT.settings);

/* Haptics (§10.3 P2): gentle ticks on correct answers, coin awards, and
   drag-snap. Own settings toggle, defaults on; devices without vibration
   support (desktop, iOS Safari) simply no-op. */
let hapticsOn = INIT.settings.haptics !== false;
const HAPTIC = (pattern = 15) => {
  try { if (hapticsOn && navigator.vibrate) navigator.vibrate(pattern); } catch {}
};

/* Streak rules: streak-day = any completed stage on a local calendar date.
   1 missed day = quiet "rest day" (streak survives); 2+ missed = silent reset.
   Clock moved backward never revokes anything — anomalies resolve in the child's favor. */
function updateStreak(profile) {
  const today = todayStr();
  const last = profile.lastPlayDate;
  if (!last)              return { ...profile, streak: Math.max(1, profile.streak||0), lastPlayDate: today };
  const diff = dayDiff(last, today);
  if (diff <= 0)          return profile;                                        // same day or clock rolled back
  if (diff <= 2)          return { ...profile, streak: (profile.streak||0)+1, lastPlayDate: today };
  return { ...profile, streak: 1, lastPlayDate: today };
}

/* Load a profile's data into live state (used by picker + dashboard switch) */
function activateProfile(s, p) {
  const resume = (p.session && p.session.qIdx < ((p.session.questions || []).length)) ? p.session : null;
  const tier = tierOf(p.profile.age);   // §26.1: switch to the right tier home, not always the map
  return { ...s, activeProfileId: p.id, profile: p.profile, progress: wrapWorlds(p.progress),
    skills: p.skills || {}, events: p.events || [], recentItems: p.recentItems || [],
    session: null, feedback: null, replayStage: null, pendingResume: resume,
    tierSession: null, tierFeedback: null, tierStreakWasReset: false,
    subject: (resume && resume.subject) || 'math', dailyBonus: false,
    screen: tier === 'junior' ? 'map' : 'tierHome', showParentDash: false, showParentGate: false };
}

/* §26.4 typed-answer checking: trims whitespace and compares
   case-insensitively against every accepted equivalent string (content.js
   acceptEquivalents) — a child may reasonably type "3/4", "0.75", or ".75"
   for the same value, and the bank enumerates which forms count rather than
   the UI attempting general math-string parsing. */
function checkTypedAnswer(q, typed) {
  const norm = v => String(v).trim().toLowerCase().replace(/^0+(?=\d)/, '');
  const t = norm(typed);
  return (q.acceptEquivalents || [q.correct]).some(e => norm(e) === t);
}

function reducer(s, a) {
  switch (a.type) {
    case 'NAV': {
      const quitting = s.screen==='activity' && a.screen==='map' &&
        s.session && s.session.qIdx < s.session.questions.length;
      return { ...s, screen:a.screen, feedback:null,
        subject: a.subject || s.subject,   // §26: TierHome subject cards pass a.subject
        events: quitting ? logEv(s.events,'stage_quit',
          { subject:s.subject, stageIndex:s.session.stageIndex, qIdx:s.session.qIdx }) : s.events,
        replayStage: a.screen==='map' ? null : s.replayStage };
    }
    /* §22.1 onboarding resume: marks the profile fully onboarded so a
       relaunch mid-onboarding (welcome/avatar/plan) is recognized as
       interrupted, not mistaken for "no profile yet."
       §26.1: a Middle/Senior child lands on their tier home, not the map. */
    case 'FINISH_ONBOARDING': {
      const tier = tierOf(s.profile.age);
      return { ...s, screen: tier === 'junior' ? 'map' : 'tierHome',
        profile:{ ...s.profile, onboarded:true } };
    }
    case 'REPLAY_STAGE': return { ...s, screen:'intro', subject:a.subject,
                                  replayStage:a.stageIndex, feedback:null };
    case 'NEXT_STAGE':   return { ...s, screen:'map', feedback:null, replayStage:null };
    case 'SET_NAME':return { ...s, activeProfileId: s.activeProfileId || newId(),
                             profile:{...s.profile, name:a.v} };
    case 'SET_AGE': return { ...s, profile:{...s.profile, age:a.v} };
    case 'SET_COLOR':return{ ...s, profile:{...s.profile, avatarColor:a.v} };
    case 'SET_ACC': return { ...s, profile:{...s.profile, avatarAccessory:a.v} };
    case 'TOGGLE_SUB': {
      const sel = s.onboard.selSubjects;
      const next = sel.includes(a.id)
        ? sel.length > 2 ? sel.filter(x=>x!==a.id) : sel
        : [...sel, a.id];
      return { ...s, onboard:{...s.onboard, selSubjects:next} };
    }
    case 'OB_NEXT': return { ...s, onboard:{...s.onboard, step:s.onboard.step+1},
                             events: logEv(s.events,'onboarding_step',{ step:s.onboard.step+1 }) };
    case 'SET_SUBJECT': return { ...s, subject:a.v };
    case 'PARENT_GATE': return { ...s, showParentGate:a.v };
    case 'PARENT_DASH': return { ...s, showParentDash:a.v, showParentGate:false };
    case 'SET_SETTING': {
      const settings = { ...s.settings, [a.key]: a.v };
      if (a.key === 'readAloud') { speechOn = a.v; if (!a.v) stopSpeech(); }
      if (a.key === 'sfx') syncMute(settings);
      if (a.key === 'haptics') hapticsOn = a.v;
      if (a.key === 'calm') syncCalmAudio(settings);
      return { ...s, settings, events: logEv(s.events,'settings_changed',{ key:a.key, value:a.v }) };
    }

    /* Daily hello bonus: +10 flat coins, at most once per calendar date, never multiplied
       by consecutive days. String compare guards against a backward-moved clock. */
    case 'DAILY_BONUS': {
      const today = todayStr();
      const last = s.profile.lastBonusDate;
      if (last && last >= today) return s;
      return { ...s, dailyBonus:true,
        profile:{ ...s.profile, coins:s.profile.coins+10, lastBonusDate:today } };
    }
    case 'DISMISS_BONUS': return { ...s, dailyBonus:false };

    /* §26.3 guilt-free streak reset check — dispatched once on tier-home
       mount, same "check on arrival" pattern as DAILY_BONUS. Detects a
       silent reset (old streak >=2, new streak back to 1) so the Senior UI
       can show a one-time reassurance card; the reset itself already
       happened quietly inside updateStreak (§14), this only decides whether
       to acknowledge it on screen. Never fires for a brand-new streak. */
    case 'TIER_CHECK_STREAK': {
      const before = s.profile.streak || 0;
      const updated = updateStreak(s.profile);
      const wasReset = before >= 2 && (updated.streak || 0) === 1;
      return { ...s, profile: updated, tierStreakWasReset: wasReset };
    }

    /* Pip's Shop (§4 P1): buy with coins then wear immediately; ownership is
       per-profile and permanent. Ignores buys that can't be afforded. */
    case 'SHOP_BUY': {
      const it = SHOP_ITEMS.find(x => x.id === a.id);
      const owned = s.profile.owned || [];
      if (!it || owned.includes(it.id) || s.profile.coins < it.price) return s;
      return { ...s,
        profile: { ...s.profile, coins: s.profile.coins - it.price,
          owned: [...owned, it.id], avatarAccessory: it.id },
        events: logEv(s.events, 'shop_buy', { id: it.id, price: it.price }) };
    }
    case 'SHOP_WEAR': {
      if (a.id !== 'none' && !(s.profile.owned || []).includes(a.id)) return s;
      return { ...s, profile: { ...s.profile, avatarAccessory: a.id } };
    }
    case 'AFFORD_NOTICED': {
      const seen = s.profile.affordNoticed || [];
      if (seen.includes(a.id)) return s;
      return { ...s, profile: { ...s.profile, affordNoticed: [...seen, a.id] } };
    }

    /* §11.2: parents can hide a subject from the child's map — no lock icon,
       no shame framing, restorable any time. At least one subject must stay
       visible so the child is never left with an empty map. */
    case 'PAUSE_SUBJECT': {
      const paused = s.profile.pausedSubjects || [];
      const visible = SUBJECTS.filter(sub => !subjLocked(sub, s.profile) && !paused.includes(sub.id));
      if (!a.v && visible.length <= 1 && !paused.includes(a.id)) return s;   // would empty the map
      const next = a.v ? [...new Set([...paused, a.id])] : paused.filter(id => id !== a.id);
      const ns = { ...s, profile: { ...s.profile, pausedSubjects: next },
        subject: (a.v && s.subject === a.id)
          ? (SUBJECTS.find(sub => sub.id !== a.id && !subjLocked(sub, s.profile) && !next.includes(sub.id)) || {id:s.subject}).id
          : s.subject };
      return ns;
    }

    /* §11.2: parents can grant bonus coins for special occasions. Stars are
       never editable here — they are a learning record (§14). */
    case 'GIFT_COINS': {
      const amt = Math.max(0, Math.round(Number(a.amount) || 0));
      if (!amt) return s;
      return { ...s, profile: { ...s.profile, coins: s.profile.coins + amt },
        events: logEv(s.events, 'coin_gift', { amount: amt }) };
    }

    /* §13.4 parent feedback prompt: one-tap, parent-area only, never shown
       to children, never repeats once answered. Device-level (settings),
       not per-child — the question is about the app, not one profile. */
    case 'PARENT_FEEDBACK': {
      if (s.settings.feedbackGiven) return s;
      return { ...s, settings: { ...s.settings, feedbackGiven: true },
        events: logEv(s.events, 'parent_feedback', { value: a.v }) };
    }

    /* §13.1 session_start/session_end: logged once per app mount / tab-hide
       (see App()'s effect and the visibilitychange listener below). Doesn't
       touch anything else in state — a thin logEv wrapper. */
    case 'LOG_EVENT':
      return { ...s, events: logEv(s.events, a.name, a.data) };

    /* §9.4 cross-subject reinforcement: bump a skill's attempt/accuracy
       counters without touching progress/stars/coins — used for practice
       moments that happen inside another subject's stage (§9.1 tagging). */
    case 'BUMP_SKILL_ONLY':
      return { ...s, skills: bumpSkill(s.skills, a.skillId, a.ok),
        events: logEv(s.events, 'question_answered', { skill:a.skillId, correct:a.ok, crossSubject:true }) };

    /* Interruption resume: restore the exact question with mistake counts intact */
    case 'RESUME': return { ...s, screen:'activity', subject:s.pendingResume.subject,
      session:s.pendingResume, pendingResume:null, feedback:null };
    case 'DISCARD_RESUME': return { ...s, pendingResume:null };

    /* Try Again re-presents the SAME question (qMistakes intact so the 2nd
       mistake reveals the answer) — it must never advance the set. */
    case 'RETRY': return { ...s, feedback:null };

    /* ── Multi-profile actions (§12) — rename/delete are parent-gated in the UI ── */
    case 'NEW_PROFILE': {
      const roster = composeProfiles(s);
      if (roster.length >= 4) return s;
      return { ...s, roster, activeProfileId:newId(), profile:blankProfile(),
        progress:makeProgress(), skills:{}, events:[], recentItems:[],
        session:null, feedback:null, pendingResume:null, replayStage:null, dailyBonus:false,
        screen:'welcome', onboard:{ step:0, selSubjects:['math','words','science'] } };
    }
    case 'SWITCH_PROFILE': {
      const roster = composeProfiles(s);
      const p = roster.find(x=>x.id===a.id);
      if (!p) return s;
      const ns = activateProfile({ ...s, roster }, p);
      doSave(ns); return ns;
    }
    case 'RENAME_PROFILE': {
      const roster = composeProfiles(s).map(p=>p.id===a.id ? { ...p, profile:{ ...p.profile, name:a.name } } : p);
      const ns = { ...s, roster,
        profile: a.id===s.activeProfileId ? { ...s.profile, name:a.name } : s.profile };
      doSave(ns); return ns;
    }
    /* Parent-facing age change (Manage Children card): lets a parent correct
       a child's age after onboarding, or move a child between tiers to
       preview/verify Middle/Senior without re-onboarding a fresh profile —
       there was previously no way to reach Middle/Senior content from an
       existing Junior profile short of deleting and starting over. Age is
       the ONLY input tierOf() reads, so this is genuinely a tier change,
       not just a cosmetic number. If the edited profile is the active one
       and the tier actually changes, route to that tier's home screen the
       same way activateProfile() already does when switching children —
       staying on 'map' with a Senior profile (or vice versa) would show the
       wrong screen for the new age entirely. */
    case 'SET_PROFILE_AGE': {
      const roster = composeProfiles(s).map(p=>p.id===a.id ? { ...p, profile:{ ...p.profile, age:a.age } } : p);
      if (a.id !== s.activeProfileId) { const ns = { ...s, roster }; doSave(ns); return ns; }
      const oldTier = tierOf(s.profile.age), newTier = tierOf(a.age);
      const tierChanged = oldTier !== newTier;
      const ns = { ...s, roster, profile: { ...s.profile, age:a.age },
        screen: tierChanged ? (newTier === 'junior' ? 'map' : 'tierHome') : s.screen,
        showParentDash: tierChanged ? false : s.showParentDash,
        tierSession: tierChanged ? null : s.tierSession,
        tierFeedback: tierChanged ? null : s.tierFeedback,
        session: tierChanged ? null : s.session };
      doSave(ns); return ns;
    }
    /* §11.2 reset a child's progress: clears everything earned through play
       (stars, coins, streak, map progress, skills, event history) but keeps
       the profile itself — name, age, avatar. Distinct from DELETE_PROFILE,
       which removes the profile entirely. Works on any roster member. */
    case 'RESET_PROGRESS': {
      // lastBonusDate is deliberately NOT cleared — resetting play data must
      // never re-trigger the daily hello bonus as a side effect (§14 anti-
      // stress rules: rewards are earned by presence, not handed out by a
      // parent action). lastPlayDate resets freely since streak already does.
      const roster = composeProfiles(s).map(p => p.id===a.id
        ? { ...p, profile:{ ...p.profile, coins:0, stars:0, streak:0,
              lastPlayDate:null, owned:[], pausedSubjects:[], affordNoticed:[] },
            progress: makeProgress(), skills:{}, events:[], recentItems:[], session:null }
        : p);
      if (a.id !== s.activeProfileId) { const ns = { ...s, roster }; doSave(ns); return ns; }
      const resetP = roster.find(p=>p.id===a.id);
      const ns = { ...s, roster, profile: resetP.profile, progress: wrapWorlds(resetP.progress),
        skills:{}, events:[], recentItems:[], session:null, feedback:null, subject:'math',
        replayStage:null, pendingResume:null, dailyBonus:false, screen:'map', showParentDash:false };
      doSave(ns); return ns;
    }
    case 'DELETE_PROFILE': {
      const roster = composeProfiles(s).filter(p=>p.id!==a.id);
      if (a.id !== s.activeProfileId) { const ns = { ...s, roster }; doSave(ns); return ns; }
      if (!roster.length) {
        try { localStorage.removeItem('bloom-v3'); localStorage.removeItem('bloom-v2'); } catch {}
        return { ...s, roster:[], activeProfileId:null, profile:blankProfile(), progress:makeProgress(),
          skills:{}, events:[], recentItems:[], session:null, pendingResume:null,
          screen:'splash', showParentDash:false };
      }
      const ns = activateProfile({ ...s, roster }, roster[0]);
      doSave(ns); return ns;
    }

    case 'START': {
      const isReplay  = s.replayStage !== null && s.replayStage !== undefined;
      const curIdx    = getNodes(s.progress, a.subject).findIndex(n=>n.status==='current');
      const stageIndex = isReplay ? s.replayStage : (curIdx < 0 ? 0 : curIdx);
      /* §8.4: two consecutive 1-star finishes → the game silently gets gentler
         on the next attempt (easier tier, far distractors, 2 choices). */
      const node = getNodes(s.progress, a.subject)[stageIndex];
      const remediate = !!(node && (node.oneStar || 0) >= 2);
      const questions  = generateQuestions(a.subject, stageIndex,
        { age:s.profile.age, skills:s.skills, recentItems:s.recentItems, remediate });
      return { ...s, screen:'activity', subject:a.subject, feedback:null, replayStage:null,
        events: logEv(s.events,'stage_start',{ subject:a.subject, stageIndex, remediate }),
        session:{ subject:a.subject, stageIndex, questions, qIdx:0, mistakes:0, qMistakes:0,
          isReplay, startTs:Date.now(), preStars:(node && node.stars) || 0,
          usedIds:questions.map(q=>q.itemId).filter(Boolean) } };
    }

    case 'ANSWER': {
      const { session } = s;
      const q = session.questions[session.qIdx];
      const ok = a.chosen === q.correct || a.chosen === q.count ||
                 (q.type==='compare' && a.chosen === q.correct) ||
                 (q.type==='living'  && a.chosen === q.correct) ||
                 (q.type==='size'    && a.chosen === q.correct) ||
                 (q.type==='phonics' && a.chosen === q.correct) ||
                 (q.type==='wordpic' && a.chosen === q.correct);
      let events = logEv(s.events,'question_answered',
        { skill:q.skill, correct:ok, attemptNo:session.qMistakes+1 });
      if (!ok && session.qMistakes+1 >= 2) events = logEv(events,'answer_revealed',{ skill:q.skill });
      return {
        ...s,
        skills: bumpSkill(s.skills, q.skill, ok),
        events,
        session:{ ...session, mistakes: ok?session.mistakes:session.mistakes+1,
                              qMistakes: ok?session.qMistakes:session.qMistakes+1 },
        /* reveal shows correctLabel when set; 'done'-style boards suppress it
           (replaying the board IS the reveal) */
        feedback:{ ok, chosen:a.chosen,
          correct: q.correctLabel ?? (q.correct === 'done' ? null : q.correct) ?? q.count },
      };
    }

    case 'NEXT_Q': {
      const { session } = s;
      /* §8.4/§5: a missed question is re-queued once at the end of the set for
         another go. Requeued copies never requeue again (hard cap 2× per set). */
      const cur = session.questions[session.qIdx];
      const questions = (session.qMistakes > 0 && !cur.requeued)
        ? [...session.questions, { ...cur, requeued:true, id:session.questions.length }]
        : session.questions;
      const nextIdx = session.qIdx + 1;
      if (nextIdx >= questions.length) {
        const earned = session.mistakes===0?3:session.mistakes<=2?2:1;
        /* §14 no-hoarding: replaying an already-3-starred stage pays a flat
           5 coins instead of the full amount, so mastered stages can't be
           farmed for unlimited coins. A fresh/incomplete stage still pays
           full — this only kicks in once the node was already maxed. */
        const alreadyMastered = session.isReplay && session.preStars >= 3;
        const coinsEarned = alreadyMastered ? 5 : earned*5 + 10;
        const nodes = [...getNodes(s.progress, s.subject)];
        /* §8.4: oneStar tracks consecutive 1-star finishes of a node — two in a
           row makes the next attempt use the easier tier. Any better run resets. */
        if (session.isReplay) {
          // Replay: update stars only if improved; preserve node statuses
          const ri = session.stageIndex;
          if (nodes[ri]) {
            nodes[ri] = { ...nodes[ri],
              stars: earned > (nodes[ri].stars||0) ? earned : nodes[ri].stars,
              oneStar: earned === 1 ? (nodes[ri].oneStar||0) + 1 : 0 };
          }
        } else {
          const ci = nodes.findIndex(n=>n.status==='current');
          if (ci !== -1) {
            nodes[ci] = { status:'done', stars:earned,
              oneStar: earned === 1 ? (nodes[ci].oneStar||0) + 1 : 0 };
            if (ci+1 < nodes.length) nodes[ci+1] = { status:'current', stars:0 };
          }
        }
        const ns = {
          ...s, screen:'cleared', feedback:null,
          session:{ ...session, qIdx:nextIdx, earnedStars:earned, earnedCoins:coinsEarned },
          progress: setNodes(s.progress, s.subject, nodes),
          profile: updateStreak({ ...s.profile, stars:s.profile.stars+earned, coins:s.profile.coins+coinsEarned }),
          events: logEv(s.events,'stage_complete',{ subject:s.subject, stageIndex:session.stageIndex,
            stars:earned, mistakes:session.mistakes,
            durationSec: session.startTs ? Math.round((Date.now()-session.startTs)/1000) : 0 }),
          recentItems: [...(session.usedIds||[]), ...s.recentItems].slice(0, 24),
        };
        doSave(ns); return ns;
      }
      return { ...s, screen:'activity', feedback:null,
        session:{ ...session, questions, qIdx:nextIdx, qMistakes:0 } };
    }

    /* ═══════════════════════════════════════════════════════════════
       §26 AGE-TIER EXPANSION (REQUIREMENTS §26, decision O8) — Middle/
       Senior reducer cases. Kept deliberately parallel to START/ANSWER/
       NEXT_Q above rather than merged into them: those three are dense,
       well-tested Junior logic (hearts, stars, node map states, oneStar
       remediation) that has no Middle/Senior equivalent — XP/level has no
       "hearts," no node map, no remediation step-down (§26.4). Forcing one
       shared reducer path would mean scattering tier-conditionals through
       already-intricate code for no shared behavior. This mirrors how
       stageConfigsWorld2 stays a separate content key from stageConfigs.
       ═══════════════════════════════════════════════════════════════ */

    case 'TIER_START': {
      const tier = tierOf(s.profile.age);
      const questions = generateTierQuestions(tier, a.subject, a.stageIndex,
        { recentItems: s.recentItems });
      return { ...s, screen:'tierActivity', subject:a.subject, tierFeedback:null,
        events: logEv(s.events,'stage_start',{ subject:a.subject, stageIndex:a.stageIndex, tier }),
        tierSession:{ subject:a.subject, stageIndex:a.stageIndex, questions, qIdx:0,
          correctCount:0, startTs:Date.now(), usedIds:questions.map(q=>q.itemId).filter(Boolean) } };
    }

    case 'TIER_ANSWER': {
      const { tierSession } = s;
      const q = tierSession.questions[tierSession.qIdx];
      let ok;
      if (q.type === 'wordproblem')      ok = checkTypedAnswer(q, a.chosen);
      else if (q.type === 'comprehension') ok = a.correctCount === a.totalCount; // whole passage graded at once
      else if (q.type === 'scienceQuiz') ok = !!(a.chosen && a.chosen.ok);        // chosen is the whole opt object
      else ok = a.chosen === q.correct || a.chosen === q.count;
      const events = logEv(s.events,'question_answered',{ skill:q.skill, correct:ok, tier:true });
      return { ...s, skills: bumpSkill(s.skills, q.skill, ok), events,
        /* §26.6 achievements (O9): a persistent, monotonic counter — NOT
           derived from the event log, which is capped at 2000 events / 90
           days (logEv) and would let a "Deep Thinker" badge silently
           regress as old events age out, violating §14's progress-is-
           additive rule. Counts every tier question answered, right or
           wrong (matches the design mock's "500 questions" framing, which
           is about engagement, not accuracy). */
        profile:{ ...s.profile, tierQuestionsAnswered:(s.profile.tierQuestionsAnswered||0)+1 },
        tierSession:{ ...tierSession, correctCount: tierSession.correctCount + (ok?1:0) },
        /* same 'done'-board reveal suppression as Junior's ANSWER (§1161) —
           replaying the self-resolving board IS the reveal, nothing to show */
        tierFeedback:{ ok, chosen:a.chosen, correct: q.correctLabel ?? (q.correct === 'done' ? null : q.correct) } };
    }

    case 'TIER_NEXT_Q': {
      const { tierSession } = s;
      const nextIdx = tierSession.qIdx + 1;
      if (nextIdx >= tierSession.questions.length) {
        const total = tierSession.questions.length;
        const pctCorrect = total ? tierSession.correctCount / total : 0;
        const tier = tierOf(s.profile.age);
        /* §26.3 no hard-fail timers: speed bonus only, never a time penalty
           or truncated question — elapsedSec is informational (shown on the
           results screen), it never reduces XP or fails a question. Senior's
           bonus window is tighter than Middle's (15s/question vs 20s/question)
           — a faster pace is expected to earn the bonus, but slow play is
           never penalized at either tier, just doesn't add the bonus. */
        const elapsedSec = tierSession.startTs ? Math.round((Date.now()-tierSession.startTs)/1000) : 0;
        const speedBonusWindow = tier === 'senior' ? 15 : 20;
        const baseXp = tierSession.correctCount * C.quizBaseXp;
        const speedBonusXp = elapsedSec > 0 && elapsedSec < total * speedBonusWindow ? C.quizSpeedBonusXp * tierSession.correctCount : 0;
        const xpEarned = baseXp + speedBonusXp;
        const newXp = s.profile.xp + xpEarned;
        /* §26.6 achievements (O9): persistent, monotonic — see blankProfile
           comment. A fast set (Speedster) and a perfect set (Sharpshooter/
           Perfectionist) can only ever turn these flags/counters UP, never
           down, so a badge earned once stays earned regardless of later
           performance or event-log aging. */
        const wasFast = elapsedSec > 0 && elapsedSec < total * 12;   // ~12s/question is brisk, not a race
        const wasPerfect = pctCorrect === 1;
        const subjectsPlayed = (s.profile.tierSubjectsPlayed||[]).includes(s.subject)
          ? s.profile.tierSubjectsPlayed
          : [...(s.profile.tierSubjectsPlayed||[]), s.subject];
        /* O10 fix: Middle/Senior previously never touched profile.stars, so
           Music (star-gated at MUSIC_UNLOCK_STARS, same threshold Junior
           uses) was permanently unreachable from these tiers. Stars are now
           a small SECOND reward alongside XP, scaled by accuracy the same
           way Junior's own earned-stars formula works (0 mistakes → 3,
           <=2 mistakes → 2, else 1) — translated to a %-correct threshold
           since Middle/Senior track pctCorrect, not a per-question mistake
           counter. A rough set (<50%) still earns 0 stars, never negative —
           full XP is still earned regardless, so this is a bonus layer, not
           a gate on top of the existing no-fail design (§26.3). */
        const starsEarned = pctCorrect === 1 ? 3 : pctCorrect >= 0.8 ? 2 : pctCorrect >= 0.5 ? 1 : 0;
        const ns = {
          ...s, screen:'tierResults', tierFeedback:null,
          tierSession:{ ...tierSession, qIdx:nextIdx, xpEarned, speedBonusXp, pctCorrect, elapsedSec, starsEarned },
          profile: updateStreak({ ...s.profile, xp:newXp, stars:(s.profile.stars||0)+starsEarned,
            tierHadFastSet: s.profile.tierHadFastSet || wasFast,
            tierPerfectSets: s.profile.tierPerfectSets + (wasPerfect?1:0),
            tierSubjectsPlayed: subjectsPlayed }),
          events: logEv(s.events,'stage_complete',{ subject:s.subject, stageIndex:tierSession.stageIndex,
            tier:true, pctCorrect, xpEarned, starsEarned, durationSec: elapsedSec }),
          recentItems: [...(tierSession.usedIds||[]), ...s.recentItems].slice(0, 24),
        };
        doSave(ns); return ns;
      }
      return { ...s, screen:'tierActivity', tierFeedback:null,
        tierSession:{ ...tierSession, qIdx:nextIdx } };
    }

    /* §26.3 guilt-free streak reset (screens-i.jsx #32): dismisses the
       one-time "Fresh start today" notice. Uses the SAME quiet streak logic
       as Junior (updateStreak, already guilt-free per §14) — this only
       tracks whether the Senior-styled notice has been shown for the current
       reset, it does not change streak math. */
    case 'TIER_DISMISS_STREAK_RESET': return { ...s, tierStreakWasReset:false };

    default: return s;
  }
}

/* ═══════════════════════════════════════════════════════
   UI KIT
═══════════════════════════════════════════════════════ */
function Pip({ size=180, color='leaf', mood='happy', wave=false, arms=false, feet=true, style }) {
  const bodyColor = {leaf:'var(--leaf)',berry:'var(--berry)',sky:'var(--sky)',coral:'var(--coral)',sun:'var(--sun)'}[color]||'var(--leaf)';
  return (
    <div className={`pip ${mood}${wave?' wave':''}`}
         style={{'--pip-size':size+'px','--pip-body':bodyColor,...style}}>
      {feet&&<><div className="foot left"/><div className="foot right"/></>}
      <div className="sprout"/><div className="leaf-blade"/>
      <div className="body"/><div className="belly"/>
      {arms&&!wave&&<div className="arm left"/>}
      {(arms||wave)&&<div className="arm right"/>}
      <div className="eye left"/><div className="eye right"/>
      <div className="cheek left"/><div className="cheek right"/>
      <div className="mouth"/>
    </div>
  );
}

function Btn({ children, color='coral', size='md', onClick, disabled, style }) {
  return (
    <button className={`btn${color!=='coral'?' '+color:''} ${size==='big'?'big':''}`}
      onClick={e=>{ SFX('tap'); onClick&&onClick(e); }} disabled={disabled} style={style}>{children}</button>
  );
}

function IconBtn({ children, onClick, style }) {
  return <button className="icon-btn" onClick={e=>{ SFX('tap'); onClick&&onClick(e); }} style={style}>{children}</button>;
}

function Chip({ icon='coin', value, style }) {
  return <div className="chip" style={style}><span className={icon}/><span>{value}</span></div>;
}

function ProgressBar({ value=0.5, color='leaf' }) {
  const fill = {leaf:'var(--leaf)',coral:'var(--coral)',sky:'var(--sky)'}[color]||'var(--leaf)';
  return (
    <div className="bar">
      <i style={{width:(value*100)+'%',background:`linear-gradient(180deg,${fill},${fill}dd)`}}/>
    </div>
  );
}

function Stars({ count=3, total=3, size=60 }) {
  return (
    <div style={{display:'flex',gap:10}}>
      {Array.from({length:total},(_,i)=>(
        <span key={i} className={i<count?'star':'star empty'} style={{width:size,height:size}}/>
      ))}
    </div>
  );
}

function Sun({ size=80, style }) {
  return (
    <div className="sun-decor" style={{width:size,height:size,position:'relative',...style}}>
      <div style={{position:'absolute',inset:'18%',borderRadius:'50%',background:'var(--sun)',boxShadow:'inset 0 -8px 0 var(--sun-dark)'}}/>
      {Array.from({length:8}).map((_,i)=>(
        <div key={i} style={{position:'absolute',left:'47%',top:'2%',width:'6%',height:'18%',
          background:'var(--sun-dark)',borderRadius:6,transform:`rotate(${i*45}deg)`,transformOrigin:'50% 240%'}}/>
      ))}
    </div>
  );
}

/* Apple component — size in px */
function Apple({ size=50, style, crossed=false }) {
  return (
    <div style={{width:size,height:size,position:'relative',...style}}>
      <div style={{position:'absolute',inset:'12% 0 0 0',background:'#E54B4B',borderRadius:'50%',
        boxShadow:'inset -4px -4px 0 rgba(0,0,0,0.15),inset 5px 5px 0 rgba(255,255,255,0.25)'}}/>
      <div style={{position:'absolute',left:'52%',top:0,width:'12%',height:'22%',
        background:'#7B4F2C',borderRadius:4,transform:'rotate(8deg)'}}/>
      <div style={{position:'absolute',left:'58%',top:'8%',width:'22%',height:'14%',
        background:'var(--leaf)',borderRadius:'0 80% 0 80%',transform:'rotate(-20deg)'}}/>
      {crossed&&(
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:size*0.7,lineHeight:1,pointerEvents:'none',color:'var(--rose-dark)',fontWeight:900,
          textShadow:'0 1px 2px rgba(0,0,0,.3)'}}>✕</div>
      )}
    </div>
  );
}

      <div className="cloud" style={{width:60,height:60,top:80,left:90,position:'absolute'}}/>

      <Sun size={120} style={{position:'absolute',top:40,right:60}}/>

      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',gap:24}}>
        <div className="intro-pop intro-d1" style={{textAlign:'center'}}>
          <div className="display" style={{fontSize:88,color:'var(--coral)',lineHeight:.95,
            textShadow:'0 6px 0 var(--coral-dark),0 14px 28px rgba(225,95,31,.3)',letterSpacing:'-0.02em'}}>Bloom</div>
          <div className="display" style={{fontSize:50,color:'var(--leaf-dark)',letterSpacing:'.18em',marginTop:6}}>ACADEMY</div>

        {profile.name ? (
          <div className="intro-pop intro-d2" style={{textAlign:'center'}}>

        <div className="pip-bob intro-pop intro-d2"><Pip size={220} color={profile.avatarColor||'leaf'} wave/></div>

          <Btn size="big" color="coral"
            onClick={()=>dispatch({type:'NAV',screen:isNew?'welcome':'map'})}>
            {isNew?'Start Learning! 🌱':'Play Now ▶'}
          </Btn>
          {/* §22.1: upfront time estimate before onboarding starts, so a

        </div>

        <div className="intro-pop intro-d4" style={{display:'flex',gap:16,marginTop:4}}>

        background:'linear-gradient(180deg,transparent,#C8E6A4)'}}/>

      {/* Parent gate modal */}
      {showGate && <ParentGateModal dispatch={dispatch}/>}
    </div>
  );
}
